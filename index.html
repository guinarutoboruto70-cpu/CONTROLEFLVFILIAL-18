<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FLV</title>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a0a; color:#fff; }
.screen { display:none; padding:20px; }
.active { display:block; }

h1,h2 { text-align:center; color:#ffcc00; }

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
}

.card {
    background:#1a1a1a;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    cursor:pointer;
}

input, select {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:none;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="tela0" class="screen active">
    <h1>Controle FLV</h1>
    <button class="btn" onclick="ir(1)">ENTRAR</button>
</div>

<!-- MENU -->
<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button class="btn" onclick="ir(2)">Nova Tratativa</button>
    <button class="btn" onclick="ir(7)">Lista</button>
    <button class="btn" onclick="abrirCadastro()">Cadastro de Produtos</button>
</div>

<!-- TRATATIVA -->
<div id="tela2" class="screen">
    <h2>Tratativa</h2>
    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>

    <input id="produto" placeholder="Produto">
    <input id="cod" placeholder="Código">
    <input id="chegou" type="number" placeholder="Qtd Chegou">
    <input id="quebra" type="number" placeholder="Qtd Quebra">

    <button class="btn" onclick="salvar()">Continuar</button>
</div>

<!-- ENVIO -->
<div id="tela3" class="screen">
    <h2>Envio</h2>
    <pre id="texto"></pre>
    <button class="btn" onclick="enviarTexto()">ENVIAR TEXTO</button>
    <button class="btn" onclick="ir(2)">⬅ VOLTAR</button>
</div>

<!-- LISTA -->
<div id="tela7" class="screen">
    <h2>Lista</h2>
    <div id="lista"></div>
    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>
</div>

<!-- CADASTRO -->
<div id="tela8" class="screen">
    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>
    <h2>Cadastro de Produtos</h2>

    <input id="p_nome" placeholder="Produto" readonly>
    <input id="p_cod" placeholder="Código">
    <input id="p_custo" placeholder="Preço de custo">

    <select id="p_tipo">
        <option value="KG">KG</option>
        <option value="UN">UN</option>
    </select>

    <button class="btn" onclick="salvarProduto()">SALVAR</button>
    <button class="btn" onclick="excluirProduto()">EXCLUIR</button>

    <div id="listaProdutos"></div>
</div>

<script>

/* NAV */
function ir(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('tela'+t).classList.add('active');
}

/* BASE */
const baseFLV = [
"Abacate","Abacaxi","Abóbora","Abobrinha","Acerola","Ameixa",
"Banana Nanica","Banana Prata","Batata Doce","Batata Inglesa",
"Berinjela","Caju","Caqui","Cebola","Cenoura","Chuchu",
"Coco Verde","Goiaba","Laranja","Limão","Maçã Fuji",
"Maçã Gala","Mamão Formosa","Mamão Papaia","Manga",
"Maracujá","Melancia","Melão","Mexerica","Morango",
"Nectarina","Pera","Pêssego","Pepino","Pimentão",
"Quiabo","Repolho","Tomate","Tomate Italiano","Uva"
].sort();

/* STORAGE */
function getProdutos(){
    return JSON.parse(localStorage.getItem('produtos') || '[]');
}

function setProdutos(lista){
    localStorage.setItem('produtos', JSON.stringify(lista));
}

function carregarBase(){
    let lista = getProdutos();

    baseFLV.forEach(nome=>{
        if(!lista.find(p=>p.nome === nome)){
            lista.push({ nome, cod:'', custo:'', tipo:'KG' });
        }
    });

    setProdutos(lista);
}

/* CADASTRO */
let indexSelecionado = null;

function abrirCadastro(){
    carregarBase();
    renderLista();
    ir(8);
}

function renderLista(){
    const lista = getProdutos();
    const container = document.getElementById('listaProdutos');

    container.innerHTML='';

    lista.sort((a,b)=>a.nome.localeCompare(b.nome))
    .forEach((p,i)=>{
        const div = document.createElement('div');
        div.className='card';
        div.innerText = p.nome;

        div.onclick = ()=>{
            indexSelecionado = i;
            p_nome.value = p.nome;
            p_cod.value = p.cod;
            p_custo.value = p.custo;
            p_tipo.value = p.tipo || 'KG';
        };

        container.appendChild(div);
    });
}

function salvarProduto(){
    if(indexSelecionado === null) return;

    let lista = getProdutos();

    lista[indexSelecionado] = {
        nome: p_nome.value,
        cod: p_cod.value,
        custo: p_custo.value,
        tipo: p_tipo.value
    };

    setProdutos(lista);
    renderLista();
}

function excluirProduto(){
    if(indexSelecionado === null) return;

    let lista = getProdutos();
    lista.splice(indexSelecionado,1);
    setProdutos(lista);

    indexSelecionado = null;
    p_nome.value='';
    p_cod.value='';
    p_custo.value='';

    renderLista();
}

/* TRATATIVA */
let textoFinal='';

function salvar(){
    const produto = document.getElementById('produto').value;
    const cod = document.getElementById('cod').value;
    const chegou = document.getElementById('chegou').value;
    const quebra = document.getElementById('quebra').value;
    const data = new Date().toLocaleDateString();

    if(!produto || !cod){
        alert("Preencha produto e código");
        return;
    }

    textoFinal =
`Cód: ${cod}
${produto}
Data: ${data}
Qtd Chegou: ${chegou}
Qtd Quebra: ${quebra}`;

    document.getElementById('texto').innerText = textoFinal;

    ir(3);
}

function enviarTexto(){
    window.open(`https://wa.me/?text=${encodeURIComponent(textoFinal)}`);
}

/* INIT */
carregarBase();

</script>

</body>
</html>
