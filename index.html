<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FLV</title>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a0a; color:#fff; }
.screen { display:none; padding:20px; }
.active { display:block; }

h1,h2 { text-align:center; color:#ffcc00; }

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
}

.card {
    background:#1a1a1a;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    cursor:pointer;
}

input {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:none;
}

.lista-box {
    max-height:300px;
    overflow:auto;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="tela0" class="screen active">
    <h1>Controle FLV</h1>
    <button class="btn" onclick="ir(1)">ENTRAR</button>
</div>

<!-- MENU -->
<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button class="btn" onclick="ir(2)">Nova Tratativa</button>
    <button class="btn" onclick="ir(7)">Lista</button>
    <button class="btn" onclick="abrirCadastro()">Cadastro de Produtos</button>
</div>

<!-- TRATATIVA -->
<div id="tela2" class="screen">
    <h2>Tratativa</h2>
    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>

    <input id="produto" placeholder="Produto">
    <input id="cod" placeholder="Código">

    <input id="chegou" type="number" placeholder="Qtd Chegou">
    <input id="quebra" type="number" placeholder="Qtd Quebra">

    <button class="btn" onclick="salvar()">Continuar</button>
</div>

<!-- ENVIO -->
<div id="tela3" class="screen">
    <h2>Envio</h2>
    <pre id="texto"></pre>
    <button class="btn" onclick="enviarTexto()">ENVIAR TEXTO</button>
    <button class="btn" onclick="ir(2)">⬅ VOLTAR</button>
</div>

<!-- LISTA -->
<div id="tela7" class="screen">
    <h2>Lista</h2>
    <div id="lista"></div>
    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>
</div>

<!-- CADASTRO -->
<div id="tela8" class="screen">
    <h2>Cadastro de Produtos</h2>

    <input id="buscaProduto" placeholder="Buscar produto..." oninput="listarProdutos()">

    <input id="p_cod" placeholder="Código">
    <input id="p_nome" placeholder="Produto">
    <input id="p_custo" placeholder="Preço de custo">

    <button class="btn" onclick="salvarProduto()">SALVAR</button>

    <div class="lista-box" id="listaProdutos"></div>

    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>
</div>

<script>

/* NAV */
function ir(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('tela'+t).classList.add('active');
}

function abrirCadastro(){
    carregarBase();
    listarProdutos();
    ir(8);
}

/* BASE FLV ORDENADA */
const baseFLV = [
"Abacate","Abacaxi","Abóbora","Alface","Alho","Banana","Batata",
"Beterraba","Brócolis","Cebola","Cenoura","Chuchu","Couve",
"Espinafre","Laranja","Limão","Maçã","Mamão","Melancia",
"Melão","Pepino","Pimentão","Repolho","Tomate","Uva"
].sort();

/* STORAGE */
function getProdutos(){
    return JSON.parse(localStorage.getItem('produtos') || '[]');
}

function setProdutos(lista){
    localStorage.setItem('produtos', JSON.stringify(lista));
}

function carregarBase(){
    if(!localStorage.getItem('produtos')){
        const lista = baseFLV.map(nome=>({cod:'',nome,custo:''}));
        setProdutos(lista);
    }
}

/* CADASTRO */
let editIndex = null;

function salvarProduto(){
    let lista = getProdutos();

    if(editIndex !== null){
        lista[editIndex] = {
            cod: p_cod.value,
            nome: p_nome.value,
            custo: p_custo.value
        };
        editIndex = null;
    }

    setProdutos(lista);
    listarProdutos();
    limpar();
}

function editar(i){
    const p = getProdutos()[i];

    p_cod.value = p.cod;
    p_nome.value = p.nome;
    p_custo.value = p.custo;

    editIndex = i;
}

function excluir(i){
    let lista = getProdutos();
    lista.splice(i,1);
    setProdutos(lista);
    listarProdutos();
}

function limpar(){
    p_cod.value='';
    p_nome.value='';
    p_custo.value='';
}

/* LISTA VISUAL */
function listarProdutos(){
    let lista = getProdutos();

    const busca = buscaProduto.value.toLowerCase();

    lista = lista
        .filter(p=>p.nome.toLowerCase().includes(busca))
        .sort((a,b)=>a.nome.localeCompare(b.nome));

    listaProdutos.innerHTML='';

    lista.forEach((p,i)=>{
        const div = document.createElement('div');
        div.className='card';

        div.innerHTML = `
        <b>${p.nome}</b><br>
        Cod: ${p.cod || '-'} | Custo: ${p.custo || '-'}
        <br>
        <button onclick="event.stopPropagation(); editar(${i})">Editar</button>
        <button onclick="event.stopPropagation(); excluir(${i})">Excluir</button>
        `;

        div.onclick = ()=>{
            p_nome.value = p.nome;
            p_cod.value = p.cod;
            p_custo.value = p.custo;
        };

        listaProdutos.appendChild(div);
    });
}

/* TRATATIVA */
let textoFinal='';

function salvar(){
    const produto = document.getElementById('produto').value;
    const cod = document.getElementById('cod').value;
    const chegou = document.getElementById('chegou').value;
    const quebra = document.getElementById('quebra').value;
    const data = new Date().toLocaleDateString();

    if(!produto || !cod){
        alert("Preencha produto e código");
        return;
    }

    textoFinal =
`Cód: ${cod}
${produto}
Data: ${data}
Qtd Chegou: ${chegou}
Qtd Quebra: ${quebra}`;

    texto.innerText = textoFinal;

    ir(3);
}

function enviarTexto(){
    window.open(`https://wa.me/?text=${encodeURIComponent(textoFinal)}`);
}

/* INIT */
carregarBase();

</script>

</body>
</html>
