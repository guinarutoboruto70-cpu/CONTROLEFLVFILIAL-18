<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FLV</title>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a0a; color:#fff; }
.screen { display:none; padding:20px; }
.active { display:block; }

h1,h2 { text-align:center; color:#ffcc00; }

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
}

.card {
    background:#1a1a1a;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

.preview img{
    width:70px;
    margin:5px;
    border-radius:6px;
}

.big img{
    width:100px;
    margin:5px;
    border-radius:6px;
}
</style>
</head>

<body>

<div id="tela0" class="screen active">
    <h1>Controle FLV</h1>
    <button class="btn" onclick="ir(1)">ENTRAR</button>
</div>

<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button class="btn" onclick="ir(2)">Nova Tratativa</button>
    <button class="btn" onclick="ir(7)">Lista</button>
</div>

<div id="tela2" class="screen">
    <h2>Tratativa</h2>

    <input id="produto" placeholder="Produto">
    <input id="cod" placeholder="Código">

    <input id="chegou" type="number" placeholder="Chegou">
    <input id="quebra" type="number" placeholder="Quebra">

    <div class="card">
        Produto
        <input type="file" multiple onchange="addFotos(event,'prod')">
        <div id="prev_prod" class="preview"></div>
    </div>

    <div class="card">
        Balança
        <input type="file" multiple onchange="addFotos(event,'bal')">
        <div id="prev_bal" class="preview"></div>
    </div>

    <div class="card">
        Etiqueta
        <input type="file" multiple accept="image/*" capture="environment" onchange="addFotos(event,'eti')">
        <div id="prev_eti" class="preview"></div>
    </div>

    <button class="btn" onclick="salvar()">Continuar</button>
</div>

<div id="tela3" class="screen">
    <h2>Envio</h2>

    <pre id="texto"></pre>

    <button class="btn" onclick="enviarTexto()">ENVIAR TEXTO</button>

    <div id="fotosEnvio"></div>

    <button class="btn" onclick="finalizar()">FINALIZAR</button>
</div>

<div id="tela7" class="screen">
    <h2>Lista</h2>
    <div id="lista"></div>
</div>

<script>

let fotos = {prod:[],bal:[],eti:[]};
let banco = [];
let atual = {};

/* NAV */
function ir(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('tela'+t)?.classList.add('active');
}

/* ADD FOTOS (AGORA SALVA FILE REAL) */
function addFotos(e,tipo){
    const div = document.getElementById('prev_'+tipo);
    if(!div) return;

    [...e.target.files].forEach(file=>{
        const url = URL.createObjectURL(file);

        fotos[tipo].push({file,url});

        const img = document.createElement('img');
        img.src = url;
        div.appendChild(img);
    });
}

/* SALVAR */
function salvar(){
    const produto = document.getElementById('produto').value;
    const cod = document.getElementById('cod').value;

    const chegou = Number(document.getElementById('chegou').value)||0;
    const quebra = Number(document.getElementById('quebra').value)||0;

    const perc = chegou ? ((quebra/chegou)*100).toFixed(1) : 0;

    atual = {produto,cod,perc};

    document.getElementById('texto').innerText =
`Cód: ${cod}
${produto}
Perda: ${perc}%`;

    montarFotos();

    ir(3);
}

/* MOSTRAR FOTOS */
function montarFotos(){
    const div = document.getElementById('fotosEnvio');
    div.innerHTML = '';

    ['prod','bal','eti'].forEach(tipo=>{
        if(fotos[tipo].length > 0){
            div.innerHTML += `<h3>${tipo.toUpperCase()}</h3>`;

            fotos[tipo].forEach(obj=>{
                const box = document.createElement('div');
                box.className = 'big';

                const img = document.createElement('img');
                img.src = obj.url;

                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = 'COMPARTILHAR FOTO';
                btn.onclick = ()=>compartilhar(obj.file);

                box.appendChild(img);
                box.appendChild(btn);

                div.appendChild(box);
            });
        }
    });
}

/* COMPARTILHAR REAL */
async function compartilhar(file){
    if(navigator.share){
        try{
            await navigator.share({
                files: [file],
                title: "Tratativa FLV"
            });
        }catch(e){
            alert("Erro ao compartilhar");
        }
    }else{
        alert("Seu celular não suporta essa função");
    }
}

/* TEXTO */
function enviarTexto(){
    const texto = document.getElementById('texto').innerText;
    window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
}

/* FINALIZAR */
function finalizar(){
    banco.push(atual);
    atualizarLista();
    fotos = {prod:[],bal:[],eti:[]};
    ir(7);
}

/* LISTA */
function atualizarLista(){
    const div = document.getElementById('lista');
    div.innerHTML = '';

    banco.forEach(d=>{
        div.innerHTML += `<div class="card">${d.cod} - ${d.produto} (${d.perc}%)</div>`;
    });
}

</script>

</body>
</html>
