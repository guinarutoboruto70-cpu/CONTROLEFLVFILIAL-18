<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLV 1018</title>
    
    <!-- Referência aos arquivos que já estão no seu Git -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root { --bg: #0a0a0a; --gold: #ffcc00; --card: #1a1a1a; --txt: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--txt); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app { flex: 1; display: flex; flex-direction: column; padding: 15px; max-width: 500px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .screen { display: none; flex-direction: column; height: 100%; }
        .active { display: flex; }
        .header { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 15px; }
        .back-btn { background: none; border: none; color: var(--gold); font-size: 1.5rem; cursor: pointer; padding-right: 15px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .btn-alt { background: #333; color: white; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 8px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .list-container { flex: 1; overflow-y: auto; background: #111; border-radius: 8px; border: 1px solid #333; }
        .prod-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .p-nome { font-weight: bold; color: #ddd; }
        .p-cod { color: var(--gold); font-family: monospace; }
    </style>
</head>
<body>

<div class="app">
    <!-- MENU -->
    <div id="step0" class="screen active">
        <h1 style="text-align:center; color:var(--gold);">FLV 1018</h1>
        <button class="btn" style="height:100px;" onclick="mudarTela(1)">🍎 LANÇAR TRATATIVA</button>
        <button class="btn btn-alt" onclick="mudarTela('cadastro')">📦 PRODUTOS (A-Z)</button>
    </div>

    <!-- LISTA/CADASTRO -->
    <div id="step-cadastro" class="screen">
        <div class="header"><button class="back-btn" onclick="mudarTela(0)">⬅</button><h2>Produtos</h2></div>
        <div style="margin-bottom:15px;">
            <input type="number" id="new-cod" placeholder="Cód">
            <input type="text" id="new-nome" placeholder="Nome do Produto">
            <button class="btn" onclick="salvarNovo()">CADASTRAR</button>
        </div>
        <div class="list-container" id="lista-cadastrados"></div>
    </div>

    <!-- TRATATIVA -->
    <div id="step1" class="screen">
        <div class="header"><button class="back-btn" onclick="mudarTela(0)">⬅</button><h2>Nova Tratativa</h2></div>
        <p style="text-align:center; color:#666;">Módulo de lançamento em breve...</p>
    </div>
</div>

<script>
    let db;
    const cargaInicial = [
        {cod:"1124", nome:"ABACATE KG", un:"KG"}, {cod:"1125", nome:"ABACAXI", un:"UN"},
        {cod:"1129", nome:"ABOBORA ITALIA KG", un:"KG"}, {cod:"1130", nome:"ABOBORA JAPONESA KG", un:"KG"},
        {cod:"242", nome:"ALHO KG 5", un:"KG"}, {cod:"744", nome:"AMEIXA BDJ 500G", un:"G"},
        {cod:"739", nome:"AMEIXA KG", un:"KG"}, {cod:"537", nome:"BANANA MACA KG", un:"KG"},
        {cod:"538", nome:"BANANA NANICA KG", un:"KG"}, {cod:"541", nome:"BANANA PRATA KG", un:"KG"},
        {cod:"543", nome:"BANANA TERRA KG", un:"KG"}, {cod:"681", nome:"BATATA DOCE KG", un:"KG"},
        {cod:"688", nome:"BATATA KG", un:"KG"}, {cod:"7714", nome:"BETERRABA KG", un:"KG"},
        {cod:"8459", nome:"CAQUI BDJ 500G", un:"G"}, {cod:"8461", nome:"CARA KG", un:"KG"},
        {cod:"8572", nome:"CEBOLA KG", un:"KG"}, {cod:"8574", nome:"CEBOLA ROXA KG", un:"KG"},
        {cod:"8589", nome:"CENOURA KG", un:"KG"}, {cod:"7547", nome:"CHUCHU KG", un:"KG"},
        {cod:"7620", nome:"COCO SECO KG INT", un:"KG"}, {cod:"7622", nome:"COCO VERDE", un:"UN"},
        {cod:"5022", nome:"GENGIBRE KG", un:"KG"}, {cod:"5213", nome:"INHAME KG", un:"KG"},
        {cod:"5473", nome:"KIWI BDJ 600G", un:"G"}, {cod:"5558", nome:"LARANJA PERA KG", un:"KG"},
        {cod:"4362", nome:"LIMAO KG", un:"KG"}, {cod:"10750", nome:"MACA FUJI KG", un:"KG"},
        {cod:"3280", nome:"MACA GALA NAC KG", un:"KG"}, {cod:"3284", nome:"MACA PCT 1KG", un:"UN"},
        {cod:"3343", nome:"MAMAO FORMOSA KG", un:"KG"}, {cod:"3346", nome:"MAMAO PAPAYA KG", un:"KG"},
        {cod:"3369", nome:"MANGA PALMER KG", un:"KG"}, {cod:"3370", nome:"MANGA TOMMY KG", un:"KG"},
        {cod:"3422", nome:"MARACUJA AZEDO KG", un:"KG"}, {cod:"3560", nome:"MELANCIA KG", un:"KG"},
        {cod:"3565", nome:"MELAO AMARELO KG", un:"KG"}, {cod:"3582", nome:"MEXERICA PONKAN KG", un:"KG"},
        {cod:"3585", nome:"MILHO VERDE BDJ 5UN", un:"UN"}, {cod:"1766", nome:"PEPINO COMUM KG", un:"KG"},
        {cod:"1768", nome:"PEPINO JAPONES KG", un:"KG"}, {cod:"1778", nome:"PERA KG", un:"KG"},
        {cod:"1895", nome:"PIMENTAO VERDE KG", un:"KG"}, {cod:"1327", nome:"REPOLHO BCO KG", un:"KG"},
        {cod:"1329", nome:"REPOLHO ROXO KG", un:"KG"}, {cod:"7018", nome:"TOMATE GRAPE 180G", un:"G"},
        {cod:"7021", nome:"TOMATE GRAPE KG", un:"KG"}, {cod:"7028", nome:"TOMATE KG", un:"KG"},
        {cod:"7049", nome:"TOMATE MEL TREBESCHI 180G", un:"G"}, {cod:"7090", nome:"UVA PTA 500G S SEMENTE", un:"G"},
        {cod:"7089", nome:"UVA VERDE 500G S SEMENTE", un:"G"}, {cod:"7088", nome:"UVA VERM 500G S SEMENTE", un:"G"},
        {cod:"7094", nome:"UVA VITORIA MIMO SELECAO 400G S SEMENTE", un:"G"}
    ];

    const request = indexedDB.open("FLV_DB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("produtos", { keyPath: "cod" });
    };
    request.onsuccess = e => {
        db = e.target.result;
        verificarCarga();
    };

    function verificarCarga() {
        const tx = db.transaction("produtos", "readwrite");
        const store = tx.objectStore("produtos");
        store.count().onsuccess = e => {
            if (e.target.result === 0) {
                cargaInicial.forEach(p => store.put(p));
            }
        };
    }

    function mudarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = id === 'cadastro' ? 'step-cadastro' : 'step' + id;
        document.getElementById(target).classList.add('active');
        if(id === 'cadastro') renderLista();
    }

    function renderLista() {
        const container = document.getElementById('lista-cadastrados');
        container.innerHTML = '';
        db.transaction("produtos").objectStore("produtos").getAll().onsuccess = e => {
            let prods = e.target.result;
            prods.sort((a,b) => a.nome.localeCompare(b.nome));
            prods.forEach(p => {
                container.innerHTML += `<div class="prod-row"><span class="p-nome">${p.nome}</span><span class="p-cod">#${p.cod}</span></div>`;
            });
        };
    }

    function salvarNovo() {
        const cod = document.getElementById('new-cod').value;
        const nome = document.getElementById('new-nome').value.toUpperCase();
        if(!cod || !nome) return;
        db.transaction("produtos", "readwrite").objectStore("produtos").put({cod, nome, un:"KG"});
        renderLista();
    }

    // REGISTRO DO SERVICE WORKER (Para instalação no celular)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("SW ok")).catch(e => console.log("SW erro", e));
    }
</script>
</body>
</html>
