<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FLV</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffcc00">

<style>
body{margin:0;font-family:sans-serif;background:#0a0a0a;color:#fff}
.screen{display:none;padding:20px}
.active{display:block}
h1,h2{text-align:center;color:#ffcc00}
.btn{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;background:#ffcc00;font-weight:bold}
.btn.enviado{background:#00c853;color:#000}
.btn-small{padding:6px 10px;margin-top:8px;margin-right:6px;border:none;border-radius:6px;font-size:12px;font-weight:bold}
.alt{background:#ffe680;color:#000}
.del{background:#ff4444;color:#fff}
.ok{background:#00c853;color:#000}
.card{background:#1a1a1a;padding:10px;margin-top:8px;border-radius:8px}
.produto-linha{font-weight:bold;font-size:15px}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:none}
.autocomplete{max-height:220px;overflow:auto}
.preview img{width:70px;height:70px;object-fit:cover;margin:5px;border-radius:6px}
.mini{width:80px;height:80px;object-fit:cover;display:block;margin-top:5px;border-radius:6px}
.status{margin-top:10px;color:#00ff88;text-align:center;font-weight:bold}
pre{white-space:pre-wrap}
</style>
</head>

<body>

<div id="tela0" class="screen active">
    <h1>Controle FLV</h1>
    <button id="btnEntrar" class="btn">ENTRAR</button>
</div>

<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button id="btnTratativa" class="btn">Nova Tratativa</button>
    <button id="btnQuebraDia" class="btn">Quebra do Dia</button>
    <button id="btnLista" class="btn">Lista</button>
    <button id="btnCadastro" class="btn">Cadastro de Produtos</button>
</div>

<div id="tela2" class="screen">
    <h2>Tratativa</h2>
    <button id="voltarTratativa" class="btn">⬅ VOLTAR</button>

    <input id="buscaProduto" placeholder="Buscar produto...">
    <div id="autoLista" class="autocomplete"></div>

    <input id="produto" placeholder="Produto">
    <input id="cod" placeholder="Código" inputmode="numeric" pattern="[0-9]*">
    <input id="chegou" type="text" inputmode="decimal" placeholder="Qtd Chegou">
    <input id="quebra" type="text" inputmode="decimal" placeholder="Qtd Quebra">

    <div class="card">
        Produto
        <input id="fotoProd" type="file" multiple accept="image/*">
        <div id="prev_prod" class="preview"></div>
    </div>

    <div class="card">
        Balança
        <input id="fotoBal" type="file" multiple accept="image/*">
        <div id="prev_bal" class="preview"></div>
    </div>

    <div class="card">
        Etiqueta<br>
        <button id="btnCamEtiqueta" class="btn">📷 Câmera</button>
        <button id="btnGalEtiqueta" class="btn">🖼️ Galeria</button>
        <input id="camEtiqueta" type="file" accept="image/*" capture="environment" style="display:none">
        <input id="galEtiqueta" type="file" accept="image/*" style="display:none">
        <div id="prev_eti" class="preview"></div>
    </div>

    <button id="btnContinuar" class="btn">Continuar</button>
</div>
