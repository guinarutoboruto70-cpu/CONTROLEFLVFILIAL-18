<!-- APENAS TRECHO ALTERADO PARA NÃO QUEBRAR SUA BASE -->

<!-- CAMPOS NOVOS NO CADASTRO -->
<input id="p_valor_emb" placeholder="Valor da embalagem" inputmode="decimal">
<input id="p_qtd_emb" placeholder="Qtd da embalagem" inputmode="decimal">
<input id="p_custo_calc" placeholder="Custo calculado" disabled>

<script>

// NOVA FUNÇÃO DE CÁLCULO
function calcularCustoProduto(){
    const valor = numeroBR(el('p_valor_emb').value);
    const qtd = Number(el('p_qtd_emb').value.replace(',','.'));

    if(!isNaN(valor) && qtd > 0){
        const custo = valor / qtd;
        el('p_custo_calc').value = custo.toFixed(3);
        return custo.toFixed(3);
    }

    el('p_custo_calc').value = '';
    return '';
}

// ATUALIZA EM TEMPO REAL
el('p_valor_emb').addEventListener('input', calcularCustoProduto);
el('p_qtd_emb').addEventListener('input', calcularCustoProduto);

// SALVAR PRODUTO (ALTERADO)
function salvarProduto(){

    if(!produtoSelecionadoId){
        alert('Selecione um produto na lista para alterar.');
        return;
    }

    let lista=getProdutos();
    const index=lista.findIndex(p=>p.id===produtoSelecionadoId);

    if(index===-1){
        alert('Produto não encontrado.');
        return;
    }

    const novoNome=el('p_nome').value.toUpperCase().trim();
    const novoId=gerarId(novoNome);

    const valorEmb = el('p_valor_emb').value.trim();
    const qtdEmb = el('p_qtd_emb').value.trim();
    const custoCalc = calcularCustoProduto();

    lista[index]={
        id:novoId,
        nome:novoNome,
        cod:el('p_cod').value.trim(),
        tipo:el('p_tipo').value,
        valorEmbalagem:valorEmb,
        qtdEmbalagem:qtdEmb,
        custo:custoCalc
    };

    produtoSelecionadoId=novoId;
    setProdutos(lista.sort((a,b)=>a.nome.localeCompare(b.nome)));

    renderListaProdutos();
    el('msgProduto').textContent='Produto salvo com custo atualizado!';
}

// CARREGAR PRODUTO PARA EDIÇÃO
function alterarProduto(id){
    const p=getProdutos().find(x=>x.id===id);
    if(!p)return;

    produtoSelecionadoId=id;

    el('p_nome').value=p.nome;
    el('p_cod').value=p.cod;
    el('p_tipo').value=p.tipo || 'KG';

    el('p_valor_emb').value=p.valorEmbalagem || '';
    el('p_qtd_emb').value=p.qtdEmbalagem || '';
    el('p_custo_calc').value=p.custo || '';

    el('msgProduto').textContent='Produto selecionado.';
}

</script>
