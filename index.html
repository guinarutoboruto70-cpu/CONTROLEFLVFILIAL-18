<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROLE FLV 1018</title>
    <style>
        :root { --bg: #0a0a0a; --gold: #ffcc00; --card: #1a1a1a; --txt: #ffffff; --green: #25d366; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--txt); }
        .app { max-width: 500px; margin: 0 auto; padding: 15px; }
        .screen { display: none; flex-direction: column; min-height: 90vh; }
        .active { display: flex; }
        .header { display: flex; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .back-btn { background: none; border: none; color: var(--gold); font-size: 1.8rem; cursor: pointer; padding-right: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1rem; margin-top: 10px; }
        input { width: 100%; padding: 15px; background: #222; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 1.1rem; box-sizing: border-box; margin-bottom: 10px; }
        
        #results { max-height: 200px; overflow-y: auto; background: #111; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .item { padding: 15px; border-bottom: 1px solid #222; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .thumb { background: #000; aspect-ratio: 1; border-radius: 8px; border: 1px solid #444; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .report { background: #000; padding: 15px; border-radius: 10px; border: 1px solid #555; font-family: monospace; white-space: pre-wrap; font-size: 1.1rem; }
        .btn-wa { background: var(--green); color: #fff; margin-bottom: 10px; }
        
        /* AJUSTE NA LISTA DE CADASTRO */
        .prod-list-container { margin-top: 20px; border-top: 1px solid #444; padding-top: 10px; }
        #lista-cadastrados { 
            max-height: 300px; /* Define altura máxima para forçar a rolagem */
            overflow-y: auto;  /* Ativa a rolagem vertical */
            margin-top: 10px;
        }
        .prod-row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #222; font-size: 0.9rem; color: #ccc; }
        .prod-row span:nth-child(1) { width: 50px; color: var(--gold); } /* Código */
        .prod-row span:nth-child(2) { flex-grow: 1; padding-left: 10px; } /* Nome */
        .prod-row span:nth-child(3) { width: 40px; text-align: right; opacity: 0.6; } /* Unidade */
    </style>
</head>
<body>

<div class="app">
    <div id="step0" class="screen active">
        <h1 style="text-align:center; color:var(--gold); margin: 40px 0;">FLV 1018</h1>
        <button class="btn" style="height:100px; margin-bottom:20px;" onclick="mudarTela(1)">🍎 NOVA TRATATIVA</button>
        <button class="btn" style="background:#333; color:white; height:80px;" onclick="abrirCadastro()">➕ CADASTRAR PRODUTO</button>
    </div>

    <div id="step1" class="screen">
        <div class="header">
            <button class="back-btn" onclick="mudarTela(0)">⬅</button>
            <h2 style="margin:0">Dados</h2>
        </div>
        <div class="card">
            <input type="text" id="search" placeholder="Buscar código ou nome..." oninput="filtrar(this.value)">
            <div id="results"></div>
            <div id="dados-prod" style="display:none">
                <p id="label-nome" style="color:var(--gold); font-weight:bold; font-size:1.3rem; margin-bottom:10px;"></p>
                <input type="number" id="qtd-chegou" placeholder="Qtd Chegou" inputmode="decimal">
                <input type="number" id="qtd-quebra" placeholder="Qtd Quebra" inputmode="decimal">
                <button class="btn" onclick="mudarTela(2)">PRÓXIMO: FOTOS</button>
            </div>
        </div>
    </div>

    <div id="step2" class="screen">
        <div class="header">
            <button class="back-btn" onclick="mudarTela(1)">⬅</button>
            <h2 style="margin:0">Fotos</h2>
        </div>
        <div class="card">
            <button class="btn" style="background:#333; margin-bottom:10px" onclick="fClick('f-prod')">📸 FOTO PRODUTO</button>
            <input type="file" id="f-prod" accept="image/*" multiple hidden onchange="preview(this, 'g-prod', 'prod')">
            <div class="grid" id="g-prod"></div>

            <button class="btn" style="background:#333; margin-bottom:10px" onclick="fClick('f-bal')">📸 FOTO BALANÇA</button>
            <input type="file" id="f-bal" accept="image/*" multiple hidden onchange="preview(this, 'g-bal', 'bal')">
            <div class="grid" id="g-bal"></div>

            <button class="btn" style="background:#333" onclick="fClick('f-eti')">📸 FOTO ETIQUETA</button>
            <input type="file" id="f-eti" accept="image/*" hidden onchange="preview(this, 'g-eti', 'eti')">
            <div class="grid" id="g-eti"></div>
        </div>
        <button class="btn" onclick="gerarRelatorio()">GERAR RELATÓRIO</button>
    </div>

    <div id="step3" class="screen">
        <div class="header">
            <button class="back-btn" onclick="mudarTela(2)">⬅</button>
            <h2 style="margin:0">Enviar</h2>
        </div>
        <div class="card">
            <div class="report" id="txt-final"></div>
            <button class="btn btn-wa" onclick="enviarTexto()">ENVIAR TEXTO</button>
        </div>
        <div id="area-fotos-final" class="card"></div>
        <button class="btn" style="background:none; border:2px solid var(--gold); color:var(--gold);" onclick="location.reload()">NOVA TRATATIVA</button>
    </div>

    <div id="step4" class="screen">
        <div class="header">
            <button class="back-btn" onclick="mudarTela(0)">⬅</button>
            <h2 style="margin:0">Novo Produto</h2>
        </div>
        <div class="card">
            <input type="number" id="new-cod" placeholder="Código">
            <input type="text" id="new-nome" placeholder="Nome do Produto">
            <input type="text" id="new-un" placeholder="Unidade (KG ou UN)">
            <button class="btn" onclick="salvarProduto()">SALVAR PRODUTO</button>
            
            <div class="prod-list-container">
                <h3 style="font-size:0.8rem; color:var(--gold); text-transform: uppercase;">Produtos no Sistema:</h3>
                <div id="lista-cadastrados"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let db;
    let selecionado = null;
    let fotos = { prod: [], bal: [], eti: [] };

    const req = indexedDB.open("DB_FLV_1018_FINAL", 1);
    req.onupgradeneeded = e => {
        let store = e.target.result.createObjectStore("prods", { keyPath: "cod" });
        store.add({ cod: "688", nome: "BATATA KG", un: "KG" });
        store.add({ cod: "538", nome: "BANANA NANICA KG", un: "KG" });
    };
    req.onsuccess = e => db = e.target.result;

    function mudarTela(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        window.scrollTo(0,0);
    }

    function listarProdutos() {
        const area = document.getElementById('lista-cadastrados');
        area.innerHTML = '';
        db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
            // Ordenar por código para ficar organizado
            const lista = e.target.result.sort((a, b) => a.cod - b.cod);
            lista.forEach(p => {
                const row = document.createElement('div');
                row.className = 'prod-row';
                row.innerHTML = `<span>${p.cod}</span> <span>${p.nome}</span> <span>${p.un}</span>`;
                area.appendChild(row);
            });
        };
    }

    function abrirCadastro() {
        mudarTela(4);
        listarProdutos();
    }

    function filtrar(q) {
        const res = document.getElementById('results');
        res.innerHTML = '';
        if(!q) return;
        db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
            e.target.result.filter(p => p.cod.includes(q) || p.nome.includes(q.toUpperCase())).slice(0,5).forEach(p => {
                const d = document.createElement('div'); d.className = 'item';
                d.innerText = `${p.cod} - ${p.nome}`;
                d.onclick = () => {
                    selecionado = p;
                    document.getElementById('label-nome').innerText = p.nome;
                    document.getElementById('dados-prod').style.display = 'block';
                    document.getElementById('search').value = p.nome;
                    res.innerHTML = '';
                };
                res.appendChild(d);
            });
        };
    }

    function fClick(id) { document.getElementById(id).click(); }

    function preview(input, gridId, tipo) {
        Array.from(input.files).forEach(f => {
            const rd = new FileReader();
            rd.onload = e => {
                fotos[tipo].push({ data: e.target.result, file: f });
                const div = document.createElement('div'); div.className = 'thumb';
                div.innerHTML = `<img src="${e.target.result}">`;
                document.getElementById(gridId).appendChild(div);
            };
            rd.readAsDataURL(f);
        });
    }

    function gerarRelatorio() {
        const data = new Date().toLocaleDateString('pt-BR');
        const c = document.getElementById('qtd-chegou').value;
        const q = document.getElementById('qtd-quebra').value;
        const t = `Cod: ${selecionado.cod}\n${selecionado.nome}\nData: ${data}\nChegou: ${c} ${selecionado.un}\nQuebra: ${q} ${selecionado.un}`;
        document.getElementById('txt-final').innerText = t;

        const area = document.getElementById('area-fotos-final');
        area.innerHTML = '<p style="color:var(--gold); font-size:0.8rem; text-align:center;">ENVIAR FOTOS:</p>';
        ['prod', 'bal', 'eti'].forEach(cat => {
            fotos[cat].forEach((img, i) => {
                const b = document.createElement('button');
                b.className = 'btn btn-wa';
                b.innerText = `FOTO ${cat.toUpperCase()} (${i+1})`;
                b.onclick = () => { if(navigator.share) navigator.share({ files: [img.file] }); };
                area.appendChild(b);
            });
        });
        mudarTela(3);
    }

    function enviarTexto() {
        const t = document.getElementById('txt-final').innerText;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(t)}`);
    }

    function salvarProduto() {
        const cod = document.getElementById('new-cod').value;
        const nome = document.getElementById('new-nome').value.toUpperCase();
        const un = document.getElementById('new-un').value.toUpperCase() || "KG";
        if(cod && nome) {
            const tx = db.transaction("prods", "readwrite");
            tx.objectStore("prods").put({cod, nome, un});
            tx.oncomplete = () => { 
                document.getElementById('new-cod').value = '';
                document.getElementById('new-nome').value = '';
                listarProdutos(); 
            };
        }
    }
</script>
</body>
</html>
