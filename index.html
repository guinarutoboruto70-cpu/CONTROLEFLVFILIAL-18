<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRATAFLV 1018</title>
    <style>
        :root { --bg: #0a0a0a; --card-bg: #1a1a1a; --primary: #ffcc00; --text: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .screen { display: none; flex-direction: column; }
        .active { display: flex; }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; }
        .card { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: #252525; border: 1px solid #333; border-radius: 8px; color: white; margin: 8px 0; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .thumb { border: 1px solid #333; border-radius: 6px; overflow: hidden; background: #000; text-align: center; padding: 2px; }
        .thumb img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .btn-wa { background: #25d366; color: white; border: none; width: 100%; padding: 8px 0; font-size: 0.7rem; font-weight: bold; border-radius: 4px; margin-top: 4px; }
        .text-clean { background: #000; padding: 15px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; border: 1px solid #444; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="screen-data" class="screen active">
        <div class="card">
            <input type="text" id="search" placeholder="CÓDIGO OU PRODUTO..." oninput="searchP(this.value)">
            <div id="results"></div>
            <div id="info" style="display:none; margin-top:10px">
                <p id="detalhe" style="color:var(--primary); font-weight:bold"></p>
                <input type="text" id="chegou" placeholder="Qtd Chegou" inputmode="decimal">
                <input type="text" id="quebra" placeholder="Qtd Quebra" inputmode="decimal">
            </div>
        </div>
        <button class="btn" id="btn-next" disabled onclick="showScreen('screen-media')">ADICIONAR FOTOS</button>
        <button class="btn" style="background:none; border:1px solid #444; color:#aaa; font-size:0.7rem" onclick="toggleConfig()">CADASTRAR PRODUTOS</button>
        
        <div id="config-area" style="display:none; margin-top:20px" class="card">
            <input type="number" id="p-code" placeholder="CÓDIGO">
            <input type="text" id="p-name" placeholder="NOME">
            <input type="text" id="p-unit" placeholder="KG ou UN">
            <button class="btn" onclick="saveP()">SALVAR</button>
        </div>
    </div>

    <div id="screen-media" class="screen">
        <div class="card">
            <button class="btn" style="background:#333" onclick="document.getElementById('f-all').click()">📸 TIRAR FOTOS</button>
            <input type="file" id="f-all" accept="image/*" multiple onchange="handleFiles(event)" style="display:none">
            <div class="grid" id="pre-all"></div>
        </div>
        <button class="btn" onclick="generate()">GERAR TRATATIVA</button>
    </div>

    <div id="screen-final" class="screen">
        <div class="text-clean" id="txt-final"></div>
        <button class="btn" style="background:#25d366; color:white" onclick="sendText()">ENVIAR TEXTO</button>
        <div id="final-media" class="grid"></div>
        <button class="btn" style="margin-top:30px; background:none; border:1px solid var(--primary); color:var(--primary)" onclick="location.reload()">LIMPAR / NOVO</button>
    </div>

    <script>
        let db; let current = { prod: null, photos: [] };

        const init = () => {
            const req = indexedDB.open("TrataDB", 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("prods", { keyPath: "codigo" });
            req.onsuccess = e => db = e.target.result;
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleConfig() {
            const area = document.getElementById('config-area');
            area.style.display = area.style.display === 'none' ? 'block' : 'none';
        }

        function saveP() {
            const p = { codigo: document.getElementById('p-code').value, nome: document.getElementById('p-name').value.toUpperCase(), unidade: document.getElementById('p-unit').value.toUpperCase() };
            db.transaction("prods", "readwrite").objectStore("prods").put(p);
            alert("Salvo!"); toggleConfig();
        }

        function searchP(q) {
            const res = document.getElementById('results'); res.innerHTML = '';
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                e.target.result.filter(p => p.codigo.includes(q) || p.nome.includes(q.toUpperCase())).slice(0,3).forEach(p => {
                    const d = document.createElement('div'); d.style.padding='15px'; d.style.borderBottom='1px solid #333';
                    d.innerText = `${p.codigo} - ${p.nome}`;
                    d.onclick = () => {
                        current.prod = p; document.getElementById('detalhe').innerText = p.nome;
                        document.getElementById('info').style.display='block'; document.getElementById('btn-next').disabled=false;
                        document.getElementById('search').value = p.nome; res.innerHTML = '';
                    };
                    res.appendChild(d);
                });
            };
        }

        function handleFiles(e) {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader();
                r.onload = ev => {
                    current.photos.push({ data: ev.target.result, file: f });
                    const d = document.createElement('div'); d.className='thumb';
                    d.innerHTML = `<img src="${ev.target.result}">`;
                    document.getElementById('pre-all').appendChild(d);
                };
                r.readAsDataURL(f);
            });
        }

        function generate() {
            const p = current.prod;
            const txt = `Cod: ${p.codigo}\n${p.nome}\n${new Date().toLocaleDateString('pt-BR')}\nChegou: ${document.getElementById('chegou').value} ${p.unidade}\nQuebra: ${document.getElementById('quebra').value} ${p.unidade}`;
            document.getElementById('txt-final').innerText = txt;
            
            const grid = document.getElementById('final-media'); grid.innerHTML = '';
            current.photos.forEach(img => {
                const d = document.createElement('div'); d.className='thumb';
                d.innerHTML = `<img src="${img.data}"><button class="btn-wa" onclick="shareImg(${current.photos.indexOf(img)})">ENVIAR</button>`;
                grid.appendChild(d);
            });
            showScreen('screen-final');
        }

        function sendText() {
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(document.getElementById('txt-final').innerText)}`, '_blank');
        }

        function shareImg(idx) {
            if (navigator.share) navigator.share({ files: [current.photos[idx].file] });
        }

        init();
    </script>
</body>
</html>
