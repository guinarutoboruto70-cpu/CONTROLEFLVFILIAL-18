<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRATAFLV - Filial 1018</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffcc00">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041310.png">

    <style>
        :root {
            --bg: #0a0a0a; --card-bg: #1a1a1a; --primary: #ffcc00;
            --text: #ffffff; --text-dim: #aaaaaa; --border: #333333;
            --success: #25d366; --danger: #ff4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; font-family: -apple-system, sans-serif; background: var(--bg);
            color: var(--text); min-height: 100vh; display: flex; flex-direction: column;
        }
        .screen { display: none; padding: 20px; flex-grow: 1; animation: fadeIn 0.3s ease; }
        .screen.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .btn {
            background: var(--primary); color: #000; border: none; padding: 16px;
            border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%;
            margin-bottom: 12px; text-transform: uppercase; font-size: 1rem;
        }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: #fff; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        input, select {
            width: 100%; padding: 14px; background: #252525; border: 1px solid var(--border);
            border-radius: 10px; color: white; margin-top: 8px; font-size: 1rem;
        }
        label { color: var(--text-dim); font-size: 0.8rem; font-weight: bold; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .preview-item { position: relative; aspect-ratio: 1; background: #252525; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .summary-text { background: #000; padding: 15px; border-radius: 10px; border: 1px dashed var(--primary); white-space: pre-wrap; font-family: monospace; line-height: 1.4; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="screen-start" class="screen active" style="justify-content: center; align-items: center; text-align: center;">
        <div style="font-size: 80px; margin-bottom: 20px;">🍎</div>
        <h1 style="color:var(--primary); margin:0;">TRATAFLV</h1>
        <p style="color:var(--text-dim);">Filial 1018 - Gestão de Quebras</p>
        <button class="btn" onclick="showScreen('screen-menu')">INICIAR SISTEMA</button>
    </div>

    <div id="screen-menu" class="screen">
        <h2>MENU PRINCIPAL</h2>
        <button class="btn" style="height: 80px;" onclick="startNewTratativa()">🍎 NOVA TRATATIVA</button>
        <button class="btn btn-outline" onclick="showScreen('screen-products')">📦 GERENCIAR PRODUTOS</button>
        <div style="margin-top: auto;">
            <button class="btn btn-danger" onclick="hardReset()">LIMPAR TUDO (RESET)</button>
        </div>
    </div>

    <div id="screen-products" class="screen">
        <h2>CADASTRO</h2>
        <div class="card">
            <label>CÓDIGO ERP</label>
            <input type="number" id="prod-code" placeholder="Ex: 1020" inputmode="numeric">
            <label style="margin-top:10px; display:block;">NOME DO PRODUTO</label>
            <input type="text" id="prod-name" placeholder="Ex: UVA THOMPSON">
            <label style="margin-top:10px; display:block;">UNIDADE</label>
            <select id="prod-unit"><option value="KG">KG</option><option value="UN">UN</option></select>
            <button class="btn" style="margin-top:15px" onclick="saveProduct()">SALVAR PRODUTO</button>
        </div>
        <div id="product-list-container" style="overflow-y: auto; max-height: 300px;"></div>
        <button class="btn btn-outline" style="margin-top:auto" onclick="showScreen('screen-menu')">VOLTAR</button>
    </div>

    <div id="screen-tratativa-data" class="screen">
        <h2>DADOS DA PERDA</h2>
        <div class="card">
            <label>PESQUISAR PRODUTO</label>
            <input type="text" id="search-prod" placeholder="Digite código ou nome..." oninput="searchProducts(this.value)">
            <div id="search-results" style="background:#222; border-radius:0 0 10px 10px; max-height:150px; overflow-y:auto;"></div>
            
            <div id="selected-prod-info" class="hidden" style="margin-top:15px; border-top:1px solid #333; padding-top:10px">
                <p id="display-name" style="color:var(--primary); font-weight:bold; font-size:1.2rem; margin-bottom:10px;"></p>
                <label>QUANTIDADE QUE CHEGOU</label>
                <input type="text" id="trat-chegou" placeholder="0,00" inputmode="decimal">
                <label style="margin-top:10px; display:block;">QUANTIDADE DE QUEBRA</label>
                <input type="text" id="trat-quebra" placeholder="0,00" inputmode="decimal">
            </div>
        </div>
        <button class="btn" id="btn-go-evidence" disabled onclick="showScreen('screen-tratativa-media')">PROSSEGUIR PARA FOTOS</button>
    </div>

    <div id="screen-tratativa-media" class="screen">
        <h2>EVIDÊNCIAS</h2>
        <div class="card">
            <label>FOTOS DO PRODUTO</label>
            <input type="file" id="f-prod" accept="image/*" multiple onchange="handleFiles(event, 'preview-prod')" style="display:none">
            <button class="btn btn-outline" onclick="document.getElementById('f-prod').click()">+ ADICIONAR FOTOS</button>
            <div class="preview-grid" id="preview-prod"></div>
        </div>
        <div class="card">
            <label>FOTOS DA BALANÇA / ETIQUETA</label>
            <input type="file" id="f-bal" accept="image/*" multiple onchange="handleFiles(event, 'preview-bal')" style="display:none">
            <button class="btn btn-outline" onclick="document.getElementById('f-bal').click()">+ ADICIONAR FOTOS</button>
            <div class="preview-grid" id="preview-bal"></div>
        </div>
        <button class="btn" onclick="goToFinal()">GERAR RELATÓRIO FINAL</button>
    </div>

    <div id="screen-tratativa-send" class="screen">
        <h2>RELATÓRIO PRONTO</h2>
        <div class="summary-text" id="final-text-summary"></div>
        <button class="btn" style="background:var(--success)" onclick="copyTextAndOpenWA()">ABRIR WHATSAPP</button>
        <button class="btn btn-outline" onclick="showScreen('screen-menu')">VOLTAR AO INÍCIO</button>
    </div>

    <script>
        let db;
        let currentTratativa = { media: { 'preview-prod': [], 'preview-bal': [] } };

        const initDB = () => {
            const req = indexedDB.open("TrataDB", 2);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if(!d.objectStoreNames.contains("prods")) d.createObjectStore("prods", { keyPath: "codigo" });
            };
            req.onsuccess = e => { db = e.target.result; renderProductList(); };
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function saveProduct() {
            const code = document.getElementById('prod-code').value;
            const name = document.getElementById('prod-name').value.toUpperCase();
            const unit = document.getElementById('prod-unit').value;
            if(!code || !name) return alert("Preencha todos os campos");
            const tx = db.transaction("prods", "readwrite");
            tx.objectStore("prods").put({ codigo: code, nome: name, unidade: unit });
            document.getElementById('prod-code').value = '';
            document.getElementById('prod-name').value = '';
            renderProductList();
        }

        function renderProductList() {
            const cont = document.getElementById('product-list-container');
            if(!cont) return;
            cont.innerHTML = '';
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                e.target.result.forEach(p => {
                    const d = document.createElement('div');
                    d.className = 'card';
                    d.style.display = 'flex'; d.style.justifyContent = 'space-between';
                    d.innerHTML = `<span><b>${p.codigo}</b> - ${p.nome}</span> <span onclick="deleteProd('${p.codigo}')" style="color:var(--danger); cursor:pointer">EXCLUIR</span>`;
                    cont.appendChild(d);
                });
            };
        }

        function deleteProd(c) {
            if(confirm("Excluir produto?")) {
                db.transaction("prods", "readwrite").objectStore("prods").delete(c);
                renderProductList();
            }
        }

        function searchProducts(q) {
            const res = document.getElementById('search-results');
            res.innerHTML = '';
            if(q.length < 1) return;
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                const list = e.target.result.filter(p => p.codigo.includes(q) || p.nome.includes(q.toUpperCase()));
                list.slice(0, 5).forEach(p => {
                    const d = document.createElement('div');
                    d.style.padding = '15px'; d.style.borderBottom = '1px solid #333'; d.style.cursor = 'pointer';
                    d.innerText = `${p.codigo} - ${p.nome}`;
                    d.onclick = () => {
                        currentTratativa.product = p;
                        document.getElementById('display-name').innerText = p.nome;
                        document.getElementById('selected-prod-info').classList.remove('hidden');
                        document.getElementById('btn-go-evidence').disabled = false;
                        document.getElementById('search-prod').value = p.nome;
                        res.innerHTML = '';
                    };
                    res.appendChild(d);
                });
            };
        }

        function handleFiles(e, id) {
            const files = Array.from(e.target.files);
            files.forEach(f => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentTratativa.media[id].push(ev.target.result);
                    const img = document.createElement('div');
                    img.className = 'preview-item';
                    img.innerHTML = `<img src="${ev.target.result}">`;
                    document.getElementById(id).appendChild(img);
                };
                reader.readAsDataURL(f);
            });
        }

        function goToFinal() {
            const p = currentTratativa.product;
            const chegou = document.getElementById('trat-chegou').value.replace(',', '.');
            const quebra = document.getElementById('trat-quebra').value.replace(',', '.');
            const data = new Date().toLocaleDateString('pt-BR');
            
            const texto = `📌 *TRATATIVA FLV - 1018*\n\n` +
                          `📦 *PROD:* ${p.nome}\n` +
                          `🔢 *COD:* ${p.codigo}\n` +
                          `📅 *DATA:* ${data}\n` +
                          `🚚 *CHEGOU:* ${chegou} ${p.unidade}\n` +
                          `❌ *QUEBRA:* ${quebra} ${p.unidade}`;
            
            currentTratativa.resumo = texto;
            document.getElementById('final-text-summary').innerText = texto;
            navigator.clipboard.writeText(texto);
            showScreen('screen-tratativa-send');
        }

        function copyTextAndOpenWA() {
            navigator.clipboard.writeText(currentTratativa.resumo);
            window.open("https://wa.me/", "_blank");
        }

        function startNewTratativa() {
            currentTratativa = { media: { 'preview-prod': [], 'preview-bal': [] } };
            document.getElementById('preview-prod').innerHTML = '';
            document.getElementById('preview-bal').innerHTML = '';
            document.getElementById('search-prod').value = '';
            document.getElementById('trat-chegou').value = '';
            document.getElementById('trat-quebra').value = '';
            document.getElementById('selected-prod-info').classList.add('hidden');
            document.getElementById('btn-go-evidence').disabled = true;
            showScreen('screen-tratativa-data');
        }

        function hardReset() { 
            if(confirm("Deseja apagar todos os produtos e configurações?")) { 
                indexedDB.deleteDatabase("TrataDB"); 
                location.reload(); 
            } 
        }

        // PWA Registration & Lifecycle
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => {
                    console.log('SW registrado');
                    reg.update();
                })
                .catch(err => console.log('Erro SW:', err));
            });
        }

        initDB();
    </script>
</body>
</html>
