<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FLV</title>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a0a; color:#fff; }
.screen { display:none; padding:20px; }
.active { display:block; }

h1,h2 { text-align:center; color:#ffcc00; }

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
}

input {
    width:100%;
    padding:10px;
    margin-top:8px;
    background:#222;
    border:1px solid #444;
    color:#fff;
    border-radius:6px;
}

.card {
    background:#1a1a1a;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
}

.small-btn{ padding:5px; margin-top:5px; border:none; border-radius:5px; }
.edit{ background:#00c3ff; }
.del{ background:#ff4444; }

.listaBusca{
    max-height:200px;
    overflow-y:auto;
}
</style>
</head>

<body>

<div id="tela0" class="screen active">
    <h1>Controle FLV</h1>
    <button class="btn" onclick="ir(1)">ENTRAR</button>
</div>

<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button class="btn" onclick="ir(2)">Nova Tratativa</button>
    <button class="btn" onclick="ir(6)">Produtos</button>
</div>

<div id="tela2" class="screen">
    <h2>Tratativa</h2>

    <input id="busca" placeholder="Buscar produto...">

    <div id="resultadoBusca" class="listaBusca"></div>

    <input id="produto" placeholder="Produto">
    <input id="cod" placeholder="Código">

    <input id="chegou" type="number" placeholder="Chegou">
    <input id="quebra" type="number" placeholder="Quebra">

    <button class="btn" onclick="salvar()">Continuar</button>
    <button class="btn" onclick="ir(1)">Voltar</button>
</div>

<div id="tela3" class="screen">
    <h2>Enviar</h2>
    <pre id="texto"></pre>

    <button class="btn" onclick="copiar()">COPIAR</button>
    <button class="btn" onclick="enviar()">WHATSAPP</button>
    <button class="btn" onclick="finalizar()">FINALIZAR</button>
</div>

<div id="tela6" class="screen">
    <h2>Produtos</h2>

    <input id="novoCod" placeholder="Código">
    <input id="novoNome" placeholder="Nome do Produto">

    <button class="btn" onclick="salvarProduto()">Salvar</button>

    <div id="listaProdutos"></div>

    <button class="btn" onclick="ir(1)">Voltar</button>
</div>

<script>

let produtos = [];
let banco = [];
let atual = {};
let editando = null;

/* INIT */
function init(){
    try{
        produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        banco = JSON.parse(localStorage.getItem('banco')) || [];
    }catch(e){
        produtos = [];
        banco = [];
    }

    renderProdutos();
    ativarBusca();
}

/* NAV */
function ir(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const tela = document.getElementById('tela'+t);
    if(tela) tela.classList.add('active');
}

/* BUSCA */
function ativarBusca(){
    const campo = document.getElementById('busca');
    if(!campo) return;

    campo.addEventListener('input', ()=>{
        const texto = campo.value.toLowerCase();
        const div = document.getElementById('resultadoBusca');
        if(!div) return;

        div.innerHTML = '';

        if(!texto || produtos.length === 0) return;

        const filtrados = produtos.filter(p =>
            p.nome.toLowerCase().includes(texto)
        );

        filtrados.slice(0,20).forEach(p=>{
            const item = document.createElement('div');
            item.className = 'card';
            item.innerText = `${p.nome} (${p.cod})`;

            item.onclick = ()=>{
                const prod = document.getElementById('produto');
                const cod = document.getElementById('cod');

                if(prod) prod.value = p.nome;
                if(cod) cod.value = p.cod;

                div.innerHTML = '';
                campo.value = '';
            };

            div.appendChild(item);
        });
    });
}

/* PRODUTOS */
function salvarProduto(){
    const codInput = document.getElementById('novoCod');
    const nomeInput = document.getElementById('novoNome');

    if(!codInput || !nomeInput) return;

    const cod = codInput.value.trim();
    const nome = nomeInput.value.trim().toUpperCase();

    if(!cod || !nome){
        alert("Preencha!");
        return;
    }

    if(editando === null){
        if(produtos.some(p=>p.cod == cod)){
            alert("Código já existe!");
            return;
        }
        produtos.push({cod,nome});
    } else {
        produtos[editando] = {cod,nome};
        editando = null;
    }

    localStorage.setItem('produtos', JSON.stringify(produtos));
    codInput.value = '';
    nomeInput.value = '';
    renderProdutos();
}

function renderProdutos(){
    const div = document.getElementById('listaProdutos');
    if(!div) return;

    div.innerHTML = '';

    produtos.sort((a,b)=>a.nome.localeCompare(b.nome));

    produtos.forEach((p,i)=>{
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
        ${p.cod} - ${p.nome}<br>
        <button class="small-btn edit">Editar</button>
        <button class="small-btn del">Excluir</button>
        `;

        card.querySelector('.edit').onclick = ()=>editar(i);
        card.querySelector('.del').onclick = ()=>deletar(i);

        div.appendChild(card);
    });
}

function editar(i){
    const cod = document.getElementById('novoCod');
    const nome = document.getElementById('novoNome');

    if(!cod || !nome) return;

    cod.value = produtos[i].cod;
    nome.value = produtos[i].nome;
    editando = i;
}

function deletar(i){
    if(confirm("Excluir produto?")){
        produtos.splice(i,1);
        localStorage.setItem('produtos', JSON.stringify(produtos));
        renderProdutos();
    }
}

/* TRATATIVA */
function salvar(){
    const produto = document.getElementById('produto');
    const cod = document.getElementById('cod');

    if(!produto || !cod || !produto.value || !cod.value){
        alert("Preencha!");
        return;
    }

    const chegou = Number(document.getElementById('chegou')?.value) || 0;
    const quebra = Number(document.getElementById('quebra')?.value) || 0;

    const perc = chegou ? ((quebra/chegou)*100).toFixed(1) : 0;

    atual = {produto:produto.value,cod:cod.value,chegou,quebra,perc};

    const textoEl = document.getElementById('texto');
    if(textoEl){
        textoEl.innerText =
`Cód: ${cod.value}
${produto.value}
Chegou: ${chegou}
Quebra: ${quebra}
Perda: ${perc}%`;
    }

    ir(3);
}

/* OUTROS */
function copiar(){
    const texto = document.getElementById('texto')?.innerText;
    if(texto){
        navigator.clipboard.writeText(texto);
        alert("Copiado!");
    }
}

function enviar(){
    const texto = document.getElementById('texto')?.innerText;
    if(texto){
        window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
    }
}

function finalizar(){
    banco.push(atual);
    localStorage.setItem('banco', JSON.stringify(banco));
    ir(1);
}

window.onload = init;

</script>

</body>
</html>
