<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRATAFLV - Filial 1018</title>
    <style>
        :root { --bg: #0a0a0a; --card-bg: #1a1a1a; --primary: #ffcc00; --text: #ffffff; --border: #333333; --success: #25d366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); }
        .screen { display: none; padding: 20px; flex-direction: column; }
        .screen.active { display: flex; }
        .btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 12px; text-transform: uppercase; }
        .btn-wa { background: var(--success); color: white; padding: 8px; font-size: 0.7rem; border-radius: 5px; width: 100%; border: none; margin-top: 4px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; background: #252525; border: 1px solid var(--border); border-radius: 10px; color: white; margin-top: 8px; }
        label { color: #aaa; font-size: 0.8rem; font-weight: bold; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .thumb { border: 1px solid var(--border); border-radius: 6px; padding: 2px; background: #222; }
        .thumb img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; }
        .summary { background: #000; padding: 15px; border-radius: 10px; border: 1px dashed var(--primary); white-space: pre-wrap; font-size: 0.9rem; margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <h1 style="color:var(--primary); text-align:center">TRATAFLV 1018</h1>
        <button class="btn" style="height:100px" onclick="startNew()">🍎 NOVA TRATATIVA</button>
        <button class="btn" style="background:transparent; border:1px solid #444; color:#fff" onclick="showScreen('screen-products')">PRODUTOS</button>
    </div>

    <div id="screen-products" class="screen">
        <div class="card">
            <input type="number" id="p-code" placeholder="CÓDIGO">
            <input type="text" id="p-name" placeholder="NOME">
            <input type="text" id="p-unit" placeholder="UNIDADE (KG/UN)">
            <button class="btn" style="margin-top:10px" onclick="saveP()">SALVAR</button>
        </div>
        <div id="p-list" style="max-height:300px; overflow-y:auto"></div>
        <button class="btn" onclick="showScreen('screen-menu')">VOLTAR</button>
    </div>

    <div id="screen-data" class="screen">
        <div class="card">
            <input type="text" id="search" placeholder="Pesquisar produto..." oninput="searchP(this.value)">
            <div id="results"></div>
            <div id="info" class="hidden">
                <p id="detalhe" style="color:var(--primary); font-weight:bold; margin:10px 0"></p>
                <label>CHEGOU</label><input type="text" id="chegou" inputmode="decimal">
                <label>QUEBRA</label><input type="text" id="quebra" inputmode="decimal">
            </div>
        </div>
        <button class="btn" id="next" disabled onclick="showScreen('screen-media')">ADICIONAR FOTOS</button>
    </div>

    <div id="screen-media" class="screen">
        <div class="card">
            <label>1. FOTOS DO PRODUTO</label>
            <input type="file" id="f-prod" accept="image/*" multiple onchange="handleImg(event, 'pre-prod')" class="hidden">
            <button class="btn" style="background:#333" onclick="document.getElementById('f-prod').click()">+ FOTOS PRODUTO</button>
            <div class="preview-grid" id="pre-prod"></div>
        </div>
        <div class="card">
            <label>2. FOTOS DA BALANÇA</label>
            <input type="file" id="f-bal" accept="image/*" multiple onchange="handleImg(event, 'pre-bal')" class="hidden">
            <button class="btn" style="background:#333" onclick="document.getElementById('f-bal').click()">+ FOTOS BALANÇA</button>
            <div class="preview-grid" id="pre-bal"></div>
        </div>
        <div class="card">
            <label>3. FOTO DA ETIQUETA</label>
            <input type="file" id="f-eti" accept="image/*" onchange="handleImg(event, 'pre-eti')" class="hidden">
            <button class="btn" style="background:#333" onclick="document.getElementById('f-eti').click()">📸 CÂMERA OU GALERIA</button>
            <div class="preview-grid" id="pre-eti"></div>
        </div>
        <button class="btn" onclick="finish()">GERAR RELATÓRIO</button>
    </div>

    <div id="screen-final" class="screen">
        <div class="summary" id="resumo"></div>
        <div class="preview-grid" id="final-grid"></div>
        <button class="btn" style="margin-top:20px; background:none; border:1px solid var(--primary); color:var(--primary)" onclick="location.reload()">NOVA TRATATIVA</button>
    </div>

    <script>
        let db; let current = { photos: [] };

        const init = () => {
            const req = indexedDB.open("TrataDB", 2);
            req.onupgradeneeded = e => { e.target.result.createObjectStore("prods", { keyPath: "codigo" }); };
            req.onsuccess = e => { db = e.target.result; renderP(); };
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function handleImg(e, id) {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader();
                r.onload = (ev) => {
                    current.photos.push(ev.target.result);
                    const div = document.createElement('div');
                    div.className='thumb'; div.innerHTML=`<img src="${ev.target.result}">`;
                    document.getElementById(id).appendChild(div);
                };
                r.readAsDataURL(f);
            });
        }

        function finish() {
            const p = current.prod;
            const data = new Date().toLocaleDateString('pt-BR');
            const txt = `🔢 *CÓD:* ${p.codigo}\n📦 *PRODUTO:* ${p.nome}\n📅 *DATA:* ${data}\n🚚 *CHEGOU:* ${document.getElementById('chegou').value} ${p.unidade}\n❌ *QTDA QUEBRA:* ${document.getElementById('quebra').value} ${p.unidade}`;
            
            document.getElementById('resumo').innerText = txt;
            const grid = document.getElementById('final-grid');
            grid.innerHTML = '';
            
            current.photos.forEach(img => {
                const div = document.createElement('div');
                div.className='thumb';
                div.innerHTML = `<img src="${img}"><button class="btn-wa" onclick="sendWA('${encodeURIComponent(txt)}')">ENVIAR</button>`;
                grid.appendChild(div);
            });
            showScreen('screen-final');
        }

        function sendWA(t) {
            navigator.clipboard.writeText(decodeURIComponent(t));
            window.open(`https://api.whatsapp.com/send?text=${t}`, '_blank');
        }

        function searchP(q) {
            const res = document.getElementById('results'); res.innerHTML = '';
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                e.target.result.filter(p => p.codigo.includes(q) || p.nome.includes(q.toUpperCase())).slice(0,5).forEach(p => {
                    const d = document.createElement('div'); d.style.padding='15px'; d.style.borderBottom='1px solid #333';
                    d.innerText = `${p.codigo} - ${p.nome}`;
                    d.onclick = () => {
                        current.prod = p; document.getElementById('detalhe').innerText = p.nome;
                        document.getElementById('info').classList.remove('hidden');
                        document.getElementById('next').disabled = false;
                        document.getElementById('search').value = p.nome; res.innerHTML = '';
                    };
                    res.appendChild(d);
                });
            };
        }

        function saveP() {
            const c = document.getElementById('p-code').value;
            const n = document.getElementById('p-name').value.toUpperCase();
            const u = document.getElementById('p-unit').value.toUpperCase();
            db.transaction("prods", "readwrite").objectStore("prods").put({codigo:c, nome:n, unidade:u});
            renderP();
        }

        function renderP() {
            const l = document.getElementById('p-list'); if(!l) return; l.innerHTML = '';
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                e.target.result.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(p => {
                    const d = document.createElement('div'); d.style.padding='5px'; d.style.fontSize='0.8rem';
                    d.innerText = `• ${p.nome} (${p.codigo})`; l.appendChild(d);
                });
            };
        }

        function startNew() {
            current = { photos: [] };
            document.getElementById('pre-prod').innerHTML=''; document.getElementById('pre-bal').innerHTML=''; document.getElementById('pre-eti').innerHTML='';
            document.getElementById('search').value=''; document.getElementById('info').classList.add('hidden');
            showScreen('screen-data');
        }

        init();
    </script>
</body>
</html>
