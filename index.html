<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FLV</title>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a0a; color:#fff; }
.screen { display:none; padding:20px; }
.active { display:block; }

h1,h2 { text-align:center; color:#ffcc00; }

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
}

.card {
    background:#1a1a1a;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

input {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:none;
}

.preview img{ width:70px; margin:5px; border-radius:6px; }

.mini {
    width:80px;
    height:80px;
    object-fit:cover;
    display:block;
    margin-top:5px;
    border-radius:6px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="tela0" class="screen active">
    <h1>Controle FLV</h1>
    <button class="btn" onclick="ir(1)">ENTRAR</button>
</div>

<!-- MENU -->
<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button class="btn" onclick="ir(2)">Nova Tratativa</button>
    <button class="btn" onclick="ir(7)">Lista</button>
    <button class="btn" onclick="ir(8); carregarProdutos()">Cadastro de Produtos</button>
</div>

<!-- TRATATIVA -->
<div id="tela2" class="screen">
    <h2>Tratativa</h2>
    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>

    <input id="buscaProduto" placeholder="Buscar produto..." oninput="buscarProduto()">
    <div id="sugestoes"></div>

    <input id="produto" placeholder="Produto">
    <input id="cod" placeholder="Código">

    <input id="chegou" type="number" placeholder="Qtd Chegou">
    <input id="quebra" type="number" placeholder="Qtd Quebra">

    <button class="btn" onclick="salvar()">Continuar</button>
</div>

<!-- ENVIO -->
<div id="tela3" class="screen">
    <h2>Envio</h2>
    <pre id="texto"></pre>
    <button class="btn" onclick="enviarTexto()">ENVIAR TEXTO</button>
    <button class="btn" onclick="ir(2)">⬅ VOLTAR</button>
</div>

<!-- LISTA -->
<div id="tela7" class="screen">
    <h2>Lista</h2>
    <div id="lista"></div>
    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>
</div>

<!-- PRODUTOS -->
<div id="tela8" class="screen">
    <h2>Cadastro de Produtos</h2>

    <input id="p_cod" placeholder="Código">
    <input id="p_nome" placeholder="Produto">
    <input id="p_custo" placeholder="Preço de custo">

    <button class="btn" onclick="salvarProduto()">SALVAR</button>

    <input id="buscaLista" placeholder="Buscar..." oninput="listarProdutos()">

    <div id="listaProdutos"></div>

    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>
</div>

<script>

/* NAV */
function ir(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('tela'+t).classList.add('active');
}

/* STORAGE */
function getProdutos(){
    return JSON.parse(localStorage.getItem('produtos') || '[]');
}

function setProdutos(lista){
    localStorage.setItem('produtos', JSON.stringify(lista));
}

/* CADASTRO */
let editIndex = null;

function salvarProduto(){
    let lista = getProdutos();

    const cod = p_cod.value.trim();
    const nome = p_nome.value.trim();
    const custo = p_custo.value.trim();

    if(!cod || !nome){
        alert("Preencha código e produto");
        return;
    }

    if(editIndex !== null){
        lista[editIndex] = {cod,nome,custo};
        editIndex = null;
    }else{
        if(lista.some(p=>p.cod === cod)){
            alert("Código já cadastrado");
            return;
        }
        lista.push({cod,nome,custo});
    }

    setProdutos(lista);
    limparProduto();
    listarProdutos();
}

function limparProduto(){
    p_cod.value='';
    p_nome.value='';
    p_custo.value='';
}

function listarProdutos(){
    const lista = getProdutos();
    const busca = buscaLista.value.toLowerCase();

    listaProdutos.innerHTML='';

    lista
    .filter(p=>p.nome.toLowerCase().includes(busca))
    .forEach((p,i)=>{

        const div = document.createElement('div');
        div.className='card';

        div.innerHTML = `
        ${p.cod} - ${p.nome} <br> Custo: ${p.custo}
        <br>
        <button onclick="editar(${i})">Editar</button>
        <button onclick="excluir(${i})">Excluir</button>
        `;

        listaProdutos.appendChild(div);
    });
}

function editar(i){
    const p = getProdutos()[i];

    p_cod.value = p.cod;
    p_nome.value = p.nome;
    p_custo.value = p.custo;

    editIndex = i;
}

function excluir(i){
    let lista = getProdutos();
    lista.splice(i,1);
    setProdutos(lista);
    listarProdutos();
}

/* BUSCA NA TRATATIVA */
function buscarProduto(){
    const texto = buscaProdutoInput().value.toLowerCase();
    const lista = getProdutos();

    sugestoes.innerHTML='';

    lista
    .filter(p=>p.nome.toLowerCase().includes(texto))
    .forEach(p=>{
        const div = document.createElement('div');
        div.className='card';
        div.innerText = `${p.cod} - ${p.nome}`;

        div.onclick = ()=>{
            produto.value = p.nome;
            cod.value = p.cod;
            sugestoes.innerHTML='';
        };

        sugestoes.appendChild(div);
    });
}

function buscaProdutoInput(){
    return document.getElementById('buscaProduto');
}

/* TRATATIVA */
let textoFinal='';

function salvar(){
    const produto = document.getElementById('produto').value;
    const cod = document.getElementById('cod').value;

    if(!produto || !cod){
        alert("Preencha produto");
        return;
    }

    textoFinal = `Cód: ${cod}\n${produto}`;

    texto.innerText = textoFinal;

    ir(3);
}

function enviarTexto(){
    window.open(`https://wa.me/?text=${encodeURIComponent(textoFinal)}`);
}

</script>

</body>
</html>
