<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRATAFLV - Filial 1018</title>
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" sizes="192x192" href="icon-192.png">
    <meta name="theme-color" content="#ffcc00">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --primary: #ffcc00;
            --text: #ffffff;
            --text-dim: #aaaaaa;
            --border: #333333;
            --success: #28a745;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .screen {
            display: none;
            padding: 20px;
            flex-grow: 1;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1, h2 { text-align: center; color: var(--primary); margin-top: 0; }

        .btn {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-small { padding: 8px 12px; font-size: 0.8rem; border-radius: 6px; width: auto; margin: 0; }
        .btn-danger { background-color: var(--danger); color: white; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-dim); font-size: 0.85rem; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        #screen-start { justify-content: center; align-items: center; text-align: center; }
        .logo-circle {
            width: 120px;
            height: 120px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }

        .product-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; }

        .upload-block { margin-bottom: 25px; }
        .upload-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #252525;
            border: 1px solid var(--border);
        }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-remove {
            position: absolute; top: 2px; right: 2px;
            background: rgba(0,0,0,0.7); color: white; border: none;
            border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer;
        }

        .summary-text {
            background: #252525; padding: 15px; border-radius: 8px;
            font-family: monospace; white-space: pre-wrap; margin-bottom: 20px;
            border: 1px dashed var(--primary); font-size: 0.9rem;
        }
        .photo-send-item {
            display: flex; align-items: center; gap: 10px;
            background: var(--card-bg); padding: 10px; border-radius: 10px; margin-bottom: 10px;
        }
        .photo-send-thumb { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }

        .hidden { display: none !important; }
        .mt-auto { margin-top: auto; }
        .header-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .btn-back { background: transparent; border: none; color: var(--primary); font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <!-- TELA 1: INÍCIO -->
    <div id="screen-start" class="screen active">
        <div class="logo-circle">🍎</div>
        <h1>TRATAFLV</h1>
        <p style="color: var(--text-dim); margin-bottom: 40px;">Filial 1018 - Gestão de Perdas</p>
        <button class="btn" onclick="showScreen('screen-menu')">ENTRAR</button>
    </div>

    <!-- TELA 2: MENU PRINCIPAL -->
    <div id="screen-menu" class="screen">
        <h1>MENU PRINCIPAL</h1>
        <div style="margin-top: 50px;">
            <button class="btn" style="padding: 30px;" onclick="startNewTratativa()">🍎 NOVA TRATATIVA</button>
            <button class="btn btn-outline" style="padding: 30px;" onclick="showScreen('screen-products')">📦 CADASTRO DE PRODUTOS</button>
        </div>
        <div class="mt-auto">
            <button class="btn btn-danger" onclick="showScreen('screen-start')">SAIR</button>
            <button class="btn btn-small" style="background:transparent; color:#444; border:none; margin-top:10px;" onclick="hardReset()">Limpeza de Emergência (Reset)</button>
        </div>
    </div>

    <!-- TELA 3: CADASTRO DE PRODUTOS -->
    <div id="screen-products" class="screen">
        <div class="header-nav">
            <button class="btn-back" onclick="showScreen('screen-menu')">←</button>
            <h2>PRODUTOS</h2>
        </div>
        
        <div class="card">
            <div class="form-group">
                <label>Código</label>
                <input type="number" id="prod-code" placeholder="Ex: 1124" inputmode="numeric">
            </div>
            <div class="form-group">
                <label>Nome do Produto</label>
                <input type="text" id="prod-name" placeholder="Ex: ABACATE">
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Preço de Custo (R$)</label>
                    <input type="text" id="prod-price" placeholder="0,00" inputmode="decimal">
                </div>
                <div class="form-group">
                    <label>Unidade Padrão</label>
                    <select id="prod-unit">
                        <option value="kg">kg</option>
                        <option value="un">un</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-small" id="btn-save-prod" onclick="saveProduct()">ADICIONAR PRODUTO</button>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Pesquisar na Lista</label>
                <input type="text" id="search-prod-list" placeholder="Filtrar..." oninput="renderProductList(this.value)">
            </div>
        </div>

        <div id="product-list-container" style="overflow-y: auto;"></div>
    </div>

    <!-- TELA 4: DADOS DA TRATATIVA -->
    <div id="screen-tratativa-data" class="screen">
        <div class="header-nav">
            <button class="btn-back" onclick="showScreen('screen-menu')">←</button>
            <h2>NOVA TRATATIVA</h2>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Buscar Produto (Cód ou Nome)</label>
                <div style="position: relative;">
                    <input type="text" id="search-prod" placeholder="Digite para buscar..." oninput="searchProducts(this.value)">
                    <span id="search-check" style="position: absolute; right: 10px; top: 10px; display: none;">✅</span>
                </div>
                <div id="search-results" style="background: #252525; border-radius: 0 0 8px 8px; max-height: 150px; overflow-y: auto; border: 1px solid var(--border); display: none;"></div>
            </div>

            <div id="selected-prod-info" class="hidden">
                <div class="form-group">
                    <label>Nome Confirmado</label>
                    <input type="text" id="trat-name" readonly style="background: #151515;">
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Preço Custo (R$)</label>
                        <input type="text" id="trat-price" inputmode="decimal">
                    </div>
                    <div class="form-group">
                        <label>Unidade</label>
                        <select id="trat-unit">
                            <option value="kg">kg</option>
                            <option value="un">un</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Chegou</label>
                        <input type="text" id="trat-chegou" placeholder="0.00" inputmode="decimal">
                    </div>
                    <div class="form-group">
                        <label>Quebra</label>
                        <input type="text" id="trat-quebra" placeholder="0.00" inputmode="decimal">
                    </div>
                </div>
            </div>
        </div>

        <button class="btn mt-auto" id="btn-go-evidence" onclick="goToEvidence()" disabled>PROSSEGUIR PARA FOTOS</button>
    </div>

    <!-- TELA 5: EVIDÊNCIAS -->
    <div id="screen-tratativa-media" class="screen">
        <div class="header-nav">
            <button class="btn-back" onclick="showScreen('screen-tratativa-data')">←</button>
            <h2>EVIDÊNCIAS</h2>
        </div>

        <div class="upload-block">
            <div class="upload-header">
                <span>📦 PRODUTOS</span>
                <button class="btn btn-small" onclick="triggerUpload('input-prod')">+ FOTO</button>
                <input type="file" id="input-prod" class="hidden" accept="image/*" multiple onchange="handleFiles(event, 'preview-prod')">
            </div>
            <div class="preview-grid" id="preview-prod"></div>
        </div>

        <div class="upload-block">
            <div class="upload-header">
                <span>⚖️ BALANÇA</span>
                <button class="btn btn-small" onclick="triggerUpload('input-bal')">+ FOTO</button>
                <input type="file" id="input-bal" class="hidden" accept="image/*" multiple onchange="handleFiles(event, 'preview-bal')">
            </div>
            <div class="preview-grid" id="preview-bal"></div>
        </div>

        <div class="upload-block">
            <div class="upload-header">
                <span>🏷️ ETIQUETA</span>
                <button class="btn btn-small" onclick="triggerUpload('input-eti')">+ FOTO</button>
                <input type="file" id="input-eti" class="hidden" accept="image/*" onchange="handleFiles(event, 'preview-eti', true)">
            </div>
            <div class="preview-grid" id="preview-eti"></div>
        </div>

        <button class="btn mt-auto" onclick="goToFinal()">FINALIZAR E ENVIAR</button>
    </div>

    <!-- TELA 6: RESUMO -->
    <div id="screen-tratativa-send" class="screen">
        <div class="header-nav">
            <button class="btn-back" onclick="showScreen('screen-tratativa-media')">←</button>
            <h2>RESUMO DE ENVIO</h2>
        </div>

        <button class="btn" onclick="copyTextAndOpenWA()">📋 COMPARTILHAR TEXTO</button>
        <div class="summary-text" id="final-text-summary"></div>

        <h3 style="color: var(--text-dim); font-size: 0.9rem; margin: 20px 0 10px;">ENVIAR EVIDÊNCIAS</h3>
        <div id="send-photos-list"></div>

        <button class="btn btn-outline mt-auto" onclick="startNewTratativa()">CONCLUIR E NOVA CONSULTA</button>
    </div>

    <script>
        const dbName = "trataflv_db";
        let db;
        const stores = { PRODS: "produtos", TRATS: "tratativas" };

        // Banco de Dados
        function initDB() {
            const request = indexedDB.open(dbName, 1);
            request.onupgradeneeded = e => {
                const d = e.target.result;
                d.createObjectStore(stores.PRODS, { keyPath: "codigo" });
                d.createObjectStore(stores.TRATS, { keyPath: "id", autoIncrement: true });
            };
            request.onsuccess = e => {
                db = e.target.result;
                renderProductList();
            };
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0, 0);
        }

        async function saveProduct() {
            const code = document.getElementById('prod-code').value;
            const name = document.getElementById('prod-name').value.toUpperCase();
            if (!code || !name) return alert("Preencha código e nome.");
            const tx = db.transaction(stores.PRODS, "readwrite");
            await tx.objectStore(stores.PRODS).put({
                codigo: code, nome: name, 
                preco: document.getElementById('prod-price').value,
                unidade: document.getElementById('prod-unit').value
            });
            renderProductList();
        }

        function renderProductList(filter = "") {
            if (!db) return;
            const container = document.getElementById('product-list-container');
            container.innerHTML = '';
            const tx = db.transaction(stores.PRODS, "readonly");
            tx.objectStore(stores.PRODS).getAll().onsuccess = e => {
                let list = e.target.result;
                if (filter) list = list.filter(p => p.codigo.includes(filter) || p.nome.includes(filter.toUpperCase()));
                list.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'product-list-item card';
                    div.innerHTML = `<div><b>${p.codigo}</b> - ${p.nome}</div>
                        <button class="btn btn-small btn-danger" onclick="deleteProduct('${p.codigo}')">🗑️</button>`;
                    container.appendChild(div);
                });
            };
        }

        function deleteProduct(code) {
            const tx = db.transaction(stores.PRODS, "readwrite");
            tx.objectStore(stores.PRODS).delete(code);
            renderProductList();
        }

        // Fluxo de Tratativa
        let currentTratativa = { media: { 'preview-prod': [], 'preview-bal': [], 'preview-eti': [] } };

        function startNewTratativa() {
            currentTratativa = { media: { 'preview-prod': [], 'preview-bal': [], 'preview-eti': [] } };
            document.getElementById('search-prod').value = '';
            document.getElementById('selected-prod-info').classList.add('hidden');
            document.getElementById('btn-go-evidence').disabled = true;
            showScreen('screen-tratativa-data');
        }

        function searchProducts(q) {
            const res = document.getElementById('search-results');
            if (q.length < 1) return res.style.display = 'none';
            const tx = db.transaction(stores.PRODS, "readonly");
            tx.objectStore(stores.PRODS).getAll().onsuccess = e => {
                const list = e.target.result.filter(p => p.codigo.includes(q) || p.nome.includes(q.toUpperCase()));
                res.innerHTML = '';
                if (list.length) {
                    res.style.display = 'block';
                    list.forEach(p => {
                        const d = document.createElement('div');
                        d.style.padding = '10px'; d.innerText = `${p.codigo} - ${p.nome}`;
                        d.onclick = () => selectProduct(p);
                        res.appendChild(d);
                    });
                } else res.style.display = 'none';
            };
        }

        function selectProduct(p) {
            currentTratativa.product = p;
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('search-prod').value = p.nome;
            document.getElementById('selected-prod-info').classList.remove('hidden');
            document.getElementById('trat-name').value = p.nome;
            document.getElementById('trat-price').value = p.preco;
            document.getElementById('trat-unit').value = p.unidade;
            document.getElementById('btn-go-evidence').disabled = false;
        }

        function goToEvidence() {
            currentTratativa.chegou = document.getElementById('trat-chegou').value;
            currentTratativa.quebra = document.getElementById('trat-quebra').value;
            currentTratativa.unidade_final = document.getElementById('trat-unit').value;
            showScreen('screen-tratativa-media');
        }

        // Mídia
        function triggerUpload(id) { document.getElementById(id).click(); }

        async function handleFiles(e, id, single = false) {
            const files = Array.from(e.target.files);
            if (single) currentTratativa.media[id] = [];
            for (const f of files) {
                const base64 = await fileToBase64(f);
                currentTratativa.media[id].push({ base64 });
            }
            renderPreviews(id);
        }

        function fileToBase64(file) {
            return new Promise((r, j) => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.readAsDataURL(file);
            });
        }

        function renderPreviews(id) {
            const cont = document.getElementById(id);
            cont.innerHTML = '';
            currentTratativa.media[id].forEach((m, i) => {
                const d = document.createElement('div');
                d.className = 'preview-item';
                d.innerHTML = `<img src="${m.base64}"><button class="preview-remove" onclick="removeMedia('${id}', ${i})">×</button>`;
                cont.appendChild(d);
            });
        }

        function removeMedia(id, i) {
            currentTratativa.media[id].splice(i, 1);
            renderPreviews(id);
        }

        // Finalização
        function goToFinal() {
            const p = currentTratativa.product;
            const data = new Date().toLocaleDateString('pt-BR');
            const text = `Cod: ${p.codigo}\n${p.nome}\nData: ${data}\nChegou: ${currentTratativa.chegou} ${currentTratativa.unidade_final}\nQuebra: ${currentTratativa.quebra} ${currentTratativa.unidade_final}`;
            
            document.getElementById('final-text-summary').innerText = text;
            currentTratativa.generatedText = text;

            const list = document.getElementById('send-photos-list');
            list.innerHTML = '';
            const allMedia = [...currentTratativa.media['preview-prod'], ...currentTratativa.media['preview-bal'], ...currentTratativa.media['preview-eti']];

            allMedia.forEach((m, idx) => {
                const item = document.createElement('div');
                item.className = 'photo-send-item';
                item.innerHTML = `<img src="${m.base64}" class="photo-send-thumb"> <span>Foto ${idx+1}</span>
                    <button class="btn btn-small" onclick="alert('Abra o WhatsApp e anexe a imagem da galeria.')">ENVIAR</button>`;
                list.appendChild(item);
            });
            showScreen('screen-tratativa-send');
        }

        function copyTextAndOpenWA() {
            navigator.clipboard.writeText(currentTratativa.generatedText);
            alert("Texto copiado! Cole no WhatsApp.");
            window.open("https://wa.me/", "_blank");
        }

        function hardReset() { if(confirm("Apagar tudo?")) { indexedDB.deleteDatabase(dbName); location.reload(); } }

        // PWA - Registro do Service Worker (Essencial para instalação)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error', err));
            });
        }

        initDB();
    </script>
</body>
</html>
