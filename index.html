<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRATAFLV - Filial 1018</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/apple.png">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --primary: #ffcc00;
            --text: #ffffff;
            --text-dim: #aaaaaa;
            --border: #333333;
            --success: #28a745;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .screen {
            display: none;
            padding: 20px;
            flex-grow: 1;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1, h2 { text-align: center; color: var(--primary); margin-top: 0; }

        /* Componentes Comuns */
        .btn {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-small { padding: 8px 12px; font-size: 0.8rem; border-radius: 6px; width: auto; margin: 0; }
        .btn-danger { background-color: var(--danger); color: white; }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-dim); font-size: 0.85rem; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--primary); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Tela 1: Início */
        #screen-start { justify-content: center; align-items: center; text-align: center; }
        .logo-circle {
            width: 120px;
            height: 120px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }

        /* Tela 3: Lista de Produtos */
        .product-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .product-list-item:last-child { border-bottom: none; }

        /* Tela 5: Evidências */
        .upload-block { margin-bottom: 25px; }
        .upload-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #252525;
            border: 1px solid var(--border);
        }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-remove {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Tela 6: Envio */
        .summary-text {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            margin-bottom: 20px;
            border: 1px dashed var(--primary);
            font-size: 0.9rem;
        }
        .photo-send-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .photo-send-thumb { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }

        /* Utilitários */
        .hidden { display: none !important; }
        .mt-auto { margin-top: auto; }
        .header-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .btn-back { background: transparent; border: none; color: var(--primary); font-size: 1.5rem; cursor: pointer; padding: 0; }
    </style>
</head>
<body>

    <!-- TELA 1: INÍCIO -->
    <div id="screen-start" class="screen active">
        <div class="logo-circle">🍎</div>
        <h1>TRATAFLV</h1>
        <p style="color: var(--text-dim); margin-bottom: 40px;">Filial 1018 - Gestão de Perdas</p>
        <button class="btn" onclick="showScreen('screen-menu')">ENTRAR</button>
    </div>

    <!-- TELA 2: MENU PRINCIPAL -->
    <div id="screen-menu" class="screen">
        <h1>MENU PRINCIPAL</h1>
        <div style="margin-top: 50px;">
            <button class="btn" style="padding: 30px;" onclick="startNewTratativa()">🍎 NOVA TRATATIVA</button>
            <button class="btn btn-outline" style="padding: 30px;" onclick="showScreen('screen-products')">📦 CADASTRO DE PRODUTOS</button>
        </div>
        <div class="mt-auto">
            <button class="btn btn-danger" onclick="showScreen('screen-start')">SAIR</button>
            <button class="btn btn-small" style="background:transparent; color:#444; border:none; margin-top:10px;" onclick="hardReset()">Limpeza de Emergência (Reset)</button>
        </div>
    </div>

    <!-- TELA 3: CADASTRO DE PRODUTOS -->
    <div id="screen-products" class="screen">
        <div class="header-nav">
            <button class="btn-back" onclick="showScreen('screen-menu')">←</button>
            <h2>PRODUTOS</h2>
        </div>
        
        <div class="card">
            <div class="form-group">
                <label>Código</label>
                <input type="number" id="prod-code" placeholder="Ex: 1124" inputmode="numeric">
            </div>
            <div class="form-group">
                <label>Nome do Produto</label>
                <input type="text" id="prod-name" placeholder="Ex: ABACATE">
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Preço de Custo (R$)</label>
                    <input type="text" id="prod-price" placeholder="0,00" inputmode="decimal">
                </div>
                <div class="form-group">
                    <label>Unidade Padrão</label>
                    <select id="prod-unit">
                        <option value="kg">kg</option>
                        <option value="un">un</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-small" id="btn-save-prod" onclick="saveProduct()">ADICIONAR PRODUTO</button>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Pesquisar na Lista</label>
                <input type="text" id="search-prod-list" placeholder="Filtrar por código ou nome..." oninput="renderProductList(this.value)">
            </div>
        </div>

        <div id="product-list-container" style="overflow-y: auto;">
            <!-- Itens via JS -->
        </div>
    </div>

    <!-- TELA 4: DADOS DA TRATATIVA -->
    <div id="screen-tratativa-data" class="screen">
        <div class="header-nav">
            <button class="btn-back" onclick="showScreen('screen-menu')">←</button>
            <h2>NOVA TRATATIVA</h2>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Buscar Produto (Cód ou Nome)</label>
                <div style="position: relative;">
                    <input type="text" id="search-prod" placeholder="Digite para buscar..." oninput="searchProducts(this.value)" onkeydown="handleSearchKeyDown(event)">
                    <span id="search-check" style="position: absolute; right: 10px; top: 10px; display: none;">✅</span>
                </div>
                <div id="search-results" style="background: #252525; border-radius: 0 0 8px 8px; max-height: 150px; overflow-y: auto; border: 1px solid var(--border); display: none;"></div>
            </div>

            <div id="selected-prod-info" class="hidden">
                <div class="form-group">
                    <label>Nome Confirmado</label>
                    <input type="text" id="trat-name" readonly style="background: #151515;">
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Preço Custo (R$)</label>
                        <input type="text" id="trat-price" inputmode="decimal">
                    </div>
                    <div class="form-group">
                        <label>Unidade</label>
                        <select id="trat-unit">
                            <option value="kg">kg</option>
                            <option value="un">un</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Chegou</label>
                        <input type="text" id="trat-chegou" placeholder="0.00" inputmode="decimal">
                    </div>
                    <div class="form-group">
                        <label>Quebra</label>
                        <input type="text" id="trat-quebra" placeholder="0.00" inputmode="decimal">
                    </div>
                </div>
            </div>
        </div>

        <button class="btn mt-auto" id="btn-go-evidence" onclick="goToEvidence()" disabled>PROSSEGUIR PARA FOTOS</button>
    </div>

    <!-- TELA 5: EVIDÊNCIAS (FOTOS) -->
    <div id="screen-tratativa-media" class="screen">
        <div class="header-nav">
            <button class="btn-back" onclick="showScreen('screen-tratativa-data')">←</button>
            <h2>EVIDÊNCIAS</h2>
        </div>

        <div class="upload-block">
            <div class="upload-header">
                <span>📄 NOTA FISCAL (1 foto)</span>
                <button class="btn btn-small" onclick="triggerUpload('input-nf')">+ FOTO</button>
                <input type="file" id="input-nf" class="hidden" accept="image/*" capture="camera" onchange="handleFiles(event, 'preview-nf', true)">
            </div>
            <div class="preview-grid" id="preview-nf"></div>
        </div>

        <div class="upload-block">
            <div class="upload-header">
                <span>📸 PRODUTOS</span>
                <button class="btn btn-small" onclick="triggerUpload('input-prod')">+ FOTO</button>
                <input type="file" id="input-prod" class="hidden" accept="image/*" multiple onchange="handleFiles(event, 'preview-prod')">
            </div>
            <div class="preview-grid" id="preview-prod"></div>
        </div>

        <div class="upload-block">
            <div class="upload-header">
                <span>⚖️ BALANÇA</span>
                <button class="btn btn-small" onclick="triggerUpload('input-bal')">+ FOTO</button>
                <input type="file" id="input-bal" class="hidden" accept="image/*" multiple onchange="handleFiles(event, 'preview-bal')">
            </div>
            <div class="preview-grid" id="preview-bal"></div>
        </div>

        <div class="upload-block">
            <div class="upload-header">
                <span>🏷️ ETIQUETA (1 foto)</span>
                <button class="btn btn-small" onclick="triggerUpload('input-eti')">+ FOTO</button>
                <input type="file" id="input-eti" class="hidden" accept="image/*" capture="camera" onchange="handleFiles(event, 'preview-eti', true)">
            </div>
            <div class="preview-grid" id="preview-eti"></div>
        </div>

        <button class="btn mt-auto" onclick="goToFinal()">FINALIZAR E ENVIAR</button>
    </div>

    <!-- TELA 6: ENVIO INDIVIDUAL -->
    <div id="screen-tratativa-send" class="screen">
        <div class="header-nav">
            <button class="btn-back" onclick="showScreen('screen-tratativa-media')">←</button>
            <h2>RESUMO DE ENVIO</h2>
        </div>

        <div class="summary-text" id="final-text-summary"></div>
        <button class="btn" onclick="copyTextAndOpenWA()">📋 COPIAR TEXTO E WHATSAPP</button>

        <h3 style="color: var(--text-dim); font-size: 0.9rem; margin: 20px 0 10px;">ENVIAR EVIDÊNCIAS (UMA POR UMA)</h3>
        <div id="send-photos-list">
            <!-- Itens via JS -->
        </div>

        <button class="btn btn-outline mt-auto" onclick="resetAndHome()">CONCLUIR TUDO</button>
    </div>

    <script>
        // --- CONFIGURAÇÃO BANCO ---
        const dbName = "trataflv_v5";
        let db;
        const stores = { PRODS: "produtos", TRATS: "tratativas" };

        const initialProducts = [
            {codigo: "242", nome: "ALHO KG 5", unidade: "kg", preco: "0,00"},
            {codigo: "1124", nome: "ABACATE KG", unidade: "kg", preco: "0,00"},
            {codigo: "1125", nome: "ABACAXI", unidade: "un", preco: "0,00"},
            {codigo: "1129", nome: "ABOBORA ITALIA KG", unidade: "kg", preco: "0,00"},
            {codigo: "1130", nome: "ABOBORA JAPONESA KG", unidade: "kg", preco: "0,00"},
            {codigo: "1134", nome: "ABOBORA MORANGA KG", unidade: "kg", preco: "0,00"},
            {codigo: "744", nome: "AMEIXA BDJ 500G", unidade: "un", preco: "0,00"},
            {codigo: "739", nome: "AMEIXA KG", unidade: "kg", preco: "0,00"},
            {codigo: "537", nome: "BANANA MACA KG", unidade: "kg", preco: "0,00"},
            {codigo: "538", nome: "BANANA NANICA KG", unidade: "kg", preco: "0,00"},
            {codigo: "541", nome: "BANANA PRATA KG", unidade: "kg", preco: "0,00"},

            {codigo: "681", nome: "BATATA DOCE KG", unidade: "kg", preco: "0,00"},
            {codigo: "688", nome: "BATATA KG", unidade: "kg", preco: "0,00"},
            {codigo: "7714", nome: "BETERRABA KG", unidade: "kg", preco: "0,00"},
            {codigo: "8459", nome: "CAQUI BDJ 500G", unidade: "un", preco: "0,00"},
            {codigo: "8572", nome: "CEBOLA KG", unidade: "kg", preco: "0,00"},
            {codigo: "8574", nome: "CEBOLA ROXA KG", unidade: "kg", preco: "0,00"},
            {codigo: "8589", nome: "CENOURA KG", unidade: "kg", preco: "0,00"},
            {codigo: "7547", nome: "CHUCHU KG", unidade: "kg", preco: "0,00"},
            {codigo: "7620", nome: "COCO SECO KG INT", unidade: "kg", preco: "0,00"},
            {codigo: "7622", nome: "COCO VERDE", unidade: "un", preco: "0,00"},

            {codigo: "5558", nome: "LARANJA PERA KG", unidade: "kg", preco: "0,00"},

            {codigo: "10750", nome: "MACA FUJI KG", unidade: "kg", preco: "0,00"},
            {codigo: "3280", nome: "MACA GALA NAC KG", unidade: "kg", preco: "0,00"},
            {codigo: "3284", nome: "MACA PCT 1KG", unidade: "un", preco: "0,00"},
            {codigo: "3343", nome: "MAMAO FORMOSA KG", unidade: "kg", preco: "0,00"},
            {codigo: "3346", nome: "MAMAO PAPAYA KG", unidade: "kg", preco: "0,00"},
            {codigo: "3369", nome: "MANGA PALMER KG", unidade: "kg", preco: "0,00"},
            {codigo: "3370", nome: "MANGA TOMMY KG", unidade: "kg", preco: "0,00"},
            {codigo: "3422", nome: "MARACUJA AZEDO KG", unidade: "kg", preco: "0,00"},
            {codigo: "3560", nome: "MELANCIA KG", unidade: "kg", preco: "0,00"},
            {codigo: "3563", nome: "MELANCIA PINGO DOCE KG", unidade: "kg", preco: "0,00"},
            {codigo: "3565", nome: "MELAO AMARELO KG", unidade: "kg", preco: "0,00"},
            {codigo: "3582", nome: "MEXERICA PONKAN KG", unidade: "kg", preco: "0,00"},
            {codigo: "3585", nome: "MILHO VERDE BDJ 5UN", unidade: "un", preco: "0,00"},
            {codigo: "1766", nome: "PEPINO COMUM KG", unidade: "kg", preco: "0,00"},
            {codigo: "1768", nome: "PEPINO JAPONES KG", unidade: "kg", preco: "0,00"},
            {codigo: "1778", nome: "PERA KG", unidade: "kg", preco: "0,00"},
            {codigo: "1895", nome: "PIMENTAO VERDE KG", unidade: "kg", preco: "0,00"},
            {codigo: "1327", nome: "REPOLHO BCO KG", unidade: "kg", preco: "0,00"},
            {codigo: "1329", nome: "REPOLHO ROXO KG", unidade: "kg", preco: "0,00"},
            {codigo: "7018", nome: "TOMATE GRAPE 180G", unidade: "un", preco: "0,00"},
            {codigo: "7021", nome: "TOMATE GRAPE KG", unidade: "kg", preco: "0,00"},
            {codigo: "7028", nome: "TOMATE KG", unidade: "kg", preco: "0,00"},
            {codigo: "7049", nome: "TOMATE MEL TREBESCHI 180G", unidade: "un", preco: "0,00"},
            {codigo: "7089", nome: "UVA VERDE 500G S SEMENTE", unidade: "un", preco: "0,00"},
            {codigo: "7088", nome: "UVA VERM 500G S SEMENTE", unidade: "un", preco: "0,00"},
            {codigo: "7094", nome: "UVA VITORIA MIMO SELECAO 400G", unidade: "un", preco: "0,00"}
        ];

        function initDB() {
            const request = indexedDB.open(dbName, 1);
            request.onupgradeneeded = e => {
                const d = e.target.result;
                d.createObjectStore(stores.PRODS, { keyPath: "codigo" });
                d.createObjectStore(stores.TRATS, { keyPath: "id", autoIncrement: true });
            };
            request.onsuccess = e => {
                db = e.target.result;
                console.log("Banco v5 conectado.");
                checkInitialData();
                renderProductList();
            };
            request.onerror = e => alert("Erro ao iniciar banco de dados: " + e.target.error);
        }

        function checkInitialData() {
            const tx = db.transaction(stores.PRODS, "readwrite");
            const store = tx.objectStore(stores.PRODS);
            store.count().onsuccess = e => {
                if (e.target.result === 0) {
                    console.log("Populando dados iniciais...");
                    initialProducts.forEach(p => store.put(p));
                }
            };
        }

        // --- NAVEGAÇÃO ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            window.scrollTo(0, 0);
        }

        // --- GESTÃO DE PRODUTOS ---
        async function saveProduct() {
            const code = document.getElementById('prod-code').value;
            const name = document.getElementById('prod-name').value.toUpperCase();
            const price = document.getElementById('prod-price').value;
            const unit = document.getElementById('prod-unit').value;

            if (!code || !name) return alert("Preencha Código e Nome.");

            const tx = db.transaction(stores.PRODS, "readwrite");
            const store = tx.objectStore(stores.PRODS);
            await store.put({ codigo: code, nome: name, preco: price, unidade: unit });
            
            // Limpa form
            document.getElementById('prod-code').value = '';
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-price').value = '';
            document.getElementById('btn-save-prod').innerText = "ADICIONAR PRODUTO";
            renderProductList();
        }

        function renderProductList(filter = "") {
            if (!db) return;
            const container = document.getElementById('product-list-container');
            container.innerHTML = '';
            
            const tx = db.transaction(stores.PRODS, "readonly");
            const store = tx.objectStore(stores.PRODS);
            store.getAll().onsuccess = e => {
                let products = e.target.result;
                
                if (filter) {
                    const q = filter.toUpperCase();
                    products = products.filter(p => p.codigo.includes(q) || p.nome.includes(q));
                }

                // Ordenar por nome
                products.sort((a, b) => a.nome.localeCompare(b.nome));
                products.forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'product-list-item card';
                    item.innerHTML = `
                        <div style="flex-grow:1;">
                            <div style="font-weight:bold;">${p.codigo} - ${p.nome}</div>
                            <div style="color:var(--text-dim); font-size:0.8rem;">R$ ${p.preco} / ${p.unidade}</div>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-small" onclick="editProduct('${p.codigo}')">✏️</button>
                            <button class="btn btn-small btn-danger" onclick="deleteProduct('${p.codigo}')">🗑️</button>
                        </div>
                    `;
                    container.appendChild(item);
                });
            };
        }

        function deleteProduct(codigo) {
            if (!confirm("Deseja excluir este produto?")) return;
            const tx = db.transaction(stores.PRODS, "readwrite");
            tx.objectStore(stores.PRODS).delete(codigo);
            tx.oncomplete = () => renderProductList();
        }

        function editProduct(codigo) {
            const tx = db.transaction(stores.PRODS, "readonly");
            const store = tx.objectStore(stores.PRODS);
            store.get(codigo).onsuccess = e => {
                const p = e.target.result;
                document.getElementById('prod-code').value = p.codigo;
                document.getElementById('prod-name').value = p.nome;
                document.getElementById('prod-price').value = p.preco;
                document.getElementById('prod-unit').value = p.unidade;
                document.getElementById('btn-save-prod').innerText = "ATUALIZAR PRODUTO";
                window.scrollTo(0, 0);
            };
        }

        // --- FLUXO TRATATIVA ---
        let currentTratativa = {
            product: null,
            media: { 'preview-nf': [], 'preview-prod': [], 'preview-bal': [], 'preview-eti': [] }
        };

        function startNewTratativa() {
            currentTratativa = { product: null, media: { 'preview-nf': [], 'preview-prod': [], 'preview-bal': [], 'preview-eti': [] } };
            document.getElementById('search-prod').value = '';
            document.getElementById('search-prod').style.borderColor = 'var(--border)';
            document.getElementById('search-check').style.display = 'none';
            document.getElementById('selected-prod-info').classList.add('hidden');
            document.getElementById('btn-go-evidence').disabled = true;
            
            // Limpa campos de valores
            document.getElementById('trat-chegou').value = '';
            document.getElementById('trat-quebra').value = '';
            
            // Limpa previews
            ['preview-nf', 'preview-prod', 'preview-bal', 'preview-eti'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = '';
            });

            showScreen('screen-tratativa-data');
        }

        function searchProducts(query) {
            const resultsDiv = document.getElementById('search-results');
            if (query.length < 1) { 
                resultsDiv.style.display = 'none'; 
                document.getElementById('search-check').style.display = 'none';
                document.getElementById('search-prod').style.borderColor = 'var(--border)';
                return; 
            }

            const tx = db.transaction(stores.PRODS, "readonly");
            const store = tx.objectStore(stores.PRODS);
            store.getAll().onsuccess = e => {
                const list = e.target.result.filter(p => 
                    p.codigo.includes(query) || p.nome.includes(query.toUpperCase())
                );
                
                resultsDiv.innerHTML = '';
                if (list.length > 0) {
                    resultsDiv.style.display = 'block';
                    list.forEach(p => {
                        const d = document.createElement('div');
                        d.style.padding = '12px';
                        d.style.borderBottom = '1px solid #333';
                        d.innerText = `${p.codigo} - ${p.nome}`;
                        d.onclick = () => selectProduct(p);
                        resultsDiv.appendChild(d);
                    });
                } else {
                    resultsDiv.style.display = 'none';
                }
            };
        }

        function handleSearchKeyDown(event) {
            if (event.key === 'Enter') {
                const query = event.target.value;
                if (!query) return;

                const tx = db.transaction(stores.PRODS, "readonly");
                const store = tx.objectStore(stores.PRODS);
                store.getAll().onsuccess = e => {
                    const list = e.target.result.filter(p => 
                        p.codigo === query || p.nome === query.toUpperCase()
                    );
                    
                    if (list.length > 0) {
                        selectProduct(list[0]);
                        // Foca no próximo campo importante
                        document.getElementById('trat-chegou').focus();
                    } else {
                        // Se não houver match exato, tenta o primeiro da lista filtrada
                        const partialList = e.target.result.filter(p => 
                            p.codigo.includes(query) || p.nome.includes(query.toUpperCase())
                        );
                        if (partialList.length > 0) {
                            selectProduct(partialList[0]);
                            document.getElementById('trat-chegou').focus();
                        }
                    }
                };
            }
        }

        function selectProduct(p) {
            currentTratativa.product = p;
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('search-prod').value = `${p.codigo} - ${p.nome}`;
            
            // Feedback Visual
            document.getElementById('search-prod').style.borderColor = 'var(--success)';
            document.getElementById('search-check').style.display = 'block';

            document.getElementById('selected-prod-info').classList.remove('hidden');
            document.getElementById('trat-name').value = p.nome;
            document.getElementById('trat-price').value = p.preco;
            document.getElementById('trat-unit').value = p.unidade;
            
            document.getElementById('btn-go-evidence').disabled = false;
        }

        function goToEvidence() {
            const chegou = document.getElementById('trat-chegou').value;
            const quebra = document.getElementById('trat-quebra').value;
            
            if (!chegou || !quebra) {
                return alert("Por favor, preencha os valores de 'Chegou' e 'Quebra'.");
            }

            currentTratativa.chegou = chegou;
            currentTratativa.quebra = quebra;
            currentTratativa.preco_final = document.getElementById('trat-price').value;
            currentTratativa.unidade_final = document.getElementById('trat-unit').value;
            showScreen('screen-tratativa-media');
        }

        function hardReset() {
            if (!confirm("Isso apagará TODOS os dados (produtos e histórico) e resetará o app. Tem certeza?")) return;
            indexedDB.deleteDatabase(dbName);
            localStorage.clear();
            location.reload();
        }

        // --- MÍDIA ---
        function triggerUpload(id) { document.getElementById(id).click(); }

        async function handleFiles(event, previewId, single = false) {
            const files = Array.from(event.target.files);
            if (single) currentTratativa.media[previewId] = [];

            for (const file of files) {
                const base64 = await fileToBase64(file);
                currentTratativa.media[previewId].push({ file, base64 });
            }
            renderPreviews(previewId);
        }

        function fileToBase64(file) {
            return new Promise((r, j) => {
                const reader = new FileReader();
                reader.onload = () => r(reader.result);
                reader.onerror = j;
                reader.readAsDataURL(file);
            });
        }

        function renderPreviews(id) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            currentTratativa.media[id].forEach((m, idx) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `
                    <img src="${m.base64}">
                    <button class="preview-remove" onclick="removeMedia('${id}', ${idx})">×</button>
                `;
                container.appendChild(div);
            });
        }

        function removeMedia(id, idx) {
            currentTratativa.media[id].splice(idx, 1);
            renderPreviews(id);
        }

        // --- FINALIZAÇÃO E ENVIO ---
        function goToFinal() {
            const p = currentTratativa.product;
            const data = new Date().toLocaleDateString('pt-BR');
            
            // Gerar padrão de texto solicitado:
            // Cod: [CÓDIGO]
            // [NOME EM MAIÚSCULO]
            // [DATA ATUAL]
            // Chegou: [VALOR] [kg/un]
            // Qtd da quebra: [VALOR] [kg/un]
            const text = `Cod: ${p.codigo}\n${p.nome}\n${data}\nChegou: ${currentTratativa.chegou} ${currentTratativa.unidade_final}\nQtd da quebra: ${currentTratativa.quebra} ${currentTratativa.unidade_final}`;
            
            currentTratativa.generatedText = text;
            document.getElementById('final-text-summary').innerText = text;

            // Renderizar lista de fotos para envio
            const list = document.getElementById('send-photos-list');
            list.innerHTML = '';

            const categories = [
                { key: 'preview-nf', label: 'NOTA FISCAL' },
                { key: 'preview-prod', label: 'PRODUTO' },
                { key: 'preview-bal', label: 'BALANÇA' },
                { key: 'preview-eti', label: 'ETIQUETA' }
            ];

            categories.forEach(cat => {
                currentTratativa.media[cat.key].forEach((m, idx) => {
                    const div = document.createElement('div');
                    div.className = 'photo-send-item';
                    div.innerHTML = `
                        <img src="${m.base64}" class="photo-send-thumb">
                        <div style="flex-grow:1; font-size:0.8rem; font-weight:bold;">${cat.label} #${idx+1}</div>
                        <button class="btn btn-small" onclick="sharePhoto('${cat.key}', ${idx})">ENVIAR ESTA FOTO</button>
                    `;
                    list.appendChild(div);
                });
            });

            showScreen('screen-tratativa-send');
        }

        function copyTextAndOpenWA() {
            const text = currentTratativa.generatedText;
            navigator.clipboard.writeText(text).then(() => {
                window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
            });
        }

        async function sharePhoto(key, idx) {
            const media = currentTratativa.media[key][idx];
            const fileName = `tratativa_foto.jpg`;
            
            try {
                const link = document.createElement('a');
                link.href = media.base64;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Abre o WhatsApp logo em seguida
                setTimeout(() => {
                    window.open("https://wa.me/", "_blank");
                }, 1000);
            } catch (err) {
                console.error("Erro ao baixar:", err);
            }
        }

        function resetAndHome() {
            // Salva no histórico (opcional para v5 estável)
            const tx = db.transaction(stores.TRATS, "readwrite");
            tx.objectStore(stores.TRATS).add({
                ...currentTratativa,
                timestamp: Date.now(),
                media: null // Não salva base64 pesado por enquanto para manter DB leve
            });
            showScreen('screen-start');
        }

        window.onload = initDB;

        // Registro Service Worker Estável
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('SW registrado.');
            }).catch(err => console.log('Erro SW:', err));
        }
    </script>
</body>
</html>
