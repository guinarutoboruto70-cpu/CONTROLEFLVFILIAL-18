<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA TRATAFLV 1018 - V18</title>
    <style>
        :root { 
            --primary: #ffcc00; 
            --bg: #0d0d0d; 
            --card: #1a1a1a; 
            --text: #ffffff; 
            --danger: #ff4444; 
            --success: #28a745; 
            --border: #333;
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }

        header { 
            width: 100%; 
            background: #000;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        h1 { color: var(--primary); font-size: 1rem; margin: 0 0 10px 0; letter-spacing: 1px; }

        .nav-bar { 
            display: flex; 
            gap: 5px; 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto;
        }

        .nav-btn { 
            flex: 1; 
            padding: 8px 5px; 
            background: transparent; 
            border: 1px solid var(--border); 
            color: #fff; 
            border-radius: 4px; 
            font-size: 0.65rem; 
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .nav-btn.active { 
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 15px;
        }

        .screen { display: none; flex-direction: column; gap: 15px; }
        .screen.active { display: flex; }

        .form-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        label { font-size: 0.75rem; color: #aaa; font-weight: 500; }
        
        input, select { 
            background: #252525; 
            border: 1px solid #444; 
            color: #fff; 
            padding: 10px; 
            border-radius: 6px; 
            font-size: 0.95rem;
            width: 100%;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-save { 
            background: var(--primary); 
            color: #000; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 0.9rem; 
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }

        .history-card { 
            background: var(--card); 
            border-radius: 10px; 
            padding: 12px; 
            border-left: 5px solid var(--primary); 
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-cod { font-weight: bold; color: var(--primary); font-size: 0.85rem; }
        .card-name { font-size: 1.05rem; font-weight: 500; text-transform: uppercase; }
        .card-date { color: #888; font-size: 0.8rem; }
        .card-chegou { font-size: 0.9rem; color: #ccc; }
        .card-quebra { color: var(--danger); font-weight: bold; font-size: 0.95rem; margin-top: 2px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--primary); margin-top: 5px; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }

        /* Mobile specific adjustments */
        @media (max-width: 380px) {
            .nav-btn { font-size: 0.6rem; }
            h1 { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>SISTEMA TRATAFLV 1018</h1>
        <div class="nav-bar">
            <button id="nav-dash" class="nav-btn active" onclick="showScreen('results-screen')">📊 PAINEL</button>
            <button id="nav-tratativa" class="nav-btn" onclick="showScreen('cadastro-screen')">🍎 TRATATIVA</button>
            <button id="nav-geral" class="nav-btn" onclick="showScreen('geral-screen')">🗑️ GERAL</button>
            <button id="nav-history" class="nav-btn" onclick="showScreen('history-screen')">📜 LISTA</button>
        </div>
    </header>

    <div class="container">
        
        <!-- DASHBOARD -->
        <div id="results-screen" class="screen active">
            <div class="form-card" style="margin-bottom: 15px;">
                <div class="form-group">
                    <label>Filtrar por Data</label>
                    <input type="date" id="dash-date" onchange="updateResultsDashboard()">
                </div>
            </div>
            
            <div class="dashboard-grid">
                <div class="stat-card" style="grid-column: span 2;">
                    <div class="stat-label">Total Quebra Acumulada</div>
                    <div id="total-geral" class="stat-value">R$ 0,00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Quebra Geral</div>
                    <div id="total-quebra-geral" class="stat-value">R$ 0,00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Tratativa</div>
                    <div id="total-tratativa" class="stat-value">R$ 0,00</div>
                </div>
            </div>
        </div>

        <!-- FORM TRATATIVA -->
        <div id="cadastro-screen" class="screen">
            <div class="form-card">
                <form id="tratativa-form">
                    <div class="row">
                        <div class="form-group">
                            <label>Cód. Produto</label>
                            <input type="number" id="codigo" list="lista-codigos" placeholder="Ex: 7028">
                        </div>
                        <div class="form-group">
                            <label>Unidade</label>
                            <select id="unidade">
                                <option value="KG">KG</option>
                                <option value="UND">UND</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Produto</label>
                        <input type="text" id="produto" list="lista-nomes" placeholder="Nome do item">
                    </div>
                    <div class="row">
                        <div class="form-group">
                            <label>Qtd Chegou</label>
                            <input type="text" id="qtd_chegou" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>Qtd Quebra</label>
                            <input type="text" id="qtd_quebra" placeholder="0.00">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Preço Custo (R$)</label>
                        <input type="text" id="preco_custo" placeholder="0,00">
                    </div>
                    <button type="submit" class="btn-save">✅ SALVAR TRATATIVA</button>
                </form>
            </div>
        </div>

        <!-- FORM QUEBRA GERAL -->
        <div id="geral-screen" class="screen">
            <div class="form-card">
                <form id="geral-form">
                    <div class="row">
                        <div class="form-group">
                            <label>Cód. Produto</label>
                            <input type="number" id="geral-codigo" list="lista-codigos" placeholder="Ex: 7028">
                        </div>
                        <div class="form-group">
                            <label>Unidade</label>
                            <select id="geral-unidade">
                                <option value="KG">KG</option>
                                <option value="UND">UND</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Produto</label>
                        <input type="text" id="geral-nome" list="lista-nomes" placeholder="Nome do item">
                    </div>
                    <div class="row">
                        <div class="form-group">
                            <label>Quantidade</label>
                            <input type="text" id="geral-qtd" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>Custo Unitário</label>
                            <input type="text" id="geral-custo" placeholder="0,00">
                        </div>
                    </div>
                    <div id="geral-calc-preview" style="text-align: center; padding: 10px; color: var(--primary); font-weight: bold; border: 1px dashed #444; border-radius: 8px; margin-bottom: 10px;">
                        Total: <span id="geral-valor-total">R$ 0,00</span>
                    </div>
                    <button type="submit" class="btn-save">✅ SALVAR QUEBRA GERAL</button>
                </form>
            </div>
        </div>

        <!-- HISTORY -->
        <div id="history-screen" class="screen">
            <div id="history-list">
                <p style="text-align: center; color: #666; margin-top: 50px;">Carregando...</p>
            </div>
        </div>

    </div>

    <!-- DATALISTS PARA AUTOCOMPLETE -->
    <datalist id="lista-codigos"></datalist>
    <datalist id="lista-nomes"></datalist>

    <script>
        // --- 1. CONFIGURAÇÕES E BANCO DE DADOS ---
        const dbName = "FLVDatabase";
        const historyStore = "historico";
        let db;

        const LISTA_PRODUTOS = { 
            "1124": { nome: "ABACATE", unidade: "KG" }, 
            "1125": { nome: "ABACAXI", unidade: "UND" }, 
            "1129": { nome: "ABOBORA ITALIA", unidade: "KG" }, 
            "242":  { nome: "ALHO", unidade: "KG" }, 
            "744":  { nome: "AMEIXA BDJ 500G", unidade: "UND" }, 
            "739":  { nome: "AMEIXA", unidade: "KG" }, 
            "537":  { nome: "BANANA MACA", unidade: "KG" }, 
            "538":  { nome: "BANANA NANICA", unidade: "KG" }, 
            "541":  { nome: "BANANA PRATA", unidade: "KG" }, 
            "543":  { nome: "BANANA TERRA", unidade: "KG" }, 
            "681":  { nome: "BATATA DOCE", unidade: "KG" }, 
            "7714": { nome: "BETERRABA", unidade: "KG" }, 
            "8459": { nome: "CAQUI BDJ 500G", unidade: "UND" }, 
            "8461": { nome: "CARA", unidade: "KG" }, 
            "8574": { nome: "CEBOLA ROXA", unidade: "KG" }, 
            "7547": { nome: "CHUCHU", unidade: "KG" }, 
            "7620": { nome: "COCO SECO", unidade: "KG" }, 
            "7622": { nome: "COCO VERDE", unidade: "UND" }, 
            "5558": { nome: "LARANJA PERA", unidade: "KG" }, 
            "4362": { nome: "LIMAO", unidade: "KG" }, 
            "10750":{ nome: "MACA FUJI", unidade: "KG" }, 
            "3280": { nome: "MACA GALA NAC", unidade: "KG" }, 
            "3284": { nome: "MACA PCT 1KG", unidade: "UND" }, 
            "3343": { nome: "MAMAO FORMOSA", unidade: "KG" }, 
            "3369": { nome: "MANGA PALMER", unidade: "KG" }, 
            "3370": { nome: "MANGA TOMMY", unidade: "KG" }, 
            "3582": { nome: "MEXERICA PONKAN", unidade: "KG" }, 
            "3585": { nome: "MILHO VERDE BDJ 5UN", unidade: "UND" }, 
            "1766": { nome: "PEPINO COMUM", unidade: "KG" }, 
            "1768": { nome: "PEPINO JAPONES", unidade: "KG" }, 
            "1327": { nome: "REPOLHO BCO", unidade: "KG" }, 
            "1329": { nome: "REPOLHO ROXO", unidade: "KG" }, 
            "7018": { nome: "TOMATE GRAPE 180G", unidade: "UND" }, 
            "7021": { nome: "TOMATE GRAPE", unidade: "KG" }, 
            "7028": { nome: "TOMATE", unidade: "KG" }, 
            "7090": { nome: "UVA PTA 500G S/S", unidade: "UND" }, 
            "7089": { nome: "UVA VERDE 500G S/S", unidade: "UND" }, 
            "7088": { nome: "UVA VERM 500G S/S", unidade: "UND" } 
        };

        // --- 2. INICIALIZAÇÃO DO BANCO ---
        function initDB() {
            const request = indexedDB.open(dbName, 3);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(historyStore)) {
                    db.createObjectStore(historyStore, { keyPath: "id", autoIncrement: true });
                }
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                updateResultsDashboard();
                initAutocomplete();
            };
        }

        // --- 3. AUTOCOMPLETE ---
        function initAutocomplete() {
            const listCod = document.getElementById('lista-codigos');
            const listNom = document.getElementById('lista-nomes');
            
            for (const cod in LISTA_PRODUTOS) {
                const optCod = document.createElement('option');
                optCod.value = cod;
                listCod.appendChild(optCod);
                
                const optNom = document.createElement('option');
                optNom.value = LISTA_PRODUTOS[cod].nome;
                listNom.appendChild(optNom);
            }

            // Tratativa listeners
            document.getElementById('codigo').addEventListener('input', (e) => preencher(e.target.value, 'produto', 'unidade'));
            document.getElementById('produto').addEventListener('input', (e) => preencherPorNome(e.target.value, 'codigo', 'unidade'));
            
            // Geral listeners
            document.getElementById('geral-codigo').addEventListener('input', (e) => preencher(e.target.value, 'geral-nome', 'geral-unidade'));
            document.getElementById('geral-nome').addEventListener('input', (e) => preencherPorNome(e.target.value, 'geral-codigo', 'geral-unidade'));
        }

        function preencher(cod, nomeId, unitId) {
            if (LISTA_PRODUTOS[cod]) {
                document.getElementById(nomeId).value = LISTA_PRODUTOS[cod].nome;
                document.getElementById(unitId).value = LISTA_PRODUTOS[cod].unidade;
            }
        }

        function preencherPorNome(nome, codId, unitId) {
            for (const cod in LISTA_PRODUTOS) {
                if (LISTA_PRODUTOS[cod].nome === nome.toUpperCase()) {
                    document.getElementById(codId).value = cod;
                    document.getElementById(unitId).value = LISTA_PRODUTOS[cod].unidade;
                    break;
                }
            }
        }

        // --- 4. NAVEGAÇÃO ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const target = document.getElementById(screenId);
            if (target) target.classList.add('active');
            
            // Ativa o botão correto
            const btnMap = {
                'results-screen': 'nav-dash',
                'cadastro-screen': 'nav-tratativa',
                'geral-screen': 'nav-geral',
                'history-screen': 'nav-history'
            };
            if (btnMap[screenId]) document.getElementById(btnMap[screenId]).classList.add('active');
            
            if (screenId === 'history-screen') renderHistory();
            if (screenId === 'results-screen') updateResultsDashboard();
        }

        // --- 5. CÁLCULOS E MÁSCARAS ---
        function setupNumericInput(id, isCurrency = false) {
            const el = document.getElementById(id);
            el.addEventListener('input', (e) => {
                if (isCurrency) {
                    let val = e.target.value.replace(/\D/g, "");
                    let float = parseFloat(val) / 100;
                    e.target.value = float.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                } else {
                    e.target.value = e.target.value.replace(/[^0-9,.]/g, '').replace(',', '.');
                }
                
                // Cálculo automático para Geral
                if (id.startsWith('geral-')) {
                    const q = parseFloat(document.getElementById('geral-qtd').value) || 0;
                    const cStr = document.getElementById('geral-custo').value.replace(/\./g, '').replace(',', '.');
                    const c = parseFloat(cStr) || 0;
                    const total = q * c;
                    document.getElementById('geral-valor-total').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                }
            });
        }

        setupNumericInput('qtd_chegou');
        setupNumericInput('qtd_quebra');
        setupNumericInput('preco_custo', true);
        setupNumericInput('geral-qtd');
        setupNumericInput('geral-custo', true);

        // --- 6. SALVAMENTO ---
        document.getElementById('tratativa-form').onsubmit = (e) => {
            e.preventDefault();
            const item = {
                codigo: document.getElementById('codigo').value || 'S/C',
                nome: document.getElementById('produto').value.toUpperCase(),
                unidade: document.getElementById('unidade').value,
                qtd_chegou: document.getElementById('qtd_chegou').value,
                qtd_quebra: document.getElementById('qtd_quebra').value,
                preco_custo: document.getElementById('preco_custo').value,
                tipo: 'TRATATIVA',
                data: new Date().toLocaleDateString('pt-BR'),
                timestamp: Date.now()
            };
            salvar(item);
        };

        document.getElementById('geral-form').onsubmit = (e) => {
            e.preventDefault();
            const item = {
                codigo: document.getElementById('geral-codigo').value || 'S/C',
                nome: document.getElementById('geral-nome').value.toUpperCase(),
                unidade: document.getElementById('geral-unidade').value,
                qtd_chegou: '0',
                qtd_quebra: document.getElementById('geral-qtd').value,
                preco_custo: document.getElementById('geral-custo').value,
                tipo: 'GERAL',
                data: new Date().toLocaleDateString('pt-BR'),
                timestamp: Date.now()
            };
            salvar(item);
        };

        function salvar(item) {
            if (!db) return alert("Banco de dados não carregado!");
            const tx = db.transaction(historyStore, "readwrite");
            tx.objectStore(historyStore).add(item).onsuccess = () => {
                alert("✅ Registro Salvo com Sucesso!");
                document.getElementById('tratativa-form').reset();
                document.getElementById('geral-form').reset();
                document.getElementById('geral-valor-total').innerText = "R$ 0,00";
                showScreen('results-screen');
            };
        }

        // --- 7. RENDERIZAÇÃO E DASHBOARD ---
        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            const tx = db.transaction(historyStore, "readonly");
            const store = tx.objectStore(historyStore);
            const request = store.openCursor(null, 'prev');

            request.onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const item = cursor.value;
                    const card = document.createElement('div');
                    card.className = 'history-card';
                    
                    const unit = (item.unidade || 'un').toLowerCase();
                    const qChegou = item.unidade === 'KG' ? parseFloat(item.qtd_chegou || 0).toFixed(2) : item.qtd_chegou;
                    const qQuebra = item.unidade === 'KG' ? parseFloat(item.qtd_quebra || 0).toFixed(2) : item.qtd_quebra;

                    card.innerHTML = `
                        <div class="card-cod">Cód ${item.codigo}</div>
                        <div class="card-name">${item.nome}</div>
                        <div class="card-date">${item.data}</div>
                        <div class="card-chegou">Chegou: ${qChegou} ${unit}</div>
                        <div class="card-quebra">Quantidade da quebra: ${qQuebra} ${unit}</div>
                    `;
                    list.appendChild(card);
                    cursor.continue();
                } else if (list.innerHTML === '') {
                    list.innerHTML = '<p style="text-align: center; color: #666;">Nenhum registro.</p>';
                }
            };
        }

        function updateResultsDashboard() {
            if (!db) return;
            const filterDate = document.getElementById('dash-date').value;
            const formattedFilterDate = filterDate ? new Date(filterDate + 'T00:00:00').toLocaleDateString('pt-BR') : null;
            
            let totalG = 0;
            let totalT = 0;
            let totalQG = 0;

            const tx = db.transaction(historyStore, "readonly");
            const store = tx.objectStore(historyStore);
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const item = cursor.value;
                    if (!formattedFilterDate || item.data === formattedFilterDate) {
                        const custo = parseFloat(item.preco_custo.replace(/\./g, '').replace(',', '.')) || 0;
                        const qtd = parseFloat(item.qtd_quebra) || 0;
                        const valor = custo * qtd;
                        
                        totalG += valor;
                        if (item.tipo === 'TRATATIVA') totalT += valor;
                        if (item.tipo === 'GERAL') totalQG += valor;
                    }
                    cursor.continue();
                } else {
                    document.getElementById('total-geral').innerText = `R$ ${totalG.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                    document.getElementById('total-tratativa').innerText = `R$ ${totalT.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                    document.getElementById('total-quebra-geral').innerText = `R$ ${totalQG.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
                }
            };
        }

        // Inicia tudo
        window.onload = () => {
            initDB();
            // Define data de hoje no dash
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('dash-date').value = hoje;
        };
    </script>
</body>
</html>
