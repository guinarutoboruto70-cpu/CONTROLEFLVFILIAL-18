<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLV 1018 - FINAL</title>
    
    <!-- Configuração PWA Integrada -->
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="data:application/json;base64,ewogICAgIm5hbWUiOiAiRkxWIDEwMTggLSBPcHBlcmF0aW9uIiwKICAgICJzaG9ydF9uYW1lIjogIkZMVjEwMTgiLAogICAgInN0YXJ0X3VybCI6ICIuIiwKICAgICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICAgImJhY2tncm91bmRfY29sb3IiOiAiIzBhMGEwYSIsCiAgICAidGhlbWVfY29sb3IiOiAiIzBhMGEwYSIKfQ==">

    <style>
        :root { --bg: #0a0a0a; --gold: #ffcc00; --card: #1a1a1a; --txt: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; }
        
        .app { max-width: 500px; margin: 0 auto; padding: 15px; height: 100%; display: flex; flex-direction: column; box-sizing: border-box; }
        .screen { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.3s; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 15px; flex-shrink: 0; }
        .back-btn { background: none; border: none; color: var(--gold); font-size: 1.8rem; cursor: pointer; padding-right: 20px; }
        
        .btn { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        .btn-alt { background: #333; color: white; margin-top: 10px; }

        input { width: 100%; padding: 15px; background: #222; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 1.1rem; box-sizing: border-box; margin-bottom: 10px; }
        
        .list-container { flex-grow: 1; overflow-y: auto; background: #111; border-radius: 12px; border: 1px solid #333; -webkit-overflow-scrolling: touch; }
        .prod-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .p-nome { font-weight: 600; text-transform: uppercase; font-size: 0.85rem; color: #ddd; }
        .p-cod { color: var(--gold); font-family: monospace; font-weight: bold; }

        .badge { background: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-left: 10px; color: #aaa; }
    </style>
</head>
<body>

<div class="app">
    <!-- MENU PRINCIPAL -->
    <div id="step0" class="screen active">
        <h1 style="text-align:center; color:var(--gold); margin: 50px 0 30px 0; letter-spacing: 2px;">FLV 1018</h1>
        <button class="btn" style="height:120px; font-size: 1.2rem;" onclick="mudarTela(1)">🍎 INICIAR TRATATIVA</button>
        <button class="btn btn-alt" style="height:70px;" onclick="abrirCadastro()">📦 BANCO DE PRODUTOS</button>
        <p id="status-carga" style="text-align:center; font-size:0.7rem; color:#555; margin-top:20px;"></p>
    </div>

    <!-- TELA DE CADASTRO / LISTA A-Z -->
    <div id="step-cadastro" class="screen">
        <div class="header">
            <button class="back-btn" onclick="mudarTela(0)">⬅</button>
            <h2 style="margin:0;">Produtos</h2>
        </div>
        
        <div style="background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333;">
            <input type="number" id="new-cod" placeholder="Código">
            <input type="text" id="new-nome" placeholder="Nome do Produto">
            <button class="btn" onclick="salvarNovo()">CADASTRAR NOVO</button>
        </div>

        <div class="list-container" id="lista-cadastrados"></div>
    </div>

    <!-- TELA DE TRATATIVA (EM DESENVOLVIMENTO) -->
    <div id="step1" class="screen">
        <div class="header"><button class="back-btn" onclick="mudarTela(0)">⬅</button><h2>Nova Tratativa</h2></div>
        <div style="text-align:center; padding:40px;">
            <p style="color:var(--gold);">Módulo de lançamento em breve...</p>
            <button class="btn btn-alt" onclick="mudarTela(0)">VOLTAR</button>
        </div>
    </div>
</div>

<script>
    let db;
    // LISTA DE 53 PRODUTOS EXTRAÍDOS DAS NOTAS
    const cargaInicial = [
        {cod:"1124", nome:"ABACATE KG", un:"KG"}, {cod:"1125", nome:"ABACAXI", un:"UN"},
        {cod:"1129", nome:"ABOBORA ITALIA KG", un:"KG"}, {cod:"1130", nome:"ABOBORA JAPONESA KG", un:"KG"},
        {cod:"242", nome:"ALHO KG 5", un:"KG"}, {cod:"744", nome:"AMEIXA BDJ 500G", un:"G"},
        {cod:"739", nome:"AMEIXA KG", un:"KG"}, {cod:"537", nome:"BANANA MACA KG", un:"KG"},
        {cod:"538", nome:"BANANA NANICA KG", un:"KG"}, {cod:"541", nome:"BANANA PRATA KG", un:"KG"},
        {cod:"543", nome:"BANANA TERRA KG", un:"KG"}, {cod:"681", nome:"BATATA DOCE KG", un:"KG"},
        {cod:"688", nome:"BATATA KG", un:"KG"}, {cod:"7714", nome:"BETERRABA KG", un:"KG"},
        {cod:"8459", nome:"CAQUI BDJ 500G", un:"G"}, {cod:"8461", nome:"CARA KG", un:"KG"},
        {cod:"8572", nome:"CEBOLA KG", un:"KG"}, {cod:"8574", nome:"CEBOLA ROXA KG", un:"KG"},
        {cod:"8589", nome:"CENOURA KG", un:"KG"}, {cod:"7547", nome:"CHUCHU KG", un:"KG"},
        {cod:"7620", nome:"COCO SECO KG INT", un:"KG"}, {cod:"7622", nome:"COCO VERDE", un:"UN"},
        {cod:"5022", nome:"GENGIBRE KG", un:"KG"}, {cod:"5213", nome:"INHAME KG", un:"KG"},
        {cod:"5473", nome:"KIWI BDJ 600G", un:"G"}, {cod:"5558", nome:"LARANJA PERA KG", un:"KG"},
        {cod:"4362", nome:"LIMAO KG", un:"KG"}, {cod:"10750", nome:"MACA FUJI KG", un:"KG"},
        {cod:"3280", nome:"MACA GALA NAC KG", un:"KG"}, {cod:"3284", nome:"MACA PCT 1KG", un:"UN"},
        {cod:"3343", nome:"MAMAO FORMOSA KG", un:"KG"}, {cod:"3346", nome:"MAMAO PAPAYA KG", un:"KG"},
        {cod:"3369", nome:"MANGA PALMER KG", un:"KG"}, {cod:"3370", nome:"MANGA TOMMY KG", un:"KG"},
        {cod:"3422", nome:"MARACUJA AZEDO KG", un:"KG"}, {cod:"3560", nome:"MELANCIA KG", un:"KG"},
        {cod:"3565", nome:"MELAO AMARELO KG", un:"KG"}, {cod:"3582", nome:"MEXERICA PONKAN KG", un:"KG"},
        {cod:"3585", nome:"MILHO VERDE BDJ 5UN", un:"UN"}, {cod:"1766", nome:"PEPINO COMUM KG", un:"KG"},
        {cod:"1768", nome:"PEPINO JAPONES KG", un:"KG"}, {cod:"1778", nome:"PERA KG", un:"KG"},
        {cod:"1895", nome:"PIMENTAO VERDE KG", un:"KG"}, {cod:"1327", nome:"REPOLHO BCO KG", un:"KG"},
        {cod:"1329", nome:"REPOLHO ROXO KG", un:"KG"}, {cod:"7018", nome:"TOMATE GRAPE 180G", un:"G"},
        {cod:"7021", nome:"TOMATE GRAPE KG", un:"KG"}, {cod:"7028", nome:"TOMATE KG", un:"KG"},
        {cod:"7049", nome:"TOMATE MEL TREBESCHI 180G", un:"G"}, {cod:"7090", nome:"UVA PTA 500G S SEMENTE", un:"G"},
        {cod:"7089", nome:"UVA VERDE 500G S SEMENTE", un:"G"}, {cod:"7088", nome:"UVA VERM 500G S SEMENTE", un:"G"},
        {cod:"7094", nome:"UVA VITORIA MIMO SELECAO 400G S SEMENTE", un:"G"}
    ];

    const request = indexedDB.open("FLV_MASTER_DB", 1);
    
    request.onupgradeneeded = e => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("produtos")) {
            db.createObjectStore("produtos", { keyPath: "cod" });
        }
    };

    request.onsuccess = e => {
        db = e.target.result;
        verificarCargaInicial();
    };

    function verificarCargaInicial() {
        const tx = db.transaction("produtos", "readonly");
        const store = tx.objectStore("produtos");
        const count = store.count();
        
        count.onsuccess = () => {
            if (count.result === 0) {
                const txWrite = db.transaction("produtos", "readwrite");
                const storeWrite = txWrite.objectStore("produtos");
                cargaInicial.forEach(p => storeWrite.put(p));
                document.getElementById('status-carga').innerText = "Carga inicial de 53 itens concluída.";
            } else {
                document.getElementById('status-carga').innerText = `Base de dados: ${count.result} itens cadastrados.`;
            }
        };
    }

    function mudarTela(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = n === 4 ? 'step-cadastro' : 'step' + n;
        document.getElementById(target).classList.add('active');
    }

    function abrirCadastro() {
        mudarTela(4);
        renderizarLista();
    }

    function renderizarLista() {
        const container = document.getElementById('lista-cadastrados');
        container.innerHTML = '';
        
        const tx = db.transaction("produtos", "readonly");
        tx.objectStore("produtos").getAll().onsuccess = e => {
            let produtos = e.target.result;
            // ORDEM ALFABÉTICA
            produtos.sort((a, b) => a.nome.localeCompare(b.nome));
            
            produtos.forEach(p => {
                const item = document.createElement('div');
                item.className = 'prod-row';
                item.innerHTML = `
                    <div><span class="p-nome">${p.nome}</span><span class="badge">${p.un}</span></div>
                    <span class="p-cod">#${p.cod}</span>
                `;
                container.appendChild(item);
            });
        };
    }

    function salvarNovo() {
        const c = document.getElementById('new-cod');
        const n = document.getElementById('new-nome');
        if(!c.value || !n.value) return alert("Preencha código e nome!");
        
        const tx = db.transaction("produtos", "readwrite");
        tx.objectStore("produtos").put({
            cod: c.value,
            nome: n.value.toUpperCase(),
            un: "KG" // Padrão
        });
        tx.oncomplete = () => {
            c.value = ''; n.value = '';
            renderizarLista();
        };
    }
</script>
</body>
</html>
