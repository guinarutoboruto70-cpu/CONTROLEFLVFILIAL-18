<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FLV</title>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a0a; color:#fff; }
.screen { display:none; padding:20px; }
.active { display:block; }

h1,h2 { text-align:center; color:#ffcc00; }

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
}

input {
    width:100%;
    padding:10px;
    margin-top:8px;
    background:#222;
    border:1px solid #444;
    color:#fff;
    border-radius:6px;
}

.card {
    background:#1a1a1a;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

.preview img{
    width:70px;
    margin:5px;
    border-radius:6px;
}

.listaBusca{
    max-height:200px;
    overflow-y:auto;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="tela0" class="screen active">
    <h1>Controle FLV</h1>
    <button class="btn" onclick="ir(1)">ENTRAR</button>
</div>

<!-- MENU -->
<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button class="btn" onclick="ir(2)">Nova Tratativa</button>
    <button class="btn" onclick="ir(6)">Produtos</button>
</div>

<!-- TRATATIVA -->
<div id="tela2" class="screen">
    <h2>Tratativa</h2>

    <input id="busca" placeholder="Buscar produto...">
    <div id="resultadoBusca" class="listaBusca"></div>

    <input id="produto" placeholder="Produto">
    <input id="cod" placeholder="Código">

    <input id="chegou" type="number" placeholder="Chegou">
    <input id="quebra" type="number" placeholder="Quebra">

    <!-- FOTOS -->
    <div class="card">
        <p>📸 Produto</p>
        <input type="file" accept="image/*" multiple onchange="preview(event,'prevProd')">
        <div id="prevProd" class="preview"></div>
    </div>

    <div class="card">
        <p>⚖️ Balança</p>
        <input type="file" accept="image/*" multiple onchange="preview(event,'prevBal')">
        <div id="prevBal" class="preview"></div>
    </div>

    <div class="card">
        <p>🏷️ Etiqueta</p>
        <input type="file" accept="image/*" capture="environment" onchange="preview(event,'prevEti')">
        <div id="prevEti" class="preview"></div>
    </div>

    <button class="btn" onclick="salvar()">Continuar</button>
    <button class="btn" onclick="ir(1)">Voltar</button>
</div>

<!-- ENVIO -->
<div id="tela3" class="screen">
    <h2>Enviar</h2>

    <pre id="texto"></pre>

    <div id="fotosEnvio"></div>

    <button class="btn" onclick="copiar()">COPIAR TEXTO</button>
    <button class="btn" onclick="enviar()">WHATSAPP</button>
    <button class="btn" onclick="finalizar()">FINALIZAR</button>
</div>

<!-- PRODUTOS -->
<div id="tela6" class="screen">
    <h2>Produtos</h2>

    <input id="novoCod" placeholder="Código">
    <input id="novoNome" placeholder="Nome do Produto">

    <button class="btn" onclick="salvarProduto()">Salvar</button>

    <div id="listaProdutos"></div>

    <button class="btn" onclick="ir(1)">Voltar</button>
</div>

<script>

let produtos = [];
let banco = [];
let atual = {};
let editando = null;
let fotos = {prod:[], bal:[], eti:[]};

/* INIT */
function init(){
    try{
        produtos = JSON.parse(localStorage.getItem('produtos')) || [];
        banco = JSON.parse(localStorage.getItem('banco')) || [];
    }catch{
        produtos = [];
        banco = [];
    }

    renderProdutos();
    ativarBusca();
}

/* NAV */
function ir(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('tela'+t)?.classList.add('active');
}

/* BUSCA */
function ativarBusca(){
    const campo = document.getElementById('busca');
    if(!campo) return;

    campo.addEventListener('input', ()=>{
        const texto = campo.value.toLowerCase();
        const div = document.getElementById('resultadoBusca');
        if(!div) return;

        div.innerHTML = '';

        if(!texto) return;

        produtos
        .filter(p=>p.nome.toLowerCase().includes(texto))
        .slice(0,20)
        .forEach(p=>{
            const item = document.createElement('div');
            item.className = 'card';
            item.innerText = `${p.nome} (${p.cod})`;

            item.onclick = ()=>{
                document.getElementById('produto').value = p.nome;
                document.getElementById('cod').value = p.cod;
                div.innerHTML = '';
                campo.value = '';
            };

            div.appendChild(item);
        });
    });
}

/* FOTOS */
function preview(e,id){
    const div = document.getElementById(id);
    if(!div) return;

    div.innerHTML = '';

    const lista = [];

    [...e.target.files].forEach(file=>{
        const url = URL.createObjectURL(file);

        const img = document.createElement('img');
        img.src = url;

        div.appendChild(img);
        lista.push(url);
    });

    if(id === 'prevProd') fotos.prod = lista;
    if(id === 'prevBal') fotos.bal = lista;
    if(id === 'prevEti') fotos.eti = lista;
}

/* PRODUTOS */
function salvarProduto(){
    const cod = document.getElementById('novoCod')?.value.trim();
    const nome = document.getElementById('novoNome')?.value.trim().toUpperCase();

    if(!cod || !nome){
        alert("Preencha!");
        return;
    }

    if(editando === null){
        if(produtos.some(p=>p.cod == cod)){
            alert("Código já existe!");
            return;
        }
        produtos.push({cod,nome});
    } else {
        produtos[editando] = {cod,nome};
        editando = null;
    }

    localStorage.setItem('produtos', JSON.stringify(produtos));
    document.getElementById('novoCod').value = '';
    document.getElementById('novoNome').value = '';
    renderProdutos();
}

function renderProdutos(){
    const div = document.getElementById('listaProdutos');
    if(!div) return;

    div.innerHTML = '';

    produtos.sort((a,b)=>a.nome.localeCompare(b.nome));

    produtos.forEach((p,i)=>{
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `${p.cod} - ${p.nome}`;
        div.appendChild(card);
    });
}

/* TRATATIVA */
function salvar(){
    const produto = document.getElementById('produto')?.value;
    const cod = document.getElementById('cod')?.value;

    if(!produto || !cod){
        alert("Preencha!");
        return;
    }

    const chegou = Number(document.getElementById('chegou')?.value) || 0;
    const quebra = Number(document.getElementById('quebra')?.value) || 0;

    const perc = chegou ? ((quebra/chegou)*100).toFixed(1) : 0;

    atual = {produto,cod,chegou,quebra,perc,fotos};

    const texto =
`Cód: ${cod}
${produto}
Chegou: ${chegou}
Quebra: ${quebra}
Perda: ${perc}%`;

    document.getElementById('texto').innerText = texto;

    montarFotosEnvio();

    ir(3);
}

/* MOSTRAR FOTOS */
function montarFotosEnvio(){
    const div = document.getElementById('fotosEnvio');
    if(!div) return;

    div.innerHTML = '';

    ['prod','bal','eti'].forEach(tipo=>{
        if(fotos[tipo].length > 0){
            div.innerHTML += `<h3>${tipo.toUpperCase()}</h3>`;
            fotos[tipo].forEach(f=>{
                div.innerHTML += `<img src="${f}" width="80">`;
            });
        }
    });
}

/* OUTROS */
function copiar(){
    navigator.clipboard.writeText(document.getElementById('texto').innerText);
    alert("Copiado!");
}

function enviar(){
    const texto = document.getElementById('texto').innerText;
    window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
}

function finalizar(){
    banco.push(atual);
    localStorage.setItem('banco', JSON.stringify(banco));
    fotos = {prod:[],bal:[],eti:[]};
    ir(1);
}

window.onload = init;

</script>

</body>
</html>
