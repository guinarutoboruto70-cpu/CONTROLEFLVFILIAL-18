<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRATATIVA FLV</title>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a0a; color:#fff; }
.screen { display:none; padding:20px; }
.active { display:block; }

h1,h2 { text-align:center; color:#ffcc00; }

.btn {
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    font-weight:bold;
}

input {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#222;
    border:1px solid #444;
    color:#fff;
    border-radius:8px;
}

.preview img {
    width:80px;
    margin:5px;
    border-radius:8px;
}

.card { background:#1a1a1a; padding:10px; margin-top:10px; border-radius:10px; }
</style>
</head>

<body>

<!-- BOAS VINDAS -->
<div id="tela0" class="screen active">
    <h1>Bem-vindo ao TRATATIVAFLV</h1>
    <button class="btn" onclick="ir(1)">ENTRAR</button>
</div>

<!-- MENU -->
<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button class="btn" onclick="ir(2)">TRATATIVA</button>
    <button class="btn">CADASTRO DE PRODUTOS</button>
</div>

<!-- TRATATIVA -->
<div id="tela2" class="screen">
    <h2>Nova Tratativa</h2>

    <input id="produto" placeholder="Produto">
    <input id="cod" placeholder="Código">
    <input id="chegou" type="number" placeholder="Qtd Chegou">
    <input id="quebra" type="number" placeholder="Qtd Quebra">

    <div class="card">
        <p>Fotos Produto</p>
        <input type="file" multiple accept="image/*" onchange="preview(event,'prevProd')">
        <div id="prevProd" class="preview"></div>
    </div>

    <div class="card">
        <p>Fotos Balança</p>
        <input type="file" multiple accept="image/*" onchange="preview(event,'prevBal')">
        <div id="prevBal" class="preview"></div>
    </div>

    <div class="card">
        <p>Etiqueta (câmera ou galeria)</p>
        <input type="file" accept="image/*" capture="environment" onchange="preview(event,'prevEti')">
        <div id="prevEti" class="preview"></div>
    </div>

    <button class="btn" onclick="salvar()">SALVAR</button>
</div>

<!-- ENVIO -->
<div id="tela3" class="screen">
    <h2>Enviar Tratativa</h2>

    <div id="texto"></div>
    <button class="btn" onclick="enviarTexto()">ENVIAR TEXTO</button>

    <div id="fotos"></div>

    <button class="btn" onclick="finalizar()">FINALIZAR</button>
</div>

<!-- LISTA -->
<div id="tela4" class="screen">
    <h2>Salvos</h2>
    <div id="lista"></div>
</div>

<script>

let dados = {};
let banco = [];

function ir(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('tela'+t).classList.add('active');
}

function preview(e,id){
    const div = document.getElementById(id);
    div.innerHTML = '';
    [...e.target.files].forEach(file=>{
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        div.appendChild(img);
    });
}

function salvar(){
    dados = {
        produto: document.getElementById('produto').value,
        cod: document.getElementById('cod').value,
        chegou: document.getElementById('chegou').value,
        quebra: document.getElementById('quebra').value,
        data: new Date().toLocaleDateString(),
        fotos: {
            prod: document.querySelector('#prevProd').innerHTML,
            bal: document.querySelector('#prevBal').innerHTML,
            eti: document.querySelector('#prevEti').innerHTML
        }
    };

    montarEnvio();
    ir(3);
}

function montarEnvio(){
    const texto =
`Cod: ${dados.cod}
${dados.produto}
Data: ${dados.data}
Chegou: ${dados.chegou} KG
Quebra: ${dados.quebra} KG`;

    document.getElementById('texto').innerText = texto;

    document.getElementById('fotos').innerHTML =
        "<h3>Produto</h3>"+dados.fotos.prod+
        "<h3>Balança</h3>"+dados.fotos.bal+
        "<h3>Etiqueta</h3>"+dados.fotos.eti;
}

function enviarTexto(){
    const texto = document.getElementById('texto').innerText;
    window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
}

function finalizar(){
    banco.push(dados);
    atualizarLista();
    ir(4);
}

function atualizarLista(){
    const lista = document.getElementById('lista');
    lista.innerHTML = '';

    banco.forEach(d=>{
        const div = document.createElement('div');
        div.className = 'card';
        div.innerText = `${d.cod} - ${d.produto}`;
        lista.appendChild(div);
    });
}

</script>

</body>
</html>
