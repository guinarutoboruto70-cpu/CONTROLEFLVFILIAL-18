<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FLV</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a0a; color:#fff; }
.screen { display:none; padding:20px; }
.active { display:block; }

h1,h2 { text-align:center; color:#ffcc00; }

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
}

input, textarea {
    width:100%;
    padding:10px;
    margin-top:8px;
    background:#222;
    border:1px solid #444;
    color:#fff;
    border-radius:6px;
}

.card {
    background:#1a1a1a;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

.small-btn{ padding:5px; margin-top:5px; border:none; border-radius:5px; }
.edit{ background:#00c3ff; }
.del{ background:#ff4444; }
</style>
</head>

<body>

<!-- HOME -->
<div id="tela0" class="screen active">
    <h1>Controle FLV</h1>
    <button class="btn" onclick="ir(1)">ENTRAR</button>
</div>

<!-- MENU -->
<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button class="btn" onclick="ir(2)">Tratativa</button>
    <button class="btn" onclick="ir(6)">Produtos</button>
</div>

<!-- PRODUTOS -->
<div id="tela6" class="screen">
    <h2>Produtos</h2>

    <input id="novoCod" placeholder="Código">
    <input id="novoNome" placeholder="Nome">
    <button class="btn" onclick="salvarProduto()">Salvar Produto</button>

    <hr>

    <h3>Importar Lista</h3>
    <textarea id="importarTexto" rows="6" placeholder="Cole aqui a lista"></textarea>
    <button class="btn" onclick="importarLista()">IMPORTAR</button>

    <hr>

    <h3>Ler Nota (OCR)</h3>
    <input type="file" accept="image/*" onchange="lerImagem(event)">
    <p id="status"></p>

    <div id="listaProdutos"></div>

    <button class="btn" onclick="ir(1)">Voltar</button>
</div>

<script>

let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
let editando = null;

/* ================= NAV ================= */
function ir(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('tela'+t).classList.add('active');
}

/* ================= PRODUTOS ================= */

function salvarProduto(){
    const cod = novoCod.value.trim();
    const nome = novoNome.value.trim();

    if(!cod || !nome){
        alert("Preencha!");
        return;
    }

    if(editando === null){
        if(produtos.some(p=>p.cod == cod)){
            alert("Código já existe!");
            return;
        }
        produtos.push({cod,nome});
    } else {
        produtos[editando] = {cod,nome};
        editando = null;
    }

    salvar();
}

function salvar(){
    localStorage.setItem('produtos', JSON.stringify(produtos));
    novoCod.value = '';
    novoNome.value = '';
    render();
}

function render(){
    listaProdutos.innerHTML = '';

    produtos.sort((a,b)=>a.nome.localeCompare(b.nome));

    produtos.forEach((p,i)=>{
        listaProdutos.innerHTML += `
        <div class="card">
            ${p.cod} - ${p.nome}<br>
            <button class="small-btn edit" onclick="editar(${i})">Editar</button>
            <button class="small-btn del" onclick="del(${i})">Excluir</button>
        </div>`;
    });
}

function editar(i){
    novoCod.value = produtos[i].cod;
    novoNome.value = produtos[i].nome;
    editando = i;
}

function del(i){
    if(confirm("Excluir?")){
        produtos.splice(i,1);
        salvar();
    }
}

/* ================= IMPORTAR TEXTO ================= */

function importarLista(){

    const texto = importarTexto.value.split('\n');

    texto.forEach(linha=>{
        const match = linha.match(/(\d+)\s+(.*)/);

        if(match){
            const cod = match[1];
            const nome = match[2].trim().toUpperCase();

            if(!produtos.some(p=>p.cod == cod)){
                produtos.push({cod,nome});
            }
        }
    });

    salvar();
    importarTexto.value = '';
}

/* ================= OCR ================= */

function lerImagem(e){

    const file = e.target.files[0];
    if(!file) return;

    status.innerText = "Lendo imagem...";

    Tesseract.recognize(file, 'por')
    .then(({ data: { text } }) => {

        status.innerText = "Texto extraído! Confira antes de importar.";
        importarTexto.value = text;

    })
    .catch(()=>{
        status
