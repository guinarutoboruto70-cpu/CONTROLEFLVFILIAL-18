<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FLV</title>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a0a; color:#fff; }
.screen { display:none; padding:20px; }
.active { display:block; }

h1,h2 { text-align:center; color:#ffcc00; }

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
}

.card {
    background:#1a1a1a;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

.preview img{ width:70px; margin:5px; border-radius:6px; }

.mini {
    width:80px;
    height:80px;
    object-fit:cover;
    display:block;
    margin-top:5px;
    border-radius:6px;
}
</style>
</head>

<body>

<div id="tela0" class="screen active">
    <h1>Controle FLV</h1>
    <button class="btn" onclick="ir(1)">ENTRAR</button>
</div>

<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button class="btn" onclick="ir(2)">Nova Tratativa</button>
    <button class="btn" onclick="ir(7)">Lista</button>
</div>

<div id="tela2" class="screen">
    <h2>Tratativa</h2>

    <input id="produto" placeholder="Produto">
    <input id="cod" placeholder="Código">
    <input id="chegou" type="number" placeholder="Qtd Chegou">
    <input id="quebra" type="number" placeholder="Qtd Quebra">

    <div class="card">
        Produto
        <input type="file" multiple accept="image/*" onchange="addFotos(event,'prod')">
        <div id="prev_prod" class="preview"></div>
    </div>

    <div class="card">
        Balança
        <input type="file" multiple accept="image/*" onchange="addFotos(event,'bal')">
        <div id="prev_bal" class="preview"></div>
    </div>

    <div class="card">
        Etiqueta<br><br>

        <input type="file" id="camEtiqueta" accept="image/*" capture="environment" style="display:none" onchange="addFotos(event,'eti')">
        <input type="file" id="galEtiqueta" accept="image/*" style="display:none" onchange="addFotos(event,'eti')">

        <button class="btn" onclick="document.getElementById('camEtiqueta').click()">📷 Câmera</button>
        <button class="btn" onclick="document.getElementById('galEtiqueta').click()">🖼️ Galeria</button>

        <div id="prev_eti" class="preview"></div>
    </div>

    <button class="btn" onclick="salvar()">Continuar</button>
</div>

<div id="tela3" class="screen">
    <h2>Envio</h2>

    <pre id="texto"></pre>

    <button class="btn" onclick="enviarTexto()">ENVIAR TEXTO</button>

    <div id="fotosEnvio"></div>

    <button class="btn" onclick="ir(2)">⬅ VOLTAR</button>
    <button class="btn" onclick="finalizar()">FINALIZAR</button>
</div>

<div id="tela7" class="screen">
    <h2>Lista</h2>
    <div id="lista"></div>
    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>
</div>

<script>

let fotos = {prod:[],bal:[],eti:[]};
let banco = [];
let textoFinal = '';

function ir(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('tela'+t)?.classList.add('active');
}

function addFotos(e,tipo){
    const div = document.getElementById('prev_'+tipo);

    [...e.target.files].forEach(file=>{
        const url = URL.createObjectURL(file);
        fotos[tipo].push({file,url});

        const img = document.createElement('img');
        img.src = url;
        div.appendChild(img);
    });
}

function salvar(){
    const produto = document.getElementById('produto').value;
    const cod = document.getElementById('cod').value;
    const chegou = document.getElementById('chegou').value;
    const quebra = document.getElementById('quebra').value;
    const data = new Date().toLocaleDateString();

    if(!produto || !cod){
        alert("Preencha produto e código");
        return;
    }

    textoFinal =
`Cód: ${cod}
${produto}
Data: ${data}
Qtd Chegou: ${chegou}
Qtd Quebra: ${quebra}`;

    document.getElementById('texto').innerText = textoFinal;

    montarFotos();
    ir(3);
}

function montarFotos(){
    const div = document.getElementById('fotosEnvio');
    div.innerHTML = '';

    ['prod','bal','eti'].forEach(tipo=>{
        if(fotos[tipo].length > 0){

            const titulo = document.createElement('h3');
            titulo.innerText = tipo.toUpperCase();
            div.appendChild(titulo);

            fotos[tipo].forEach(obj=>{
                const box = document.createElement('div');

                const img = document.createElement('img');
                img.src = obj.url;
                img.className = 'mini';

                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = 'COMPARTILHAR FOTO';
                btn.onclick = ()=>compartilhar(obj.file);

                box.appendChild(img);
                box.appendChild(btn);

                div.appendChild(box);
            });
        }
    });
}

async function compartilhar(file){
    try{
        if(navigator.canShare && navigator.canShare({files:[file]})){
            await navigator.share({files:[file]});
        }else{
            alert("Seu celular não suporta envio direto.");
        }
    }catch{
        alert("Erro ao compartilhar");
    }
}

function enviarTexto(){
    window.open(`https://wa.me/?text=${encodeURIComponent(textoFinal)}`);
}

function finalizar(){
    banco.push({
        texto: textoFinal,
        fotos: JSON.parse(JSON.stringify(fotos))
    });

    atualizarLista();

    fotos = {prod:[],bal:[],eti:[]};
    limparTela();

    ir(7);
}

function limparTela(){
    document.querySelectorAll('.preview').forEach(d=>d.innerHTML='');
    document.getElementById('produto').value = '';
    document.getElementById('cod').value = '';
    document.getElementById('chegou').value = '';
    document.getElementById('quebra').value = '';
}

function atualizarLista(){
    const div = document.getElementById('lista');
    div.innerHTML = '';

    banco.forEach(item=>{
        const card = document.createElement('div');
        card.className = 'card';

        const txt = document.createElement('pre');
        txt.innerText = item.texto;
        card.appendChild(txt);

        ['prod','bal','eti'].forEach(tipo=>{
            if(item.fotos[tipo].length > 0){

                const titulo = document.createElement('b');
                titulo.innerText = tipo.toUpperCase();
                card.appendChild(titulo);

                item.fotos[tipo].forEach(obj=>{
                    const img = document.createElement('img');
                    img.src = obj.url;
                    img.className = 'mini';
                    card.appendChild(img);
                });
            }
        });

        div.appendChild(card);
    });
}

</script>

</body>
</html>
