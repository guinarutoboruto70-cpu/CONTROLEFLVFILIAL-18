<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA TRATAFLV 1018</title>
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card: #1a1a1a; --text: #fff; --danger: #ff4444; --success: #28a745; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        h1 { color: var(--primary); font-size: 1.2rem; margin: 0; }
        
        .nav-bar { display: flex; gap: 5px; width: 100%; max-width: 500px; margin-bottom: 15px; }
        .nav-btn { flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }
        .nav-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        .screen { display: none; width: 100%; max-width: 450px; flex-direction: column; gap: 12px; }
        .screen.active { display: flex; }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.8rem; color: #888; }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; font-size: 1rem; }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-save { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1rem; margin-top: 10px; cursor: pointer; }
        
        .history-card { background: var(--card); border-radius: 10px; padding: 12px; border-left: 5px solid var(--primary); margin-bottom: 10px; }
        .card-header { display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); }
        .card-body { font-size: 0.9rem; margin-top: 5px; color: #ccc; }
    </style>
</head>
<body>

    <header>
        <h1>SISTEMA TRATAFLV - FILIAL 1018</h1>
        <div class="nav-bar">
            <button class="nav-btn active" onclick="showScreen('cadastro-screen', this)">🍎 TRATATIVA</button>
            <button class="nav-btn" onclick="showScreen('history-screen', this)">📜 HISTÓRICO</button>
            <button class="nav-btn" onclick="showScreen('results-screen', this)">📊 PAINEL</button>
        </div>
    </header>

    <div id="cadastro-screen" class="screen active">
        <form id="main-form">
            <div class="row">
                <div class="form-group">
                    <label>Código (Ex: 7028)</label>
                    <input type="number" id="codigo" placeholder="0000" required>
                </div>
                <div class="form-group">
                    <label>Produto</label>
                    <input type="text" id="produto" placeholder="Nome do item" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Qtd Quebra</label>
                    <input type="number" id="qtd_quebra" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Custo (R$)</label>
                    <input type="number" id="custo" step="0.01" placeholder="0.00" required>
                </div>
            </div>

            <div id="total-preview" style="text-align: center; padding: 10px; color: var(--primary); font-weight: bold;">
                Total: R$ 0,00
            </div>

            <button type="submit" class="btn-save">✅ SALVAR REGISTRO</button>
        </form>
    </div>

    <div id="history-screen" class="screen">
        <div id="history-list">
            <p style="text-align: center; color: #666;">Nenhum registro encontrado.</p>
        </div>
    </div>

    <div id="results-screen" class="screen">
        <div class="history-card" style="border-left-color: var(--success); text-align: center;">
            <label>TOTAL QUEBRA ACUMULADA</label>
            <h2 id="painel-total" style="margin: 10px 0;">R$ 0,00</h2>
        </div>
    </div>

    <script>
        // BANCO DE DADOS DE PRODUTOS (7028 TOMATE)
        const dbProdutos = {
            "7028": "TOMATE",
            "1125": "CEBOLA",
            "2030": "PIMENTÃO",
            "4050": "BATATA"
        };

        const codigoInput = document.getElementById('codigo');
        const produtoInput = document.getElementById('produto');
        const form = document.getElementById('main-form');

        // 1. AUTOMAÇÃO DE CÓDIGO
        codigoInput.addEventListener('input', () => {
            const cod = codigoInput.value;
            if (dbProdutos[cod]) {
                produtoInput.value = dbProdutos[cod];
                produtoInput.style.borderColor = "lime";
            }
        });

        // 2. LÓGICA DE SALVAMENTO (LOCALSTORAGE PARA SER DEFINITIVO)
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const novoRegistro = {
                codigo: codigoInput.value,
                produto: produtoInput.value,
                qtd: document.getElementById('qtd_quebra').value,
                custo: document.getElementById('custo').value,
                total: (document.getElementById('qtd_quebra').value * document.getElementById('custo').value).toFixed(2),
                data: new Date().toLocaleDateString()
            };

            // Salva no banco do navegador
            let historico = JSON.parse(localStorage.getItem('trataflv_v1')) || [];
            historico.unshift(novoRegistro);
            localStorage.setItem('trataflv_v1', JSON.stringify(historico));

            alert('✅ Registro da 1018 Salvo!');
            form.reset();
            renderHistory();
            updatePainel();
        });

        // 3. NAVEGAÇÃO ENTRE TELAS
        function showScreen(screenId, btn) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            btn.classList.add('active');
            if(screenId === 'history-screen') renderHistory();
            if(screenId === 'results-screen') updatePainel();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const dados = JSON.parse(localStorage.getItem('trataflv_v1')) || [];
            
            if(dados.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #666;">Vazio.</p>';
                return;
            }

            list.innerHTML = dados.map(item => `
                <div class="history-card">
                    <div class="card-header">
                        <span>${item.produto}</span>
                        <span>R$ ${item.total}</span>
                    </div>
                    <div class="card-body">
                        Cód: ${item.codigo} | Qtd: ${item.qtd} | Data: ${item.data}
                    </div>
                </div>
            `).join('');
        }

        function updatePainel() {
            const dados = JSON.parse(localStorage.getItem('trataflv_v1')) || [];
            const totalGeral = dados.reduce((acc, item) => acc + parseFloat(item.total), 0);
            document.getElementById('painel-total').innerText = `R$ ${totalGeral.toFixed(2)}`;
        }

        // Inicia carregando os dados
        renderHistory();
        updatePainel();
    </script>
</body>
</html>
