<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRATAFLV - Filial 1018</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffcc00">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0a0a0a; --card-bg: #1a1a1a; --primary: #ffcc00; --text: #ffffff; --text-dim: #aaaaaa; --border: #333333; --success: #25d366; --danger: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        .screen { display: none; padding: 20px; flex-grow: 1; animation: fadeIn 0.3s ease; }
        .screen.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 12px; text-transform: uppercase; font-size: 1rem; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-wa { background: var(--success); color: white; padding: 8px; font-size: 0.7rem; margin-top: 5px; border-radius: 5px; width: 100%; border: none; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; background: #252525; border: 1px solid var(--border); border-radius: 10px; color: white; margin-top: 8px; font-size: 1rem; }
        label { color: var(--text-dim); font-size: 0.8rem; font-weight: bold; }
        .preview-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .preview-item { position: relative; background: #252525; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); padding: 5px; }
        .preview-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="screen-start" class="screen active" style="justify-content: center; align-items: center; text-align: center;">
        <div style="font-size: 80px; margin-bottom: 20px;">🍎</div>
        <h1 style="color:var(--primary); margin:0;">TRATAFLV</h1>
        <p style="color:var(--text-dim);">Filial 1018 - Gestão de Quebras</p>
        <button class="btn" onclick="showScreen('screen-menu')">INICIAR SISTEMA</button>
    </div>

    <div id="screen-menu" class="screen">
        <h2>MENU PRINCIPAL</h2>
        <button class="btn" style="height: 80px;" onclick="startNewTratativa()">🍎 NOVA TRATATIVA</button>
        <button class="btn btn-outline" onclick="showScreen('screen-products')">📦 GERENCIAR PRODUTOS</button>
        <div style="margin-top: auto;"><button class="btn btn-danger" onclick="hardReset()">LIMPAR TUDO (RESET)</button></div>
    </div>

    <div id="screen-products" class="screen">
        <h2>CADASTRO</h2>
        <div class="card">
            <label>CÓDIGO ERP</label><input type="number" id="prod-code" inputmode="numeric">
            <label>NOME DO PRODUTO</label><input type="text" id="prod-name">
            <label>UNIDADE</label><select id="prod-unit"><option value="KG">KG</option><option value="UN">UN</option></select>
            <button class="btn" style="margin-top:15px" onclick="saveProduct()">SALVAR PRODUTO</button>
        </div>
        <div id="product-list-container" style="overflow-y: auto; max-height: 300px;"></div>
        <button class="btn btn-outline" style="margin-top:auto" onclick="showScreen('screen-menu')">VOLTAR</button>
    </div>

    <div id="screen-tratativa-data" class="screen">
        <h2>DADOS DA PERDA</h2>
        <div class="card">
            <label>PESQUISAR PRODUTO</label>
            <input type="text" id="search-prod" placeholder="Digite código ou nome..." oninput="searchProducts(this.value)">
            <div id="search-results" style="background:#222; max-height:150px; overflow-y:auto;"></div>
            <div id="selected-prod-info" class="hidden" style="margin-top:15px; border-top:1px solid #333; padding-top:10px">
                <p id="display-name" style="color:var(--primary); font-weight:bold; font-size:1.2rem;"></p>
                <label>QUANTIDADE QUE CHEGOU</label><input type="text" id="trat-chegou" placeholder="0,00" inputmode="decimal">
                <label>QUANTIDADE DE QUEBRA</label><input type="text" id="trat-quebra" placeholder="0,00" inputmode="decimal">
            </div>
        </div>
        <button class="btn" id="btn-go-evidence" disabled onclick="showScreen('screen-tratativa-media')">PROSSEGUIR PARA FOTOS</button>
    </div>

    <div id="screen-tratativa-media" class="screen">
        <h2>EVIDÊNCIAS</h2>
        <p style="font-size: 0.8rem; color: var(--primary);">* Envie as fotos individualmente para o WhatsApp</p>
        
        <div class="card">
            <label>FOTOS DO PRODUTO</label>
            <input type="file" id="f-prod" accept="image/*" multiple onchange="handleFiles(event, 'preview-prod')" class="hidden">
            <button class="btn btn-outline" onclick="document.getElementById('f-prod').click()">+ ADICIONAR FOTOS PRODUTO</button>
            <div class="preview-grid" id="preview-prod"></div>
        </div>

        <div class="card">
            <label>FOTOS DA BALANÇA</label>
            <input type="file" id="f-bal" accept="image/*" multiple onchange="handleFiles(event, 'preview-bal')" class="hidden">
            <button class="btn btn-outline" onclick="document.getElementById('f-bal').click()">+ ADICIONAR FOTOS BALANÇA</button>
            <div class="preview-grid" id="preview-bal"></div>
        </div>

        <div class="card">
            <label>FOTOS DA ETIQUETA</label>
            <input type="file" id="f-eti" accept="image/*" multiple onchange="handleFiles(event, 'preview-eti')" class="hidden">
            <button class="btn btn-outline" onclick="document.getElementById('f-eti').click()">+ ADICIONAR FOTOS ETIQUETA</button>
            <div class="preview-grid" id="preview-eti"></div>
        </div>

        <button class="btn" onclick="showScreen('screen-menu')">FINALIZAR E SAIR</button>
    </div>

    <script>
        let db;
        let currentTratativa = {};

        const initDB = () => {
            const req = indexedDB.open("TrataDB", 2);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if(!d.objectStoreNames.contains("prods")) d.createObjectStore("prods", { keyPath: "codigo" });
            };
            req.onsuccess = e => { db = e.target.result; verificarPreCarga(); renderProductList(); };
        };

        // ... (Mesma função verificarPreCarga e renderProductList da versão anterior)
        function verificarPreCarga() {
            const tx = db.transaction("prods", "readonly");
            const store = tx.objectStore("prods");
            const countReq = store.count();
            countReq.onsuccess = () => {
                if (countReq.result === 0) {
                    const cargaInicial = [
                        {codigo: "1124", nome: "ABACATE KG", unidade: "KG"}, {codigo: "1125", nome: "ABACAXI", unidade: "UN"},
                        {codigo: "1129", nome: "ABOBORA ITALIA KG", unidade: "KG"}, {codigo: "1130", nome: "ABOBORA JAPONESA KG", unidade: "KG"},
                        {codigo: "8572", nome: "CEBOLA KG", unidade: "KG"}, {codigo: "7028", nome: "TOMATE KG", unidade: "KG"}
                        // Adicione os demais conforme a lista anterior...
                    ];
                    const writeTx = db.transaction("prods", "readwrite");
                    const writeStore = writeTx.objectStore("prods");
                    cargaInicial.forEach(p => writeStore.put(p));
                    writeTx.oncomplete = () => renderProductList();
                }
            };
        }

        function renderProductList() {
            const cont = document.getElementById('product-list-container');
            if(!cont) return; cont.innerHTML = '';
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                let produtos = e.target.result;
                produtos.sort((a, b) => a.nome.localeCompare(b.nome));
                produtos.forEach(p => {
                    const d = document.createElement('div');
                    d.className = 'card'; d.style.display = 'flex'; d.style.justifyContent = 'space-between';
                    d.innerHTML = `<span><b>${p.codigo}</b> - ${p.nome}</span> <span onclick="deleteProd('${p.codigo}')" style="color:var(--danger)">EXCLUIR</span>`;
                    cont.appendChild(d);
                });
            };
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function handleFiles(event, containerId) {
            const files = Array.from(event.target.files);
            const p = currentTratativa.product;
            const chegou = document.getElementById('trat-chegou').value;
            const quebra = document.getElementById('trat-quebra').value;
            const data = new Date().toLocaleDateString('pt-BR');

            // NOVA ORDEM DO TEXTO: Cód, Produto, Data, Chegou, Quebra
            const textoRelatorio = `📌 *TRATATIVA FLV - 1018*\n\n🔢 *CÓD:* ${p.codigo}\n📦 *PRODUTO:* ${p.nome}\n📅 *DATA:* ${data}\n🚚 *CHEGOU:* ${chegou} ${p.unidade}\n❌ *QTDA QUEBRA:* ${quebra} ${p.unidade}`;

            files.forEach(f => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    div.innerHTML = `
                        <img src="${ev.target.result}">
                        <button class="btn-wa" onclick="enviarWhatsApp('${encodeURIComponent(textoRelatorio)}')">ENVIAR WHATSAPP</button>
                    `;
                    document.getElementById(containerId).appendChild(div);
                };
                reader.readAsDataURL(f);
            });
        }

        function enviarWhatsApp(texto) {
            // Correção do link do WhatsApp
            const url = `https://api.whatsapp.com/send?text=${texto}`;
            window.open(url, '_blank');
        }

        function searchProducts(q) {
            const res = document.getElementById('search-results');
            res.innerHTML = ''; if(q.length < 1) return;
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                const list = e.target.result.filter(p => p.codigo.includes(q) || p.nome.includes(q.toUpperCase()));
                list.sort((a, b) => a.nome.localeCompare(b.nome)).slice(0, 5).forEach(p => {
                    const d = document.createElement('div');
                    d.style.padding = '15px'; d.style.borderBottom = '1px solid #333';
                    d.innerText = `${p.codigo} - ${p.nome}`;
                    d.onclick = () => {
                        currentTratativa.product = p;
                        document.getElementById('display-name').innerText = p.nome;
                        document.getElementById('selected-prod-info').classList.remove('hidden');
                        document.getElementById('btn-go-evidence').disabled = false;
                        document.getElementById('search-prod').value = p.nome;
                        res.innerHTML = '';
                    };
                    res.appendChild(d);
                });
            };
        }

        function startNewTratativa() {
            currentTratativa = { product: null };
            document.getElementById('preview-prod').innerHTML = '';
            document.getElementById('preview-bal').innerHTML = '';
            document.getElementById('preview-eti').innerHTML = '';
            document.getElementById('search-prod').value = '';
            document.getElementById('selected-prod-info').classList.add('hidden');
            showScreen('screen-tratativa-data');
        }

        function saveProduct() {
            const code = document.getElementById('prod-code').value;
            const name = document.getElementById('prod-name').value.toUpperCase();
            const unit = document.getElementById('prod-unit').value;
            const tx = db.transaction("prods", "readwrite");
            tx.objectStore("prods").put({ codigo: code, nome: name, unidade: unit });
            renderProductList();
        }

        function deleteProd(c) { 
            if(confirm("Excluir?")) { db.transaction("prods", "readwrite").objectStore("prods").delete(c); renderProductList(); } 
        }

        function hardReset() { if(confirm("Resetar tudo?")) { indexedDB.deleteDatabase("TrataDB"); location.reload(); } }

        initDB();
    </script>
</body>
</html>
