<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRATAFLV - Filial 1018</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffcc00">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #0a0a0a; --card-bg: #1a1a1a; --primary: #ffcc00; --text: #ffffff; --text-dim: #aaaaaa; --border: #333333; --success: #25d366; --danger: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .screen.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 12px; text-transform: uppercase; }
        .btn-wa { background: var(--success); color: white; padding: 10px; font-size: 0.7rem; border-radius: 8px; border: none; width: 100%; margin-top: 5px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; background: #252525; border: 1px solid var(--border); border-radius: 10px; color: white; margin-top: 8px; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .thumb-box { position: relative; border: 1px solid var(--border); border-radius: 8px; padding: 4px; background: #222; }
        .thumb-box img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; }
        .summary-box { background: #000; padding: 15px; border-radius: 10px; border: 1px dashed var(--primary); white-space: pre-wrap; font-family: monospace; font-size: 0.9rem; margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <h1 style="color:var(--primary); text-align: center;">TRATAFLV 1018</h1>
        <button class="btn" style="height: 100px;" onclick="startNewTratativa()">🍎 NOVA TRATATIVA</button>
        <button class="btn" style="background:transparent; border: 1px solid var(--border); color:white;" onclick="showScreen('screen-products')">📦 PRODUTOS</button>
        <button class="btn btn-danger" style="margin-top:auto" onclick="hardReset()">RESETAR APP</button>
    </div>

    <div id="screen-products" class="screen">
        <h2>GERENCIAR</h2>
        <div class="card">
            <input type="number" id="prod-code" placeholder="CÓDIGO ERP">
            <input type="text" id="prod-name" placeholder="NOME DO PRODUTO">
            <select id="prod-unit"><option value="KG">KG</option><option value="UN">UN</option></select>
            <button class="btn" style="margin-top:10px" onclick="saveProduct()">SALVAR</button>
        </div>
        <div id="product-list-container" style="overflow-y:auto; max-height:250px;"></div>
        <button class="btn" onclick="showScreen('screen-menu')">VOLTAR</button>
    </div>

    <div id="screen-tratativa-data" class="screen">
        <h2>DADOS DA PERDA</h2>
        <div class="card">
            <input type="text" id="search-prod" placeholder="Pesquisar produto..." oninput="searchProducts(this.value)">
            <div id="search-results"></div>
            <div id="selected-prod-info" class="hidden">
                <p id="display-name" style="color:var(--primary); font-weight:bold; margin: 15px 0;"></p>
                <label>QTDA QUE CHEGOU</label><input type="text" id="trat-chegou" placeholder="0,00" inputmode="decimal">
                <label>QTDA DA QUEBRA</label><input type="text" id="trat-quebra" placeholder="0,00" inputmode="decimal">
            </div>
        </div>
        <button class="btn" id="btn-next" disabled onclick="showScreen('screen-tratativa-media')">PRÓXIMO: FOTOS</button>
    </div>

    <div id="screen-tratativa-media" class="screen">
        <h2>EVIDÊNCIAS</h2>
        <div class="card">
            <label>FOTOS PRODUTO / BALANÇA / ETIQUETA</label>
            <input type="file" id="f-all" accept="image/*" capture="environment" multiple onchange="handleFiles(event)" class="hidden">
            <button class="btn" style="background:#444" onclick="document.getElementById('f-all').click()">📸 TIRAR FOTOS OU GALERIA</button>
            <div class="preview-grid" id="main-preview"></div>
        </div>
        <button class="btn" onclick="generateFinalReport()">GERAR RELATÓRIO FINAL</button>
    </div>

    <div id="screen-final" class="screen">
        <h2>RELATÓRIO PRONTO</h2>
        <div class="summary-box" id="final-summary"></div>
        <p style="font-size:0.8rem; color:var(--primary)">Clique em "ENVIAR" em cada foto abaixo:</p>
        <div class="preview-grid" id="final-preview-grid"></div>
        <button class="btn" style="margin-top:20px; background:transparent; border:1px solid var(--primary); color:var(--primary)" onclick="location.reload()">NOVA TRATATIVA</button>
    </div>

    <script>
        let db;
        let currentTratativa = { photos: [] };

        const initDB = () => {
            const req = indexedDB.open("TrataDB", 2);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if(!d.objectStoreNames.contains("prods")) d.createObjectStore("prods", { keyPath: "codigo" });
            };
            req.onsuccess = e => { db = e.target.result; renderProductList(); };
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function handleFiles(event) {
            const files = Array.from(event.target.files);
            files.forEach(f => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentTratativa.photos.push(ev.target.result);
                    const box = document.createElement('div');
                    box.className = 'thumb-box';
                    box.innerHTML = `<img src="${ev.target.result}">`;
                    document.getElementById('main-preview').appendChild(box);
                };
                reader.readAsDataURL(f);
            });
        }

        function generateFinalReport() {
            const p = currentTratativa.product;
            const chegou = document.getElementById('trat-chegou').value;
            const quebra = document.getElementById('trat-quebra').value;
            const data = new Date().toLocaleDateString('pt-BR');

            const texto = `📌 *TRATATIVA FLV - 1018*\n\n🔢 *CÓD:* ${p.codigo}\n📦 *PRODUTO:* ${p.nome}\n📅 *DATA:* ${data}\n🚚 *CHEGOU:* ${chegou} ${p.unidade}\n❌ *QTDA QUEBRA:* ${quebra} ${p.unidade}`;
            
            document.getElementById('final-summary').innerText = texto;
            const grid = document.getElementById('final-preview-grid');
            grid.innerHTML = '';

            currentTratativa.photos.forEach(imgData => {
                const box = document.createElement('div');
                box.className = 'thumb-box';
                box.innerHTML = `
                    <img src="${imgData}">
                    <button class="btn-wa" onclick="sendToWA('${encodeURIComponent(texto)}')">ENVIAR</button>
                `;
                grid.appendChild(box);
            });

            showScreen('screen-final');
        }

        function sendToWA(txt) {
            navigator.clipboard.writeText(decodeURIComponent(txt));
            window.open(`https://api.whatsapp.com/send?text=${txt}`, '_blank');
        }

        function searchProducts(q) {
            const res = document.getElementById('search-results');
            res.innerHTML = ''; if(q.length < 1) return;
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                const list = e.target.result.filter(p => p.codigo.includes(q) || p.nome.includes(q.toUpperCase()));
                list.sort((a,b) => a.nome.localeCompare(b.nome)).slice(0,5).forEach(p => {
                    const d = document.createElement('div');
                    d.style.padding = '15px'; d.style.borderBottom = '1px solid #333';
                    d.innerText = `${p.codigo} - ${p.nome}`;
                    d.onclick = () => {
                        currentTratativa.product = p;
                        document.getElementById('display-name').innerText = p.nome;
                        document.getElementById('selected-prod-info').classList.remove('hidden');
                        document.getElementById('btn-next').disabled = false;
                        document.getElementById('search-prod').value = p.nome;
                        res.innerHTML = '';
                    };
                    res.appendChild(d);
                });
            };
        }

        function saveProduct() {
            const code = document.getElementById('prod-code').value;
            const name = document.getElementById('prod-name').value.toUpperCase();
            const unit = document.getElementById('prod-unit').value;
            db.transaction("prods", "readwrite").objectStore("prods").put({ codigo: code, nome: name, unidade: unit });
            renderProductList();
        }

        function renderProductList() {
            const cont = document.getElementById('product-list-container');
            if(!cont) return; cont.innerHTML = '';
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                e.target.result.sort((a,b) => a.nome.localeCompare(b.nome)).forEach(p => {
                    const d = document.createElement('div');
                    d.style.fontSize = '0.8rem'; d.style.padding = '5px';
                    d.innerHTML = `• ${p.nome} (${p.codigo})`;
                    cont.appendChild(d);
                });
            };
        }

        function startNewTratativa() {
            currentTratativa = { photos: [] };
            document.getElementById('main-preview').innerHTML = '';
            document.getElementById('search-prod').value = '';
            document.getElementById('selected-prod-info').classList.add('hidden');
            showScreen('screen-tratativa-data');
        }

        function hardReset() { if(confirm("Apagar tudo?")) { indexedDB.deleteDatabase("TrataDB"); location.reload(); } }

        initDB();
    </script>
</body>
</html>
