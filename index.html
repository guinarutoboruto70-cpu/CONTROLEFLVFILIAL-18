<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle FLV</title>

<style>
body { margin:0; font-family:sans-serif; background:#0a0a0a; color:#fff; }
.screen { display:none; padding:20px; }
.active { display:block; }

h1,h2 { text-align:center; color:#ffcc00; }

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#ffcc00;
    font-weight:bold;
}

.card {
    background:#1a1a1a;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

input {
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:none;
}
</style>
</head>

<body>

<div id="tela0" class="screen active">
    <h1>Controle FLV</h1>
    <button class="btn" onclick="ir(1)">ENTRAR</button>
</div>

<div id="tela1" class="screen">
    <h2>Menu</h2>
    <button class="btn" onclick="ir(2)">Nova Tratativa</button>
    <button class="btn" onclick="ir(7)">Lista</button>
</div>

<div id="tela2" class="screen">
    <h2>Tratativa</h2>
    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>

    <input id="buscaProduto" placeholder="Buscar produto..." oninput="buscarProduto()">
    <div id="sugestoes"></div>

    <input id="produto" placeholder="Produto">
    <input id="cod" placeholder="Código">
    <input id="custo" placeholder="Custo">

    <button class="btn" onclick="salvarProdutoInfo()">Salvar Produto</button>

    <input id="chegou" type="number" placeholder="Qtd Chegou">
    <input id="quebra" type="number" placeholder="Qtd Quebra">

    <button class="btn" onclick="salvar()">Continuar</button>
</div>

<div id="tela3" class="screen">
    <h2>Envio</h2>
    <pre id="texto"></pre>
    <button class="btn" onclick="enviarTexto()">ENVIAR TEXTO</button>
    <button class="btn" onclick="ir(2)">⬅ VOLTAR</button>
</div>

<div id="tela7" class="screen">
    <h2>Lista</h2>
    <div id="lista"></div>
    <button class="btn" onclick="ir(1)">⬅ VOLTAR</button>
</div>

<script>

/* NAV */
function ir(t){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('tela'+t).classList.add('active');
}

/* BASE FLV */
const baseFLV = [
"Abacate","Abacaxi","Abóbora","Alface","Alho","Banana","Batata",
"Beterraba","Brócolis","Cebola","Cenoura","Chuchu","Couve",
"Espinafre","Laranja","Limão","Maçã","Mamão","Melancia",
"Melão","Pepino","Pimentão","Repolho","Tomate","Uva"
];

function carregarBase(){
    if(!localStorage.getItem('produtos')){
        const lista = baseFLV.map(nome=>({nome,cod:'',custo:''}));
        localStorage.setItem('produtos', JSON.stringify(lista));
    }
}

/* PRODUTOS */
function getProdutos(){
    return JSON.parse(localStorage.getItem('produtos') || '[]');
}

function setProdutos(lista){
    localStorage.setItem('produtos', JSON.stringify(lista));
}

/* BUSCA */
function buscarProduto(){
    const texto = document.getElementById('buscaProduto').value.toLowerCase();
    const lista = getProdutos();

    sugestoes.innerHTML='';

    lista
    .filter(p=>p.nome.toLowerCase().includes(texto))
    .forEach((p,i)=>{

        const div = document.createElement('div');
        div.className='card';
        div.innerText = p.nome;

        div.onclick = ()=>{
            produto.value = p.nome;
            cod.value = p.cod || '';
            custo.value = p.custo || '';
            sugestoes.innerHTML='';
        };

        sugestoes.appendChild(div);
    });
}

/* SALVAR PRODUTO */
function salvarProdutoInfo(){
    let lista = getProdutos();

    const nome = produto.value;
    const codv = cod.value;
    const custov = custo.value;

    const index = lista.findIndex(p=>p.nome === nome);

    if(index !== -1){
        lista[index].cod = codv;
        lista[index].custo = custov;
        setProdutos(lista);
        alert("Produto atualizado");
    }
}

/* TRATATIVA */
let textoFinal='';

function salvar(){
    const produto = document.getElementById('produto').value;
    const cod = document.getElementById('cod').value;
    const chegou = document.getElementById('chegou').value;
    const quebra = document.getElementById('quebra').value;
    const data = new Date().toLocaleDateString();

    if(!produto || !cod){
        alert("Preencha produto");
        return;
    }

    textoFinal =
`Cód: ${cod}
${produto}
Data: ${data}
Qtd Chegou: ${chegou}
Qtd Quebra: ${quebra}`;

    texto.innerText = textoFinal;

    ir(3);
}

function enviarTexto(){
    window.open(`https://wa.me/?text=${encodeURIComponent(textoFinal)}`);
}

/* INIT */
carregarBase();

</script>

</body>
</html>
