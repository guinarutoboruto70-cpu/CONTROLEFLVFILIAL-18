<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROLE FLV 1018</title>
    <style>
        :root { --bg: #0a0a0a; --gold: #ffcc00; --card: #1a1a1a; --txt: #ffffff; --green: #25d366; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--txt); }
        .app { max-width: 500px; margin: 0 auto; padding: 15px; }
        .screen { display: none; flex-direction: column; min-height: 90vh; }
        .active { display: flex; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .back-btn { background: none; border: none; color: var(--gold); font-size: 1.8rem; cursor: pointer; padding-right: 20px; }
        
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1rem; margin-top: 10px; }
        input { width: 100%; padding: 15px; background: #222; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 1.1rem; box-sizing: border-box; margin-bottom: 10px; }
        
        /* ÁREA DE LISTAGEM ALFABÉTICA */
        .scroll-area { max-height: 400px; overflow-y: auto; background: #111; border-radius: 10px; border: 1px solid #333; -webkit-overflow-scrolling: touch; }
        .prod-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .p-nome { flex: 1; font-weight: bold; text-transform: uppercase; font-size: 1rem; }
        .p-cod { color: var(--gold); font-size: 0.9rem; width: 60px; text-align: right; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .thumb { background: #000; aspect-ratio: 1; border-radius: 8px; border: 1px solid #444; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .report { background: #000; padding: 15px; border-radius: 10px; border: 1px solid #555; font-family: monospace; white-space: pre-wrap; font-size: 1.1rem; }
        .btn-wa { background: var(--green); color: #fff; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app">
    <div id="step0" class="screen active">
        <h1 style="text-align:center; color:var(--gold); margin: 40px 0;">FLV 1018</h1>
        <button class="btn" style="height:100px; margin-bottom:20px;" onclick="mudarTela(1)">🍎 NOVA TRATATIVA</button>
        <button class="btn" style="background:#333; color:white; height:80px;" onclick="abrirCadastro()">➕ CADASTRAR PRODUTO</button>
    </div>

    <div id="step1" class="screen">
        <div class="header"><button class="back-btn" onclick="mudarTela(0)">⬅</button><h2>Tratativa</h2></div>
        <div class="card">
            <input type="text" id="search" placeholder="Buscar produto..." oninput="filtrar(this.value)">
            <div id="results" class="scroll-area" style="max-height: 150px;"></div>
            <div id="dados-prod" style="display:none">
                <p id="label-nome" style="color:var(--gold); font-weight:bold; font-size:1.3rem;"></p>
                <input type="number" id="qtd-chegou" placeholder="Qtd Chegou" inputmode="decimal">
                <input type="number" id="qtd-quebra" placeholder="Qtd Quebra" inputmode="decimal">
                <button class="btn" onclick="mudarTela(2)">PRÓXIMO: FOTOS</button>
            </div>
        </div>
    </div>

    <div id="step2" class="screen">
        <div class="header"><button class="back-btn" onclick="mudarTela(1)">⬅</button><h2>Fotos</h2></div>
        <div class="card">
            <button class="btn" style="background:#333; margin-bottom:10px" onclick="fClick('f-prod')">📸 FOTO PRODUTO</button>
            <input type="file" id="f-prod" accept="image/*" multiple hidden onchange="preview(this, 'g-prod', 'prod')">
            <div class="grid" id="g-prod"></div>
            <button class="btn" style="background:#333; margin-bottom:10px" onclick="fClick('f-bal')">📸 FOTO BALANÇA</button>
            <input type="file" id="f-bal" accept="image/*" multiple hidden onchange="preview(this, 'g-bal', 'bal')">
            <div class="grid" id="g-bal"></div>
            <button class="btn" style="background:#333" onclick="fClick('f-eti')">📸 FOTO ETIQUETA</button>
            <input type="file" id="f-eti" accept="image/*" hidden onchange="preview(this, 'g-eti', 'eti')">
            <div class="grid" id="g-eti"></div>
        </div>
        <button class="btn" onclick="gerarRelatorio()">CONCLUIR</button>
    </div>

    <div id="step3" class="screen">
        <div class="header"><button class="back-btn" onclick="mudarTela(2)">⬅</button><h2>Enviar</h2></div>
        <div class="card">
            <div class="report" id="txt-final"></div>
            <button class="btn btn-wa" onclick="enviarTexto()">ENVIAR WHATSAPP</button>
        </div>
        <div id="area-fotos-final"></div>
        <button class="btn" style="background:none; border:2px solid var(--gold); color:var(--gold);" onclick="location.reload()">NOVA TRATATIVA</button>
    </div>

    <div id="step4" class="screen">
        <div class="header"><button class="back-btn" onclick="mudarTela(0)">⬅</button><h2>Cadastro A-Z</h2></div>
        <div class="card">
            <input type="number" id="new-cod" placeholder="Código">
            <input type="text" id="new-nome" placeholder="Nome do Produto">
            <input type="text" id="new-un" placeholder="Unidade (KG ou UN)">
            <button class="btn" onclick="salvarProduto()">SALVAR NO SISTEMA</button>
            <h3 style="margin-top:20px; color:var(--gold); font-size:0.8rem;">LISTA DE PRODUTOS:</h3>
            <div class="scroll-area" id="lista-cadastrados"></div>
        </div>
    </div>
</div>

<script>
    let db; let selecionado = null; let fotos = { prod: [], bal: [], eti: [] };

    const req = indexedDB.open("DB_FLV_1018_FINAL", 1);
    req.onsuccess = e => db = e.target.result;

    function mudarTela(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        window.scrollTo(0,0);
    }

    function listarProdutos() {
        const area = document.getElementById('lista-cadastrados');
        area.innerHTML = '';
        db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
            // ORDEM ALFABÉTICA (A-Z)
            const lista = e.target.result.sort((a, b) => a.nome.localeCompare(b.nome));
            lista.forEach(p => {
                const row = document.createElement('div'); row.className = 'prod-row';
                row.innerHTML = `<span class="p-nome">${p.nome}</span> <span class="p-cod">#${p.cod}</span>`;
                area.appendChild(row);
            });
        };
    }

    function abrirCadastro() { mudarTela(4); listarProdutos(); }

    function filtrar(q) {
        const res = document.getElementById('results'); res.innerHTML = '';
        if(!q) return;
        db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
            e.target.result.filter(p => p.cod.includes(q) || p.nome.includes(q.toUpperCase())).slice(0,5).forEach(p => {
                const d = document.createElement('div'); d.className = 'item'; d.innerText = `${p.cod} - ${p.nome}`;
                d.onclick = () => { selecionado = p; document.getElementById('label-nome').innerText = p.nome; document.getElementById('dados-prod').style.display = 'block'; document.getElementById('search').value = p.nome; res.innerHTML = ''; };
                res.appendChild(d);
            });
        };
    }

    function fClick(id) { document.getElementById(id).click(); }

    function preview(input, gridId, tipo) {
        Array.from(input.files).forEach(f => {
            const rd = new FileReader();
            rd.onload = e => {
                fotos[tipo].push({ data: e.target.result, file: f });
                const div = document.createElement('div'); div.className = 'thumb';
                div.innerHTML = `<img src="${e.target.result}">`;
                document.getElementById(gridId).appendChild(div);
            };
            rd.readAsDataURL(f);
        });
    }

    function gerarRelatorio() {
        const t = `Cod: ${selecionado.cod}\n${selecionado.nome}\nData: ${new Date().toLocaleDateString('pt-BR')}\nChegou: ${document.getElementById('qtd-chegou').value} ${selecionado.un}\nQuebra: ${document.getElementById('qtd-quebra').value} ${selecionado.un}`;
        document.getElementById('txt-final').innerText = t;
        const area = document.getElementById('area-fotos-final'); area.innerHTML = '';
        ['prod', 'bal', 'eti'].forEach(cat => {
            fotos[cat].forEach((img, i) => {
                const b = document.createElement('button'); b.className = 'btn btn-wa'; b.innerText = `FOTO ${cat.toUpperCase()} (${i+1})`;
                b.onclick = () => navigator.share({ files: [img.file] });
                area.appendChild(b);
            });
        });
        mudarTela(3);
    }

    function enviarTexto() { window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(document.getElementById('txt-final').innerText)}`); }

    function salvarProduto() {
        const c = document.getElementById('new-cod'); const n = document.getElementById('new-nome'); const u = document.getElementById('new-un');
        if(c.value && n.value) {
            const tx = db.transaction("prods", "readwrite");
            tx.objectStore("prods").put({cod: c.value, nome: n.value.toUpperCase(), un: u.value.toUpperCase() || "KG"});
            tx.oncomplete = () => { c.value = ''; n.value = ''; listarProdutos(); };
        }
    }
</script>
</body>
</html>
