<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRATAFLV 1018</title>
    <style>
        :root { --bg: #0a0a0a; --card-bg: #1a1a1a; --primary: #ffcc00; --text: #ffffff; --border: #333; --success: #25d366; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }
        .screen { display: none; padding: 20px; flex-direction: column; }
        .active { display: flex; }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; margin-bottom: 10px; text-transform: uppercase; cursor: pointer; }
        .btn-wa { background: var(--success); color: white; padding: 10px; border-radius: 6px; border: none; width: 100%; font-size: 0.7rem; margin-top: 5px; font-weight: bold; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: #252525; border: 1px solid var(--border); border-radius: 8px; color: white; margin: 8px 0; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .thumb { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: #000; padding: 2px; text-align: center; }
        .thumb img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; }
        .section-title { color: var(--primary); font-size: 0.8rem; margin-top: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .text-clean { background: #000; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 1rem; line-height: 1.5; margin-bottom: 10px; border: 1px solid #444; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <h1 style="text-align:center; color:var(--primary); margin-bottom: 40px;">TRATAFLV 1018</h1>
        <button class="btn" style="height:150px; font-size: 1.2rem;" onclick="startNew()">🍎 NOVA TRATATIVA</button>
        <button class="btn" style="background:none; border:1px solid #444; color:#aaa; font-size: 0.8rem;" onclick="showScreen('screen-products')">GERENCIAR LISTA DE PRODUTOS</button>
    </div>

    <div id="screen-products" class="screen">
        <div class="card">
            <input type="number" id="p-code" placeholder="CÓDIGO">
            <input type="text" id="p-name" placeholder="NOME DO PRODUTO (Ex: BATATA)">
            <input type="text" id="p-unit" placeholder="UNIDADE (KG ou UN)">
            <button class="btn" onclick="saveP()">SALVAR PRODUTO</button>
        </div>
        <div id="p-list" style="max-height:300px; overflow-y:auto; font-size: 0.9rem; color: #aaa;"></div>
        <button class="btn" style="margin-top: 20px;" onclick="showScreen('screen-menu')">VOLTAR</button>
    </div>

    <div id="screen-data" class="screen">
        <div class="card">
            <input type="text" id="search" placeholder="Pesquisar produto ou código..." oninput="searchP(this.value)">
            <div id="results"></div>
            <div id="info" class="hidden">
                <p id="detalhe" style="color:var(--primary); font-weight:bold; font-size: 1.2rem; margin: 15px 0;"></p>
                <label>Chegou:</label><input type="text" id="chegou" placeholder="Ex: 500" inputmode="decimal">
                <label>Qtd da quebra:</label><input type="text" id="quebra" placeholder="Ex: 25" inputmode="decimal">
            </div>
        </div>
        <button class="btn" id="btn-next" disabled onclick="showScreen('screen-media')">PRÓXIMO: TIRAR FOTOS</button>
    </div>

    <div id="screen-media" class="screen">
        <div class="card">
            <div class="section-title">1. FOTOS DO PRODUTO</div>
            <input type="file" id="f-prod" accept="image/*" multiple onchange="preview(event, 'pre-prod', 'prod')" class="hidden">
            <button class="btn" style="background:#333; margin-top: 10px;" onclick="document.getElementById('f-prod').click()">+ ADICIONAR PRODUTO</button>
            <div class="grid" id="pre-prod"></div>
        </div>
        <div class="card">
            <div class="section-title">2. FOTOS DA BALANÇA</div>
            <input type="file" id="f-bal" accept="image/*" multiple onchange="preview(event, 'pre-bal', 'bal')" class="hidden">
            <button class="btn" style="background:#333; margin-top: 10px;" onclick="document.getElementById('f-bal').click()">+ ADICIONAR BALANÇA</button>
            <div class="grid" id="pre-bal"></div>
        </div>
        <div class="card">
            <div class="section-title">3. FOTO DA ETIQUETA</div>
            <input type="file" id="f-eti" accept="image/*" onchange="preview(event, 'pre-eti', 'eti')" class="hidden">
            <button class="btn" style="background:#333; margin-top: 10px;" onclick="document.getElementById('f-eti').click()">📸 CÂMERA OU GALERIA</button>
            <div class="grid" id="pre-eti"></div>
        </div>
        <button class="btn" onclick="generate()">GERAR RELATÓRIO FINAL</button>
    </div>

    <div id="screen-final" class="screen">
        <div class="section-title" style="margin-bottom: 10px;">RELATÓRIO DE TEXTO</div>
        <div class="text-clean" id="txt-final"></div>
        <button class="btn" style="background:var(--success); color:white; height: 60px;" id="btn-send-text">ENVIAR TEXTO NO GRUPO</button>
        
        <div id="final-media-container"></div>
        
        <button class="btn" style="margin-top:40px; background:none; border:1px solid var(--primary); color:var(--primary)" onclick="location.reload()">NOVA TRATATIVA (LIMPAR)</button>
    </div>

    <script>
        let db; let current = { prod: null, photos: { prod: [], bal: [], eti: [] } };

        const init = () => {
            const req = indexedDB.open("TrataDB", 2);
            req.onupgradeneeded = e => { e.target.result.createObjectStore("prods", { keyPath: "codigo" }); };
            req.onsuccess = e => { db = e.target.result; renderP(); };
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function preview(e, gridId, type) {
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader();
                r.onload = (ev) => {
                    current.photos[type].push(ev.target.result);
                    const d = document.createElement('div'); d.className='thumb';
                    d.innerHTML = `<img src="${ev.target.result}">`;
                    document.getElementById(gridId).appendChild(d);
                };
                r.readAsDataURL(f);
            });
        }

        function generate() {
            const p = current.prod;
            const data = new Date().toLocaleDateString('pt-BR');
            const chegou = document.getElementById('chegou').value;
            const quebra = document.getElementById('quebra').value;
            
            // FORMATO EXATO DO SEU PRINT REAL
            const txt = `Cod: ${p.codigo}\n${p.nome}\n${data}\nChegou: ${chegou} ${p.unidade}\nQuebra: ${quebra} ${p.unidade}`;
            
            document.getElementById('txt-final').innerText = txt;
            document.getElementById('btn-send-text').onclick = () => sendWA(txt);

            const container = document.getElementById('final-media-container');
            container.innerHTML = '';

            const sections = { prod: 'FOTOS DO PRODUTO', bal: 'FOTOS DA BALANÇA', eti: 'FOTO DA ETIQUETA' };
            for (let key in sections) {
                if (current.photos[key].length > 0) {
                    const title = document.createElement('div'); title.className='section-title'; title.innerText = sections[key];
                    const grid = document.createElement('div'); grid.className='grid';
                    current.photos[key].forEach(img => {
                        const d = document.createElement('div'); d.className='thumb';
                        // BOTÃO DE FOTO AGORA NÃO LEVA TEXTO (CONFORME PRINT REAL)
                        d.innerHTML = `<img src="${img}"><button class="btn-wa" onclick="sendWA('')">ENVIAR</button>`;
                        grid.appendChild(d);
                    });
                    container.appendChild(title); container.appendChild(grid);
                }
            }
            showScreen('screen-final');
        }

        function sendWA(t) {
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(t)}`, '_blank');
        }

        function searchP(q) {
            const res = document.getElementById('results'); res.innerHTML = '';
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                const filtered = e.target.result.filter(p => p.codigo.includes(q) || p.nome.includes(q.toUpperCase()));
                filtered.slice(0,5).forEach(p => {
                    const d = document.createElement('div'); d.style.padding='15px'; d.style.borderBottom='1px solid #333';
                    d.innerText = `${p.codigo} - ${p.nome}`;
                    d.onclick = () => {
                        current.prod = p; document.getElementById('detalhe').innerText = p.nome;
                        document.getElementById('info').classList.remove('hidden');
                        document.getElementById('btn-next').disabled = false;
                        document.getElementById('search').value = p.nome; res.innerHTML = '';
                    };
                    res.appendChild(d);
                });
            };
        }

        function saveP() {
            const c = document.getElementById('p-code').value;
            const n = document.getElementById('p-name').value.toUpperCase();
            const u = document.getElementById('p-unit').value.toUpperCase();
            db.transaction("prods", "readwrite").objectStore("prods").put({codigo:c, nome:n, unidade:u});
            renderP();
        }

        function renderP() {
            const l = document.getElementById('p-list'); if(!l) return; l.innerHTML = '';
            db.transaction("prods").objectStore("prods").getAll().onsuccess = e => {
                e.target.result.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(p => {
                    const d = document.createElement('div'); d.style.padding='5px';
                    d.innerText = `• ${p.nome} (${p.codigo})`; l.appendChild(d);
                });
            };
        }

        function startNew() {
            current = { prod: null, photos: { prod: [], bal: [], eti: [] } };
            document.getElementById('pre-prod').innerHTML=''; document.getElementById('pre-bal').innerHTML=''; document.getElementById('pre-eti').innerHTML='';
            document.getElementById('search').value=''; document.getElementById('info').classList.add('hidden');
            showScreen('screen-data');
        }

        init();
    </script>
</body>
</html>
